,"author":"Patrick Süskind","year":1985,"land":"Deutschland","epoch":"Gegenwart","icon":"🌸","summary":"Im Frankreich des 18. Jahrhunderts wird Jean-Baptiste Grenouille mit einem übermenschlichen Geruchssinn, aber ohne eigenen Körpergeruch geboren. Besessen von der Idee, den vollkommenen Duft zu schaffen, wird er zum Mörder. Ein moderner Welterfolg.","cards":[{"r":"Inhalt","q":"Was ist an Grenouille außergewöhnlich?","a":"Er besitzt einen genialen, übermenschlichen Geruchssinn, hat aber selbst keinen eigenen Körpergeruch."},{"r":"Inhalt","q":"Was ist Grenouilles Ziel?","a":"Den vollkommensten Duft der Welt zu schaffen – wofür er den Körperduft junger Frauen 'einfängt' und dafür mordet."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Sein Duft verführt bei der Hinrichtung die Menge zur Ekstase; am Ende lässt er sich von Außenseitern zerreißen und 'verschlingen'."},{"r":"Autor","q":"Was ist über Patrick Süskind bekannt?","a":"Ein sehr öffentlichkeitsscheuer deutscher Autor; 'Das Parfum' wurde zu einem der erfolgreichsten deutschen Nachkriegsromane weltweit."},{"r":"Interpretation","q":"Wofür steht Grenouilles fehlender Eigengeruch?","a":"Für seine Identitätslosigkeit und fehlende Menschlichkeit – er bleibt ein Fremder unter den Menschen."},{"r":"Interpretation","q":"Welche Macht symbolisiert der Duft?","a":"Die Macht über Gefühle und Massen: Wer den Geruch beherrscht, kann Liebe und Anbetung erzwingen, ohne selbst zu lieben."},{"r":"Interpretation","q":"Wie spielt der Roman mit dem 'Genie'-Motiv?","a":"Grenouille ist ein monströses Genie – schöpferische Größe und moralische Leere fallen zusammen."},{"r":"Interpretation","q":"Welche Epoche und Stimmung ruft der Roman auf?","a":"Das stinkende, sinnlich überbordende 18. Jahrhundert – zugleich detailrealistisch und märchenhaft-grotesk."},{"r":"Interpretation","q":"Was sagt der Roman über Liebe und Anerkennung?","a":"Grenouille kann Verehrung erzeugen, aber keine echte Liebe empfangen – künstliche Wirkung ersetzt keine menschliche Bindung."},{"r":"Einfluss","q":"Wie erfolgreich war 'Das Parfum'?","a":"Ein internationaler Bestseller, in über 40 Sprachen übersetzt und 2006 aufwendig verfilmt."},{"r":"Einfluss","q":"Warum ist der Roman ein moderner Klassiker?","a":"Wegen seiner originellen Idee (Erzählen über den Geruchssinn) und der Verbindung von Kriminalgeschichte, historischem Roman und Parabel."}]},{"title":"Die Odyssee","author":"Homer","year":-700,"land":"Griechenland","epoch":"Antike","icon":"⛵","summary":"Das antike Epos schildert die zehnjährige Heimkehr des listenreichen Odysseus vom Trojanischen Krieg nach Ithaka. Auf seiner Irrfahrt besteht er Abenteuer mit Zyklopen, Sirenen und Zauberinnen, während daheim seine Frau Penelope von Freiern bedrängt wird.","cards":[{"r":"Inhalt","q":"Wovon handelt die Odyssee?","a":"Von der zehnjährigen, abenteuerlichen Heimkehr des Odysseus vom Trojanischen Krieg auf seine Insel Ithaka."},{"r":"Inhalt","q":"Nenne bekannte Stationen der Irrfahrt.","a":"Der Zyklop Polyphem, die Zauberin Kirke, die Sirenen, Skylla und Charybdis sowie die Nymphe Kalypso."},{"r":"Inhalt","q":"Wie überlistet Odysseus den Zyklopen Polyphem?","a":"Er nennt sich 'Niemand', blendet den Riesen und entkommt unter dessen Schafen – so kann Polyphem keine Hilfe herbeirufen."},{"r":"Inhalt","q":"Was erwartet Odysseus zu Hause?","a":"Zahlreiche Freier bedrängen seine treue Frau Penelope; Odysseus kehrt verkleidet zurück und rächt sich an ihnen."},{"r":"Inhalt","q":"Wie hält Penelope die Freier hin?","a":"Mit der List, sie wolle erst ein Leichentuch fertigweben – das sie nachts wieder auftrennt."},{"r":"Autor","q":"Wer war Homer?","a":"Der legendäre griechische Dichter, dem 'Ilias' und 'Odyssee' zugeschrieben werden; seine historische Existenz ist ungewiss."},{"r":"Autor","q":"In welcher Form sind die Epen verfasst?","a":"In Versen (Hexametern); sie entstammen einer mündlichen Erzähltradition."},{"r":"Interpretation","q":"Wofür steht Odysseus als Held?","a":"Für den 'listenreichen', klugen Menschen, der durch Verstand und Selbstbeherrschung überlebt – nicht nur durch Kraft."},{"r":"Interpretation","q":"Was verkörpert die Heimkehr (Nostos) thematisch?","a":"Die Sehnsucht nach Heimat, Identität und Ordnung nach Krieg und Chaos."},{"r":"Interpretation","q":"Welche Bedeutung hat die Sirenen-Episode?","a":"Sie steht sprichwörtlich für die Verlockung, der man nur durch Vorsicht und List (Odysseus lässt sich fesseln) widersteht."},{"r":"Interpretation","q":"Was bedeutet die Wendung 'zwischen Skylla und Charybdis'?","a":"Die Wahl zwischen zwei Übeln, bei der man keinem gefahrlos ausweichen kann."},{"r":"Interpretation","q":"Warum gilt Odysseus als früher 'moderner' Held?","a":"Wegen seiner Individualität, seines Zweifelns und seiner Klugheit – er ist vielschichtiger als bloße Kriegerhelden."},{"r":"Einfluss","q":"Welchen Rang hat die Odyssee in der Weltliteratur?","a":"Sie ist eines der ältesten und einflussreichsten Werke des Abendlandes und Urbild der Reise- und Abenteuererzählung."},{"r":"Einfluss","q":"Nenne ein modernes Werk, das die Odyssee aufgreift.","a":"James Joyces 'Ulysses' überträgt die Struktur der Odyssee auf einen einzigen Tag in Dublin."},{"r":"Einfluss","q":"Welche Begriffe verdanken wir dem Epos?","a":"'Odyssee' als Wort für eine lange Irrfahrt sowie Redewendungen wie 'zwischen Skylla und Charybdis'."}]},{"title":"Hamlet","author":"William Shakespeare","year":1601,"land":"England","epoch":"Renaissance","icon":"💀","summary":"Der dänische Prinz Hamlet soll den Mord an seinem Vater rächen, den sein Onkel Claudius beging, um Thron und Königin zu gewinnen. Zwischen Zweifel, Wahnsinn und Grübeln zögert Hamlet – bis am Ende fast alle Hauptfiguren tot sind. Das wohl berühmteste Drama der Weltliteratur.","cards":[{"r":"Inhalt","q":"Was fordert der Geist von Hamlets Vater?","a":"Rache: Hamlets Onkel Claudius habe den König ermordet, um Krone und Königin Gertrude zu gewinnen."},{"r":"Inhalt","q":"Wie prüft Hamlet die Schuld des Claudius?","a":"Er lässt Schauspieler ein Stück aufführen, das den Mord nachstellt ('Die Mausefalle'), und beobachtet Claudius' Reaktion."},{"r":"Inhalt","q":"Wie endet das Drama?","a":"In einem vergifteten Duell sterben Hamlet, Claudius, Gertrude und Laertes – nahezu der gesamte Hof."},{"r":"Inhalt","q":"Wer ist Ophelia und was geschieht mit ihr?","a":"Hamlets Geliebte; von seinem Verhalten und dem Tod ihres Vaters zerrüttet, verfällt sie dem Wahnsinn und ertrinkt."},{"r":"Autor","q":"Als was gilt Shakespeare?","a":"Als der bedeutendste Dramatiker der englischen Sprache und eine zentrale Figur der Weltliteratur."},{"r":"Autor","q":"Nenne weitere Werke Shakespeares.","a":"'Romeo und Julia', 'Macbeth', 'König Lear' und 'Othello'."},{"r":"Interpretation","q":"Was bedeutet der Monolog 'Sein oder Nichtsein'?","a":"Hamlets Grübeln über Leben und Tod, Sinn des Leidens und die lähmende Angst vor dem Ungewissen – Inbegriff der Reflexion über die Existenz."},{"r":"Interpretation","q":"Was ist der 'Hamlet-Konflikt'?","a":"Das Zaudern des Denkenden: Hamlets Reflexion und Zweifel lähmen seine Tatkraft – Grübeln gegen Handeln."},{"r":"Interpretation","q":"Ist Hamlets Wahnsinn echt oder gespielt?","a":"Umstritten – teils Taktik ('verstellter' Wahnsinn), teils echte seelische Erschütterung; die Ambivalenz ist Teil der Figur."},{"r":"Interpretation","q":"Welche Themen macht das Stück modern?","a":"Zweifel, Selbstreflexion, die Unsicherheit über Wahrheit und Handeln – Hamlet gilt als früher 'moderner', selbstbewusster Mensch."},{"r":"Interpretation","q":"Wofür steht die Szene mit dem Schädel Yoricks?","a":"Für die Vergänglichkeit alles Lebendigen (Memento mori) – Hamlets Nachdenken über den Tod."},{"r":"Einfluss","q":"Warum gilt 'Hamlet' als so bedeutend?","a":"Als eines der meistgespielten und -gedeuteten Dramen überhaupt prägte es das Bild des reflektierenden, zerrissenen Helden."},{"r":"Einfluss","q":"Welche Wendungen stammen aus dem Stück?","a":"'Sein oder Nichtsein', 'etwas ist faul im Staate Dänemark' und 'der Rest ist Schweigen'."}]},{"title":"Die Göttliche Komödie","author":"Dante Alighieri","year":1320,"land":"Italien","epoch":"Mittelalter","icon":"🔥","summary":"Dantes Versepos schildert eine Jenseitsreise durch Hölle, Läuterungsberg und Paradies. Geführt vom Dichter Vergil und später von seiner idealisierten Beatrice, durchwandert Dante die jenseitigen Reiche. Ein Gründungswerk der italienischen Literatur.","cards":[{"r":"Inhalt","q":"In welche drei Reiche gliedert sich das Epos?","a":"In Hölle (Inferno), Läuterungsberg (Purgatorio) und Paradies (Paradiso)."},{"r":"Inhalt","q":"Wer führt Dante durch Hölle und Läuterungsberg?","a":"Der römische Dichter Vergil; durch das Paradies geleitet ihn seine idealisierte Geliebte Beatrice."},{"r":"Inhalt","q":"Was steht über dem Höllentor?","a":"Sinngemäß die berühmte Inschrift 'Lasst alle Hoffnung fahren, die ihr eintretet'."},{"r":"Autor","q":"Wer war Dante Alighieri?","a":"Ein florentinischer Dichter (1265–1321), politisch verbannt; er schrieb das Werk im Exil in italienischer Volkssprache statt auf Latein."},{"r":"Interpretation","q":"Warum ist die Wahl der Volkssprache bedeutsam?","a":"Dante schrieb auf Italienisch (Toskanisch) und begründete damit die italienische Literatursprache."},{"r":"Interpretation","q":"Wie ist die Jenseitsreise allegorisch zu verstehen?","a":"Als Weg der Seele von der Sünde (Hölle) über die Läuterung zur Gottesschau – eine Reise zu Erlösung und Erkenntnis."},{"r":"Interpretation","q":"Welche Ordnung herrscht in Dantes Hölle?","a":"Ein streng gestuftes System: Die Sünden werden nach Schwere geordnet und mit sinnbildlich passenden Strafen (contrapasso) vergolten."},{"r":"Interpretation","q":"Welche Bedeutung hat Beatrice?","a":"Sie verkörpert göttliche Gnade und die zum Heil führende, geistige Liebe."},{"r":"Interpretation","q":"Warum verbindet das Werk Theologie und Poesie?","a":"Es fasst das mittelalterliche Welt- und Gottesbild dichterisch zusammen und verknüpft antikes und christliches Denken."},{"r":"Einfluss","q":"Welchen Rang hat die Göttliche Komödie?","a":"Sie gilt als Gründungswerk der italienischen Literatur und als einer der Gipfel der Weltdichtung."},{"r":"Einfluss","q":"Wie prägte Dante die Kultur?","a":"Sein Höllenbild beeinflusste Kunst und Literatur über Jahrhunderte; Dante gilt als 'Vater' der italienischen Sprache."}]},{"title":"Frankenstein","author":"Mary Shelley","year":1818,"land":"England","epoch":"Romantik","icon":"⚡","summary":"Der Wissenschaftler Victor Frankenstein erschafft aus toter Materie ein lebendes Wesen, verstößt es aber entsetzt. Das einsame, verzweifelte Geschöpf wird zum Rächer. Mary Shelleys Roman gilt als Urwerk der Science-Fiction und moderne Prometheus-Sage.","cards":[{"r":"Inhalt","q":"Was gelingt Victor Frankenstein?","a":"Er erschafft aus toter Materie ein lebendiges, menschenähnliches Wesen – flieht aber entsetzt vor seiner Schöpfung."},{"r":"Inhalt","q":"Wie entwickelt sich das 'Monster'?","a":"Zunächst sanft und lernbegierig, wird es durch Zurückweisung und Einsamkeit verbittert und rächt sich an seinem Schöpfer."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"In einer Verfolgungsjagd bis in die Arktis; Victor stirbt, und das Geschöpf zieht sich in die Einsamkeit zurück, um zu sterben."},{"r":"Autor","q":"Wie entstand der Roman?","a":"Aus einem Schauergeschichten-Wettbewerb am Genfersee; die erst 18-jährige Mary Shelley schrieb ihn 1816/18."},{"r":"Interpretation","q":"Was bedeutet der Untertitel 'Der moderne Prometheus'?","a":"Wie Prometheus das Feuer stahl, maßt sich Frankenstein göttliche Schöpfermacht an – und wird dafür bestraft."},{"r":"Interpretation","q":"Welche Kritik am Fortschritt enthält der Roman?","a":"Eine Warnung vor Wissenschaft ohne Verantwortung: Der Schöpfer haftet für sein Geschöpf, das er verstößt."},{"r":"Interpretation","q":"Wer ist das eigentliche 'Monster'?","a":"Vieldeutig – oft der verantwortungslose Schöpfer Victor, nicht das anfangs unschuldige, durch Ablehnung verrohte Geschöpf."},{"r":"Interpretation","q":"Welche Themen der Romantik greift das Werk auf?","a":"Das Erhabene der Natur, das einsame Genie, die Grenzüberschreitung und die Nachtseite der Aufklärung."},{"r":"Einfluss","q":"Warum gilt 'Frankenstein' als Urwerk der Science-Fiction?","a":"Weil es erstmals künstliches Leben durch Wissenschaft (statt Magie) erschaffen lässt und dessen Folgen durchdenkt."},{"r":"Einfluss","q":"Wie präsent ist der Stoff heute?","a":"'Frankenstein' wurde zum kulturellen Mythos; unzählige Filme und die Debatte um wissenschaftliche Verantwortung berufen sich darauf."}]},{"title":"Der Vorleser","author":"Bernhard Schlink","year":1995,"land":"Deutschland","epoch":"Gegenwart","icon":"📖","summary":"Der 15-jährige Michael beginnt eine Affäre mit der älteren Hanna, die plötzlich verschwindet. Jahre später sieht er sie als Angeklagte in einem NS-Kriegsverbrecherprozess wieder – und erkennt ihr verborgenes Geheimnis. Ein vielgelesener Roman über Schuld und die zweite Generation.","cards":[{"r":"Inhalt","q":"Wie beginnt die Beziehung von Michael und Hanna?","a":"Der 15-jährige Michael beginnt eine Affäre mit der deutlich älteren Straßenbahnschaffnerin Hanna, der er oft vorliest."},{"r":"Inhalt","q":"Wo begegnet Michael Hanna Jahre später wieder?","a":"Als Jurastudent im Gerichtssaal – Hanna ist Angeklagte in einem Prozess wegen NS-Kriegsverbrechen als KZ-Aufseherin."},{"r":"Inhalt","q":"Welches Geheimnis verbirgt Hanna?","a":"Sie ist Analphabetin – und nimmt lieber eine schwerere Strafe in Kauf, als dies vor Gericht zuzugeben."},{"r":"Autor","q":"Wer ist Bernhard Schlink?","a":"Ein deutscher Jurist und Schriftsteller; 'Der Vorleser' wurde international erfolgreich und verfilmt."},{"r":"Interpretation","q":"Wofür steht Hannas Analphabetismus symbolisch?","a":"Für Scham, aber auch – vieldeutig und umstritten – für ein 'Nicht-verstehen-Können' und die Sprachlosigkeit gegenüber der Schuld."},{"r":"Interpretation","q":"Welches Grundthema verhandelt der Roman?","a":"Die Frage nach Schuld und Verstrickung und das Verhältnis der 'zweiten Generation' zur NS-Vergangenheit ihrer Eltern."},{"r":"Interpretation","q":"Warum ist Michaels Haltung ambivalent?","a":"Er liebt und verurteilt Hanna zugleich – stellvertretend für die Zerrissenheit der Nachgeborenen zwischen Verstehen und Verwerfen."},{"r":"Interpretation","q":"Welche Kritik wurde am Roman geäußert?","a":"Der Vorwurf, Hannas Analphabetismus 'entschuldige' oder relativiere die Täterschaft und lade zu unangemessenem Mitleid ein."},{"r":"Einfluss","q":"Wie erfolgreich war der Roman?","a":"Ein internationaler Bestseller, in viele Sprachen übersetzt und 2008 mit Kate Winslet (Oscar) verfilmt."},{"r":"Einfluss","q":"Warum ist er häufige Schullektüre?","a":"Weil er Schuld, Erinnerung und Vergangenheitsbewältigung an einer eindringlichen, diskutierbaren Geschichte verhandelt."}]}]</script>

var theme=localStorage.getItem('lit_theme')||'light';
document.documentElement.setAttribute('data-theme',theme);
$('themeBtn').onclick=function(){theme=theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('lit_theme',theme);};

/* ---------- HOME ---------- */
var curFilter='Alle';
function epochs(){var s=['Alle'];BOOKS.forEach(b=>{if(s.indexOf(b.epoch)<0)s.push(b.epoch);});return s;}
function renderHome(){
  $('homeView').classList.remove('hidden');$('quizView').classList.add('hidden');$('resultView').classList.add('hidden');
  var total=BOOKS.reduce((s,b)=>s+b.cards.length,0);
  var bs=$('bannerSlot');bs.innerHTML='';
  var ban=el('div','banner','<span class="em">🎲</span><div><b>Alles gemischt</b><small>'+BOOKS.length+' Werke · '+total+' Karten · Pakete bleiben zusammen</small></div><span class="go">›</span>');
  ban.onclick=function(){startSession(BOOKS.map(b=>b._i),'🎲 Alle Werke');};
  bs.appendChild(ban);
  // filters
  var fs=$('filterSlot');fs.innerHTML='';
  var row=el('div','filters');
  epochs().forEach(function(ep){
    var c=el('button','chip'+(ep===curFilter?' on':''),ep);
    c.onclick=function(){curFilter=ep;renderHome();};
    row.appendChild(c);
  });
  fs.appendChild(el('div','sectit','Nach Epoche filtern'));
  fs.appendChild(row);
  // list
  var list=$('bookList');list.innerHTML='';
  list.appendChild(el('div','sectit','Werke'+(curFilter!=='Alle'?' · '+curFilter:'')));
  BOOKS.filter(b=>curFilter==='Alle'||b.epoch===curFilter).forEach(function(b){
    var card=el('button','book');
    card.innerHTML='<span class="cov serif">'+(b.icon||'📖')+'</span>'+
      '<span class="tx"><span class="tt serif">'+b.title+'</span><span class="au">'+b.author+'</span>'+
      '<span class="meta">'+b.year+' · '+b.land+' · '+b.epoch+'</span></span>'+
      '<span class="cnt">'+b.cards.length+'<br>Karten</span>';
    card.onclick=function(){startSession([b._i], b.title);};
    list.appendChild(card);
  });
}

/* ---------- SESSION with PACKETS ---------- */
var S=null;
function startSession(bookIdxs,label){
  // build packets: each book's cards shuffled, but kept together; packet ORDER shuffled
  var packets=shuffle(bookIdxs.slice()).map(function(bi){
    return {bi:bi, cards:shuffle(BOOKS[bi].cards.slice())};
  });
  var queue=[];
  packets.forEach(function(p){
    queue.push({kind:'intro',bi:p.bi});
    p.cards.forEach(function(c){queue.push({kind:'card',bi:p.bi,card:c});});
  });
  S={queue:queue,pos:0,known:0,seen:0,label:label};
  $('homeView').classList.add('hidden');$('resultView').classList.add('hidden');$('quizView').classList.remove('hidden');
  render();
}
$('backBtn').onclick=function(){ if(confirm('Lernrunde beenden?')) renderHome(); };
function setFoot(btns){var f=$('footSlot');f.innerHTML='';btns.forEach(function(b){var x=el('button','btn'+(b.cls?' '+b.cls:''),b.label);x.onclick=b.fn;f.appendChild(x);});}
function progress(){$('pfill').style.width=(S.pos/S.queue.length*100)+'%';var it=S.queue[S.pos];$('qcount').textContent=(S.pos+1)+' / '+S.queue.length;}
function next(){S.pos++;if(S.pos>=S.queue.length)finish();else render();}
function render(){
  progress();
  var it=S.queue[S.pos];var b=BOOKS[it.bi];
  var slot=$('cardSlot');slot.innerHTML='';
  var card=el('div','card');
  if(it.kind==='intro'){
    card.innerHTML='<span class="kick k-Buch">Neues Paket</span>'+
      '<div class="intrott serif">'+b.title+'</div>'+
      '<div class="introau">'+b.author+' · '+b.year+'</div>'+
      '<div class="introsum">'+b.summary+'</div>'+
      '<div class="intrometa"><span class="tag">'+b.land+'</span><span class="tag">'+b.epoch+'</span><span class="tag">'+b.cards.length+' Karten</span></div>';
    slot.appendChild(card);
    setFoot([{label:'Los geht’s →',fn:next}]);
    window.scrollTo(0,0);return;
  }
  var c=it.card;
  card.innerHTML='<span class="kick k-'+c.r+'">'+c.r+' · '+b.title+'</span><div class="qtext serif">'+c.q+'</div>';
  var ans=el('div','ans');ans.id='ansBox';
  slot.appendChild(card);card.appendChild(ans);
  setFoot([{label:'Antwort zeigen',fn:reveal}]);
  window.scrollTo(0,0);
}
function reveal(){
  var it=S.queue[S.pos];var c=it.card;
  var ans=$('ansBox');ans.innerHTML=c.a;ans.classList.add('show');
  S.seen++;
  var last=(S.pos+1>=S.queue.length);
  setFoot([
    {label:'✗ Nochmal',cls:'bad',fn:function(){next();}},
    {label:'✓ Gewusst',cls:'good',fn:function(){S.known++;next();}}
  ]);
  try{ans.scrollIntoView({block:'center',behavior:'smooth'});}catch(e){}
}
function finish(){
  $('pfill').style.width='100%';
  $('quizView').classList.add('hidden');$('resultView').classList.remove('hidden');
  var pct=S.seen?Math.round(S.known/S.seen*100):0;
  var col=pct>=80?'var(--good)':(pct>=50?'var(--gold)':'var(--bad)');
  $('resRing').style.background='conic-gradient('+col+' '+pct+'%, var(--line) 0)';
  $('resRing').innerHTML='<div style="width:100px;height:100px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-size:26px;font-weight:800">'+pct+'%</div>';
  $('resTitle').textContent=(pct>=80?'🏆 ':(pct>=50?'👍 ':'📚 '))+S.known+' von '+S.seen+' gewusst';
  $('resPills').innerHTML='<span class="pill">'+S.label+'</span><span class="pill">'+S.queue.length+' Karten</span>';
}
$('resHome').onclick=renderHome;
$('resAgain').onclick=function(){ if(S){ var ids=[];S.queue.forEach(function(it){if(ids.indexOf(it.bi)<0)ids.push(it.bi);}); startSession(ids,S.label);} };

renderHome();
</script>
</body>
</html>
