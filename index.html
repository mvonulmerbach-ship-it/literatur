ch":"Realismus","icon":"🛶","summary":"Der Ausreißer Huckleberry Finn flieht vor seinem gewalttätigen Vater und der Zivilisation und treibt mit dem entlaufenen Sklaven Jim auf einem Floß den Mississippi hinab. Auf ihrer Reise durch den amerikanischen Süden begegnen sie Betrügern, Gewalt und Heuchelei. Mark Twains in Umgangssprache erzählter Roman gilt als Wegbereiter der modernen amerikanischen Literatur und als scharfe Kritik an Sklaverei und Scheinmoral.","cards":[{"r":"Inhalt","q":"Wer ist Huckleberry Finn?","a":"Ein etwa dreizehnjähriger Außenseiterjunge, der die bürgerliche Erziehung ablehnt und vor seinem trunksüchtigen, gewalttätigen Vater flieht."},{"r":"Inhalt","q":"Mit wem reist Huck?","a":"Mit Jim, einem entlaufenen Sklaven, der seiner drohenden Verkaufstrennung von der Familie entkommen will. Gemeinsam treiben sie auf einem Floß den Mississippi hinunter."},{"r":"Inhalt","q":"Welche Figuren treffen sie unterwegs?","a":"Unter anderem zwei Hochstapler, die sich 'Herzog' und 'König' nennen und die Gutgläubigkeit der Flussanwohner ausnutzen."},{"r":"Inhalt","q":"Wie endet die Geschichte?","a":"Jim wird gefangen, dann aber freigelassen – seine frühere Besitzerin hatte ihn im Testament befreit. Huck will lieber in den Westen ziehen, als sich erneut 'zivilisieren' zu lassen."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Mark Twain (Samuel Clemens), veröffentlicht 1884/85. Er kannte das Leben am Mississippi aus eigener Erfahrung als Lotse."},{"r":"Autor","q":"Warum war der Roman umstritten?","a":"Wegen seiner derben Sprache und Themen; später vor allem wegen des durchgängig verwendeten rassistischen Vokabulars der Zeit, das bis heute Debatten auslöst."},{"r":"Interpretation","q":"Was ist das Besondere an der Erzählweise?","a":"Huck erzählt selbst, in ungeschliffener Umgangssprache und Dialekt. Diese authentische Stimme brach mit der gehobenen Literatursprache und wirkt bis heute modern."},{"r":"Interpretation","q":"Welchen moralischen Konflikt durchlebt Huck?","a":"Er glaubt, es sei 'Sünde', Jim zur Flucht zu verhelfen, entscheidet sich aber aus Freundschaft dagegen, ihn zu verraten – sein Herz siegt über die anerzogene Moral der Sklavenhaltergesellschaft."},{"r":"Interpretation","q":"Wofür steht der Fluss?","a":"Der Mississippi bedeutet Freiheit, Bewegung und Natur – im Gegensatz zum Ufer, das für Zivilisation, Gewalt und gesellschaftliche Zwänge steht."},{"r":"Interpretation","q":"Was kritisiert der Roman?","a":"Sklaverei, Rassismus, religiöse Heuchelei und die 'zivilisierte' Scheinmoral des amerikanischen Südens."},{"r":"Interpretation","q":"Wie ist der Schluss zu deuten?","a":"Hucks Wunsch, in den Westen zu fliehen, drückt die Sehnsucht nach ungebundener Freiheit aus – und einen skeptischen Blick auf die Gesellschaft."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Hemingway nannte ihn den Ursprung der modernen amerikanischen Literatur; er gilt als einer der einflussreichsten US-Romane überhaupt."},{"r":"Einfluss","q":"Wie wirkt das Werk bis heute?","a":"Es ist Schulklassiker und Streitobjekt zugleich – gefeiert für seine Menschlichkeit, diskutiert wegen seiner Sprache."}]},{"title":"Der alte Mann und das Meer","author":"Ernest Hemingway","year":1952,"land":"Kuba","epoch":"Moderne","icon":"🎣","summary":"Der alte kubanische Fischer Santiago hat seit 84 Tagen nichts gefangen. Weit draußen auf dem Meer beißt endlich ein riesiger Marlin an, den er in einem tage­langen, erschöpfenden Kampf bezwingt – nur um zusehen zu müssen, wie Haie seine Beute auf dem Heimweg zerfleischen. Hemingways schmale, kraftvolle Erzählung ist ein Gleichnis über Würde, Ausdauer und die stille Größe im Scheitern.","cards":[{"r":"Inhalt","q":"Wer ist Santiago?","a":"Ein alter, armer kubanischer Fischer, der seit 84 Tagen keinen Fisch gefangen hat und als vom Pech verfolgt gilt."},{"r":"Inhalt","q":"Was fängt er?","a":"Weit draußen im Golfstrom beißt ein gewaltiger Marlin an, größer als sein Boot. Zwei Tage und Nächte kämpft Santiago mit der Leine, bis er das Tier erlegt."},{"r":"Inhalt","q":"Was geschieht auf dem Heimweg?","a":"Blut lockt Haie an, die den an das Boot gebundenen Marlin Stück für Stück zerreißen. Santiago wehrt sich verzweifelt, doch am Ufer bleibt nur das Skelett."},{"r":"Inhalt","q":"Welche Rolle spielt der Junge Manolin?","a":"Der Junge liebt und umsorgt Santiago wie ein Enkel. Am Ende sitzt er weinend an seiner Seite und will wieder mit ihm hinausfahren."},{"r":"Autor","q":"Wer schrieb die Erzählung?","a":"Ernest Hemingway, veröffentlicht 1952. Es war sein letztes großes zu Lebzeiten erschienenes Werk."},{"r":"Autor","q":"Welche Auszeichnungen brachte das Werk?","a":"Es trug maßgeblich zum Pulitzer-Preis (1953) und zum Literaturnobelpreis (1954) für Hemingway bei."},{"r":"Interpretation","q":"Was bedeutet Santiagos Satz über Niederlage?","a":"Sein Gedanke, ein Mensch könne vernichtet, aber nicht besiegt werden, fasst die Botschaft: Würde liegt im unbeugsamen Kampf, nicht im Erfolg."},{"r":"Interpretation","q":"Wofür steht der Kampf mit dem Marlin?","a":"Für den Kampf des Menschen mit der Natur, dem Schicksal und dem Alter – geführt mit Respekt vor dem Gegner, den Santiago 'Bruder' nennt."},{"r":"Interpretation","q":"Ist die Erzählung ein Gleichnis?","a":"Ja, sie wird oft symbolisch gelesen – auch mit christlichen Anklängen (Santiagos wunde Hände, das Tragen des Mastes). Hemingway selbst betonte jedoch die konkrete Ebene."},{"r":"Interpretation","q":"Was kennzeichnet Hemingways Stil?","a":"Der berühmte 'Eisberg-Stil': knappe, klare Sätze, in denen das Wesentliche unter der Oberfläche mitschwingt, statt ausgesprochen zu werden."},{"r":"Interpretation","q":"Ist das Ende Triumph oder Niederlage?","a":"Beides: Santiago verliert die Beute, bewahrt aber seine Würde und den Respekt der Menschen – ein Sieg im Scheitern."},{"r":"Einfluss","q":"Welchen Rang hat das Werk?","a":"Es gilt als moderner Klassiker und als eindrückliches Gleichnis über Mut, Ausdauer und die Würde des Menschen."},{"r":"Einfluss","q":"Warum ist die Novelle so populär?","a":"Ihre schlichte, kraftvolle Sprache und die zeitlose Botschaft machen sie zu einem der meistgelesenen Kurzromane des 20. Jahrhunderts."}]},{"title":"Michael Kohlhaas","author":"Heinrich von Kleist","year":1810,"land":"Deutschland","epoch":"Romantik / Klassik","icon":"🐴","summary":"Dem rechtschaffenen Pferdehändler Michael Kohlhaas widerfährt Unrecht: Ein Junker beschlagnahmt widerrechtlich zwei seiner Pferde und misshandelt seinen Knecht. Als ihm die Gerichte den Rechtsweg verweigern, wird der ehrbare Bürger zum gewalttätigen Rächer, der ganze Städte in Brand setzt. Kleists Novelle fragt eindringlich, was geschieht, wenn der Staat dem Einzelnen die Gerechtigkeit versagt.","cards":[{"r":"Inhalt","q":"Wer ist Michael Kohlhaas?","a":"Ein wohlhabender, rechtschaffener Rosshändler im 16. Jahrhundert, den Kleist zu Beginn als vorbildlichen Bürger beschreibt."},{"r":"Inhalt","q":"Welches Unrecht erleidet er?","a":"Der Junker Wenzel von Tronka hält widerrechtlich zwei Pferde als 'Zoll' zurück, gibt sie abgemagert zurück und lässt Kohlhaas' Knecht misshandeln."},{"r":"Inhalt","q":"Wie reagiert Kohlhaas?","a":"Er verlangt vor Gericht Wiedergutmachung. Als seine Klagen durch Vetternwirtschaft abgewiesen werden und seine Frau bei einer Bittschrift zu Tode kommt, greift er zur Selbstjustiz."},{"r":"Inhalt","q":"Wie eskaliert die Rache?","a":"Kohlhaas sammelt eine bewaffnete Schar, überfällt die Burg des Junkers und brandschatzt ganze Städte, um seiner ausgebliebenen Gerechtigkeit willen."},{"r":"Inhalt","q":"Wie endet die Novelle?","a":"Kohlhaas erhält am Ende sein Recht – die Pferde werden ersetzt, der Junker bestraft. Zugleich wird Kohlhaas für seine Gewalttaten zum Tode verurteilt und hingerichtet."},{"r":"Autor","q":"Wer schrieb Michael Kohlhaas?","a":"Heinrich von Kleist, veröffentlicht 1810; die Novelle beruht lose auf einer historischen Gestalt des 16. Jahrhunderts."},{"r":"Autor","q":"Wie steht die Novelle in Kleists Werk?","a":"Sie gilt als seine bedeutendste Erzählung und als Musterbeispiel seiner nüchternen, kraftvollen Prosa mit langen, gespannten Sätzen."},{"r":"Interpretation","q":"Worin liegt der zentrale Konflikt?","a":"Im Widerstreit zwischen dem berechtigten Verlangen nach Recht und der zerstörerischen Selbstjustiz, zu der es führt, wenn der Staat versagt."},{"r":"Interpretation","q":"Ist Kohlhaas Held oder Verbrecher?","a":"Beides: Kleist nennt ihn einen der 'rechtschaffensten und zugleich entsetzlichsten' Menschen – ein aufrechter Mann, dessen absoluter Gerechtigkeitssinn ihn zum Massenmörder macht."},{"r":"Interpretation","q":"Was sagt die Novelle über den Rechtsstaat?","a":"Dass Recht ohne Durchsetzbarkeit wertlos ist. Wo der Staat den Rechtsweg verweigert, droht die Ordnung selbst in Gewalt umzuschlagen."},{"r":"Interpretation","q":"Welche Bedeutung hat das Ende?","a":"Kohlhaas bekommt Recht und Strafe zugleich – die Ordnung wird wiederhergestellt, aber um den Preis seines Lebens. Recht und Gerechtigkeit fallen tragisch auseinander."},{"r":"Einfluss","q":"Welchen Rang hat die Novelle?","a":"Sie gilt als eine der großen deutschen Novellen und als zeitloses Werk über Recht, Unrecht und Widerstand."},{"r":"Einfluss","q":"Wie wirkt der Stoff nach?","a":"Der 'Fall Kohlhaas' wurde zum Sinnbild für den Menschen, der aus verweigerter Gerechtigkeit zum Rebellen wird; der Stoff wurde mehrfach verfilmt und adaptiert."}]},{"title":"Die Wahlverwandtschaften","author":"Johann Wolfgang von Goethe","year":1809,"land":"Deutschland","epoch":"Weimarer Klassik / Romantik","icon":"⚗️","summary":"Das wohlhabende Ehepaar Eduard und Charlotte lebt zurückgezogen auf dem Land, bis der Freund Hauptmann und Charlottes Nichte Ottilie hinzukommen. Wie chemische Stoffe, die sich neu verbinden, ziehen sich Eduard und Ottilie sowie Charlotte und der Hauptmann an. Goethe verwebt dieses Beziehungsexperiment mit der Frage, ob Leidenschaft oder Pflicht, Natur oder Sittlichkeit den Menschen bestimmen soll.","cards":[{"r":"Inhalt","q":"Wer sind die vier Hauptfiguren?","a":"Das Ehepaar Eduard und Charlotte sowie ihre Gäste: Eduards Freund, der Hauptmann, und Charlottes Nichte Ottilie."},{"r":"Inhalt","q":"Was besagt die Titel-Metapher?","a":"'Wahlverwandtschaft' ist ein chemischer Begriff: Stoffe verlassen ihre Verbindung, um eine neue einzugehen. Analog lösen sich die Ehepaare und ziehen zu neuen Partnern."},{"r":"Inhalt","q":"Wie entwickeln sich die Beziehungen?","a":"Eduard verliebt sich leidenschaftlich in Ottilie, Charlotte fühlt sich zum Hauptmann hingezogen. Die alte Ordnung der Ehe gerät ins Wanken."},{"r":"Inhalt","q":"Welche Katastrophe geschieht?","a":"Charlottes und Eduards Kind ertrinkt, während Ottilie es beaufsichtigt. Aus Schuld und Entsagung verweigert Ottilie sich fortan der Liebe und verhungert langsam."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Ottilie stirbt, kurz darauf auch der gebrochene Eduard. Sie werden nebeneinander bestattet – im Tod vereint, was das Leben nicht erlaubte."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Johann Wolfgang von Goethe, veröffentlicht 1809 – ein Alterswerk von großer formaler Strenge."},{"r":"Autor","q":"Wie steht das Werk in Goethes Schaffen?","a":"Es gilt als sein rätselhaftester Roman, in dem klassische Form und romantische, ja unheimliche Motive zusammentreffen."},{"r":"Interpretation","q":"Was fragt der Roman über die Liebe?","a":"Ob Leidenschaft ein unentrinnbares Naturgesetz ist, dem der Mensch wie ein chemischer Stoff folgt, oder ob Sittlichkeit und Entsagung darüber siegen können."},{"r":"Interpretation","q":"Wofür steht Ottilie?","a":"Für Entsagung und opferbereite Reinheit. Ihr Verzicht bis zum Tod gibt ihr fast heiligenhafte Züge und stellt die Frage nach Schuld und Sühne."},{"r":"Interpretation","q":"Welche Rolle spielt das Chemie-Gleichnis?","a":"Es legt nahe, dass menschliche Bindungen naturgesetzlichen Kräften folgen. Der Roman lässt offen, ob der Mensch dagegen frei entscheiden kann."},{"r":"Interpretation","q":"Ist der Roman moralisch eindeutig?","a":"Nein. Goethe wertet nicht offen, sondern zeigt das tragische Zusammenspiel von Leidenschaft, Pflicht, Zufall und Schuld in kühler, distanzierter Erzählweise."},{"r":"Einfluss","q":"Welchen Rang hat das Werk?","a":"Es gilt als einer der bedeutendsten deutschen Romane und als früher Vorläufer des modernen psychologischen Eheromans."},{"r":"Einfluss","q":"Warum fasziniert der Roman bis heute?","a":"Wegen seiner Mehrdeutigkeit, der kühlen Symbolik und der modernen Frage nach der Freiheit des Willens gegenüber der Macht der Gefühle."}]},{"title":"Jane Eyre","author":"Charlotte Brontë","year":1847,"land":"England","epoch":"Viktorianische Zeit","icon":"🕯️","summary":"Die Waise Jane Eyre wächst lieblos bei Verwandten und in einem strengen Internat auf, behauptet aber früh ihren Stolz und ihre moralische Unabhängigkeit. Als Gouvernante auf Thornfield Hall verliebt sie sich in den düsteren Mr. Rochester – bis ein dunkles Geheimnis die Hochzeit sprengt. Charlotte Brontës Roman verbindet Liebesgeschichte, Gesellschaftskritik und die Emanzipation einer Frau, die sich nie unter ihren Wert verkauft.","cards":[{"r":"Inhalt","q":"Wie beginnt Janes Leben?","a":"Als Waise wächst sie ungeliebt bei ihrer Tante Reed auf und wird dann in das karge, strenge Internat Lowood geschickt, wo sie Entbehrung und den Tod einer Freundin erlebt."},{"r":"Inhalt","q":"Wie kommt Jane nach Thornfield?","a":"Als junge Frau wird sie Gouvernante auf Thornfield Hall und unterrichtet das Mündel des reichen, verschlossenen Edward Rochester."},{"r":"Inhalt","q":"Welches Geheimnis verbirgt Rochester?","a":"Am Tag der Hochzeit enthüllt sich, dass Rochester bereits verheiratet ist – seine geisteskranke Frau Bertha lebt eingesperrt im Dachgeschoss von Thornfield."},{"r":"Inhalt","q":"Warum verlässt Jane Thornfield?","a":"Aus Selbstachtung weigert sie sich, Rochesters Geliebte zu werden, und flieht mittellos, statt ihre Grundsätze aufzugeben."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Jane erbt Vermögen, kehrt zurück und findet Thornfield abgebrannt, Bertha tot und Rochester erblindet. Nun als Gleiche heiratet sie ihn."},{"r":"Autor","q":"Wer schrieb Jane Eyre?","a":"Charlotte Brontë, die älteste der schreibenden Brontë-Schwestern; 1847 erschienen unter dem Pseudonym 'Currer Bell'."},{"r":"Autor","q":"Was floss aus Charlottes Leben ein?","a":"Ihre eigenen Erfahrungen in einer strengen Schule und als Gouvernante prägten die Schilderung von Lowood und Janes Berufsleben."},{"r":"Interpretation","q":"Warum gilt Jane Eyre als moderne Heldin?","a":"Weil sie – arm, klein und unscheinbar – auf ihrer Würde, moralischen Autonomie und Gleichberechtigung beharrt, statt sich Männern oder Ständen unterzuordnen."},{"r":"Interpretation","q":"Wofür steht Bertha, die Frau im Dachgeschoss?","a":"Sie gilt als vieldeutiges Symbol – der unterdrückte Wahnsinn, das koloniale 'Andere' und die dunkle Kehrseite der viktorianischen Ehe."},{"r":"Interpretation","q":"Welche Rolle spielt die Religion?","a":"Jane sucht einen eigenen, mitfühlenden Glauben zwischen dem freudlosen Eifer Brocklehursts und der kalten Pflichtstrenge St. John Rivers'."},{"r":"Interpretation","q":"Warum ist die Ich-Erzählung wichtig?","a":"Janes direkte Anrede an den Leser ('Leser, ich heiratete ihn') schafft Nähe und macht ihre innere Entwicklung und Selbstbehauptung unmittelbar erfahrbar."},{"r":"Interpretation","q":"Was bedeutet das Ende für die Beziehung?","a":"Erst als Rochester geschwächt und Jane wohlhabend und unabhängig ist, begegnen sie sich als Gleichberechtigte – Liebe auf Augenhöhe statt Abhängigkeit."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als Klassiker der englischen Literatur und als früher Meilenstein der weiblichen Selbstbehauptung im Roman."},{"r":"Einfluss","q":"Wie wirkt Jane Eyre nach?","a":"Der Roman prägte den Typus der eigenständigen Heldin, wurde vielfach verfilmt und inspirierte Werke wie Jean Rhys' Gegenerzählung aus Berthas Sicht."}]},{"title":"Schöne neue Welt","author":"Aldous Huxley","year":1932,"land":"England","epoch":"Moderne / Dystopie","icon":"🧪","summary":"In einer Weltordnung des Jahres 632 'nach Ford' werden Menschen im Reagenzglas erzeugt, in Kasten programmiert und durch die Droge Soma dauerhaft glücklich gehalten. Als der 'Wilde' John, außerhalb dieses Systems aufgewachsen, in die perfekte Konsumgesellschaft gerät, prallen Freiheit und Stabilität, Individuum und Konditionierung aufeinander. Huxleys Roman ist neben Orwells 1984 die berühmteste Dystopie der Moderne.","cards":[{"r":"Inhalt","q":"Wie ist die Gesellschaft organisiert?","a":"Menschen werden künstlich gezüchtet und schon als Embryonen in feste Kasten (von Alpha bis Epsilon) eingeteilt und auf ihre Rolle konditioniert."},{"r":"Inhalt","q":"Womit wird Stabilität gesichert?","a":"Durch genetische Steuerung, ständige Konditionierung, hemmungslosen Konsum, freie Sexualität und die glücklich machende Droge Soma – Unzufriedenheit wird ausgeschaltet."},{"r":"Inhalt","q":"Wer ist der 'Wilde' John?","a":"Ein außerhalb der Zivilisation in einem Reservat geborener junger Mann, der Shakespeare liebt und mit den Werten der 'schönen neuen Welt' nicht zurechtkommt."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"John lehnt die konditionierte Glücksgesellschaft ab, zieht sich als Einsiedler zurück, wird aber als Attraktion belagert und nimmt sich schließlich das Leben."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Aldous Huxley, veröffentlicht 1932, als Reaktion auf Fortschrittsoptimismus, Massenproduktion und die Fließbandkultur der Zeit."},{"r":"Autor","q":"Worauf spielt 'nach Ford' an?","a":"Auf Henry Ford und das Fließband: Die Zeitrechnung beginnt mit ihm, und Ford wird wie ein Gott verehrt – Symbol der Vergötterung von Technik und Massenfertigung."},{"r":"Interpretation","q":"Worin unterscheidet sich die Dystopie von 1984?","a":"Während in Orwells 1984 Zwang und Angst herrschen, funktioniert Huxleys Diktatur durch Lust, Konsum und Ablenkung – die Menschen lieben ihre Unfreiheit."},{"r":"Interpretation","q":"Was ist der Preis der Stabilität?","a":"Kunst, Wissenschaft, Religion, Familie und tiefe Gefühle werden geopfert. Es gibt kein Leid – aber auch keine Freiheit, Wahrheit und Menschlichkeit."},{"r":"Interpretation","q":"Wofür steht die Droge Soma?","a":"Für die Flucht vor jeder Unannehmlichkeit: ein Rauschmittel, das die Bürger ruhigstellt und jeden Ansatz von Kritik oder Unglück auflöst."},{"r":"Interpretation","q":"Welche Rolle spielt Shakespeare?","a":"Johns Zitate aus Shakespeare verkörpern Leidenschaft, Tragik und Individualität – all das, was die konditionierte Welt abgeschafft hat."},{"r":"Interpretation","q":"Was fordert John im Streitgespräch?","a":"Das 'Recht auf Unglück' – auf Leid, Alter, Krankheit und Gott. Er lehnt ein Glück ab, das mit dem Verlust von Freiheit und Wahrheit erkauft ist."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt neben 1984 als einflussreichste Dystopie des 20. Jahrhunderts und als Warnung vor Gen-Manipulation und Konsumkonditionierung."},{"r":"Einfluss","q":"Warum gilt Huxleys Vision als hellsichtig?","a":"Weil sie eine Kontrolle durch Vergnügen, Konsum und Ablenkung vorwegnahm – für viele eine treffende Beschreibung moderner Mediengesellschaften."}]}]</script>
<script>
const BOOKS = JSON.parse(document.getElementById('bookdata').textContent);
BOOKS.forEach((b,i)=>b._i=i);
const $=id=>document.getElementById(id);
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
var POINTS=10;
var store;try{store=JSON.parse(localStorage.getItem("lit_store"))||{};}catch(e){store={};}
store.xp=store.xp||0;store.right=store.right||0;store.wrong=store.wrong||0;
function saveStore(){try{localStorage.setItem("lit_store",JSON.stringify(store));}catch(e){}}
function refreshXP(){var p=document.getElementById("xpPill");if(p)p.textContent="⭐ "+store.xp;}

/* theme */
var theme=localStorage.getItem('lit_theme')||'light';
document.documentElement.setAttribute('data-theme',theme);
$('themeBtn').onclick=function(){theme=theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('lit_theme',theme);};

/* ---------- HOME ---------- */
var curFilter='Alle';
function epochs(){var s=['Alle'];BOOKS.forEach(b=>{if(s.indexOf(b.epoch)<0)s.push(b.epoch);});return s;}
function renderHome(){
  $('homeView').classList.remove('hidden');$('quizView').classList.add('hidden');$('resultView').classList.add('hidden');
  var total=BOOKS.reduce((s,b)=>s+b.cards.length,0);
  var bs=$('bannerSlot');bs.innerHTML='';
  var ban=el('div','banner','<span class="em">🎲</span><div><b>Alles gemischt</b><small>'+BOOKS.length+' Werke · '+total+' Karten · Pakete bleiben zusammen</small></div><span class="go">›</span>');
  ban.onclick=function(){startSession(BOOKS.map(b=>b._i),'🎲 Alle Werke');};
  bs.appendChild(ban);
  // filters
  var fs=$('filterSlot');fs.innerHTML='';
  var row=el('div','filters');
  epochs().forEach(function(ep){
    var c=el('button','chip'+(ep===curFilter?' on':''),ep);
    c.onclick=function(){curFilter=ep;renderHome();};
    row.appendChild(c);
  });
  fs.appendChild(el('div','sectit','Nach Epoche filtern'));
  fs.appendChild(row);
  // list
  var list=$('bookList');list.innerHTML='';
  list.appendChild(el('div','sectit','Werke'+(curFilter!=='Alle'?' · '+curFilter:'')));
  BOOKS.filter(b=>curFilter==='Alle'||b.epoch===curFilter).forEach(function(b){
    var card=el('button','book');
    card.innerHTML='<span class="cov serif">'+(b.icon||'📖')+'</span>'+
      '<span class="tx"><span class="tt serif">'+b.title+'</span><span class="au">'+b.author+'</span>'+
      '<span class="meta">'+b.year+' · '+b.land+' · '+b.epoch+'</span></span>'+
      '<span class="cnt">'+b.cards.length+'<br>Karten</span>';
    card.onclick=function(){startSession([b._i], b.title);};
    list.appendChild(card);
  });
}

/* ---------- SESSION with PACKETS ---------- */
var S=null;
function startSession(bookIdxs,label){
  // build packets: each book's cards shuffled, but kept together; packet ORDER shuffled
  var packets=shuffle(bookIdxs.slice()).map(function(bi){
    return {bi:bi, cards:shuffle(BOOKS[bi].cards.slice())};
  });
  var queue=[];
  packets.forEach(function(p){
    queue.push({kind:'intro',bi:p.bi});
    p.cards.forEach(function(c){queue.push({kind:'card',bi:p.bi,card:c});});
  });
  S={queue:queue,pos:0,right:0,wrong:0,seen:0,points:0,label:label};
  $('homeView').classList.add('hidden');$('resultView').classList.add('hidden');$('quizView').classList.remove('hidden');
  render();
}
$('backBtn').onclick=function(){ if(confirm('Lernrunde beenden?')) renderHome(); };
function setFoot(btns){var f=$('footSlot');f.innerHTML='';btns.forEach(function(b){var x=el('button','btn'+(b.cls?' '+b.cls:''),b.label);x.onclick=b.fn;f.appendChild(x);});}
function progress(){$('pfill').style.width=(S.pos/S.queue.length*100)+'%';var it=S.queue[S.pos];$('qcount').textContent=(S.pos+1)+' / '+S.queue.length;}
function next(){S.pos++;if(S.pos>=S.queue.length)finish();else render();}
function render(){
  progress();
  var it=S.queue[S.pos];var b=BOOKS[it.bi];
  var slot=$('cardSlot');slot.innerHTML='';
  var card=el('div','card');
  if(it.kind==='intro'){
    card.innerHTML='<span class="kick k-Buch">Neues Paket</span>'+
      '<div class="intrott serif">'+b.title+'</div>'+
      '<div class="introau">'+b.author+' · '+b.year+'</div>'+
      '<div class="introsum">'+b.summary+'</div>'+
      '<div class="intrometa"><span class="tag">'+b.land+'</span><span class="tag">'+b.epoch+'</span><span class="tag">'+b.cards.length+' Karten</span></div>';
    slot.appendChild(card);
    setFoot([{label:'Los geht’s →',fn:next}]);
    window.scrollTo(0,0);return;
  }
  var c=it.card;
  card.innerHTML='<span class="kick k-'+c.r+'">'+c.r+' · '+b.title+'</span><div class="qtext serif">'+c.q+'</div>';
  var ans=el('div','ans');ans.id='ansBox';
  var mfb=el('div','markfb');mfb.id='markFb';
  slot.appendChild(card);card.appendChild(ans);card.appendChild(mfb);
  setFoot([{label:'Antwort zeigen',fn:reveal}]);
  window.scrollTo(0,0);
}
function reveal(){
  var it=S.queue[S.pos];var c=it.card;
  var ans=$('ansBox');ans.innerHTML=c.a;ans.classList.add('show');
  setFoot([
    {label:'✗ Nicht gewusst',cls:'bad',fn:function(){mark(false);}},
    {label:'✓ Gewusst',cls:'good',fn:function(){mark(true);}}
  ]);
  try{ans.scrollIntoView({block:'center',behavior:'smooth'});}catch(e){}
}
function mark(correct){
  S.seen++;
  if(correct){S.right++;S.points+=POINTS;store.xp+=POINTS;store.right++;}
  else{S.wrong++;store.wrong++;}
  saveStore();refreshXP();
  var fb=$('markFb');
  if(fb){fb.className='markfb show '+(correct?'ok':'no');fb.textContent=correct?('✓ Richtig  ·  +'+POINTS+' Punkte'):'✗ Falsch';}
  var last=(S.pos+1>=S.queue.length);
  setFoot([{label:last?'Ergebnis ansehen':'Weiter ›',fn:next}]);
}
function finish(){
  $('pfill').style.width='100%';
  $('quizView').classList.add('hidden');$('resultView').classList.remove('hidden');
  var pct=S.seen?Math.round(S.right/S.seen*100):0;
  var col=pct>=80?'var(--good)':(pct>=50?'var(--gold)':'var(--bad)');
  $('resRing').style.background='conic-gradient('+col+' '+pct+'%, var(--line) 0)';
  $('resRing').innerHTML='<div style="width:100px;height:100px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-size:26px;font-weight:800">'+pct+'%</div>';
  $('resTitle').textContent=(pct>=80?'🏆 ':(pct>=50?'👍 ':'📚 '))+S.right+' von '+S.seen+' richtig';
  $('resPills').innerHTML='<span class="pill">✓ '+S.right+' richtig</span><span class="pill">✗ '+S.wrong+' falsch</span><span class="pill">+'+S.points+' Punkte</span><span class="pill">⭐ '+store.xp+' gesamt</span>';
}
$('resHome').onclick=renderHome;
$('resAgain').onclick=function(){ if(S){ var ids=[];S.queue.forEach(function(it){if(ids.indexOf(it.bi)<0)ids.push(it.bi);}); startSession(ids,S.label);} };

refreshXP();
renderHome();
</script>
</body>
</html>
