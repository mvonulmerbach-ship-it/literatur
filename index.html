<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<meta name="theme-color" content="#7a3b2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
:root{--bg:#f6f1e7;--card:#fffdf8;--ink:#2a2622;--soft:#6f675d;--line:#e5dccb;--brand:#7a3b2e;--brand2:#9c5a3c;--gold:#c08a2d;--good:#3f7d54;--bad:#b04b3c;--shadow:0 6px 20px rgba(60,40,20,.10)}
html[data-theme=dark]{--bg:#1c1917;--card:#262220;--ink:#efe8dd;--soft:#a99f92;--line:#39332e;--brand:#c8785c;--brand2:#d99873;--shadow:0 6px 20px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
.serif{font-family:Georgia,"Times New Roman",serif}
.wrap{max-width:600px;margin:0 auto;padding:0 16px calc(24px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:30;background:var(--bg);padding:calc(12px + env(safe-area-inset-top)) 0 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
header .logo{width:38px;height:38px;border-radius:11px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:20px}
header b{font-size:18px}
header .sp{margin-left:auto}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 11px;font-size:15px;color:var(--ink);cursor:pointer}
.hidden{display:none!important}
.banner{margin:16px 0 6px;border-radius:18px;padding:18px 18px;color:#fff;background:linear-gradient(135deg,var(--brand),#5c2a20);display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow)}
.banner .em{font-size:30px}
.banner b{font-size:18px;display:block}
.banner small{opacity:.9;font-size:13px}
.banner .go{margin-left:auto;font-size:26px;opacity:.8}
.sectit{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-weight:800;margin:20px 4px 8px}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 4px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.book{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin:9px 0;box-shadow:var(--shadow);cursor:pointer;color:var(--ink)}
.book .cov{flex:0 0 auto;width:44px;height:58px;border-radius:8px;background:linear-gradient(135deg,var(--brand2),var(--brand));color:#fff;display:grid;place-items:center;font-size:22px;box-shadow:0 3px 8px rgba(0,0,0,.2)}
.book .tx{flex:1;min-width:0}
.book .tt{font-weight:800;font-size:16px;line-height:1.2}
.book .au{color:var(--soft);font-size:13px;margin-top:2px}
.book .meta{color:var(--soft);font-size:12px;margin-top:3px}
.book .cnt{flex:0 0 auto;font-size:12px;color:var(--soft);text-align:right}
.pbar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:14px 0 6px}
.pbar>div{height:100%;background:var(--brand);width:0;transition:width .25s}
.qcount{font-size:12px;color:var(--soft);text-align:center;margin-bottom:6px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;box-shadow:var(--shadow);margin-top:8px}
.kick{display:inline-block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;padding:4px 10px;border-radius:999px;margin-bottom:12px}
.k-Inhalt{background:#e7f0e9;color:#2f6b45}.k-Autor{background:#efe7f3;color:#6a4c93}.k-Interpretation{background:#f3e7dd;color:#9c5a3c}.k-Einfluss{background:#e6eef4;color:#2f5d8a}.k-Buch{background:var(--brand);color:#fff}
html[data-theme=dark] .k-Inhalt,html[data-theme=dark] .k-Autor,html[data-theme=dark] .k-Interpretation,html[data-theme=dark] .k-Einfluss{background:#39332e;color:var(--ink)}
.qtext{font-size:19px;line-height:1.4;font-weight:600}
.ans{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;font-size:16px;line-height:1.55;color:var(--ink)}
.ans.show{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.intrott{font-size:26px;font-weight:800;line-height:1.15;margin:2px 0 4px}
.introau{font-size:16px;color:var(--soft);margin-bottom:10px}
.introsum{font-size:16px;line-height:1.6}
.intrometa{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 2px}
.tag{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:4px 11px;font-size:12px;color:var(--soft);font-weight:700}
.foot{position:sticky;bottom:0;background:linear-gradient(to top,var(--bg) 72%,transparent);padding:12px 0 calc(14px + env(safe-area-inset-bottom));display:flex;gap:10px}
.btn{flex:1;padding:15px;border-radius:14px;font-size:16px;font-weight:800;border:none;cursor:pointer;background:var(--brand);color:#fff}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
.btn.good{background:var(--good);color:#fff}
.btn.bad{background:var(--card);color:var(--bad);border:1.5px solid var(--bad)}
.xppill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:14px;font-weight:800;color:var(--brand)}
.markfb{display:none;margin-top:14px;border-radius:12px;padding:11px 14px;font-size:15px;font-weight:800;text-align:center}
.markfb.show{display:block;animation:fade .2s ease}
.markfb.ok{background:#e7f0e9;color:#2f6b45}
.markfb.no{background:#f6e5e2;color:#b04b3c}
html[data-theme=dark] .markfb.ok{background:#26362b;color:#8fd6a6}
html[data-theme=dark] .markfb.no{background:#3a2725;color:#e79b8f}
.result{text-align:center;padding:30px 10px}
.ring{width:120px;height:120px;border-radius:50%;margin:10px auto;display:grid;place-items:center}
.pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;margin:4px;font-size:13px;font-weight:700}
a.src{color:var(--soft);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo serif">📚</div>
    <b class="serif">Weltliteratur</b>
    <span class="sp"></span>
    <span id="xpPill" class="xppill">⭐ 0</span>
    <button class="iconbtn" id="themeBtn" title="Theme">🌗</button>
  </header>

  <!-- HOME -->
  <div id="homeView">
    <div id="bannerSlot"></div>
    <div id="filterSlot"></div>
    <div id="bookList"></div>
    <div class="sectit">Quelle & Hinweis</div>
    <p style="font-size:13px;color:var(--soft);line-height:1.5">Kanon-Auswahl u. a. nach dtv-Literaturkanon, „Die besten aller Zeiten\" und buchtipp.de (100 beste Bücher). Alle Inhalte, Zusammenfassungen und Deutungen sind eigenständig formuliert – keine Originalzitate.</p>
  </div>

  <!-- QUIZ -->
  <div id="quizView" class="hidden">
    <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
      <button class="iconbtn" id="backBtn">‹ Zurück</button>
      <div style="flex:1"></div>
      <div class="qcount" id="qcount" style="margin:0"></div>
    </div>
    <div class="pbar"><div id="pfill"></div></div>
    <div id="cardSlot"></div>
    <div class="foot" id="footSlot"></div>
  </div>

  <!-- RESULT -->
  <div id="resultView" class="hidden">
    <div class="result">
      <div class="ring" id="resRing"></div>
      <h2 class="serif" id="resTitle" style="margin:6px 0"></h2>
      <div id="resPills"></div>
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn ghost" id="resHome">Startseite</button>
        <button class="btn" id="resAgain">Nochmal</button>
      </div>
    </div>
  </div>
</div>

<script id="bookdata" type="application/json">[{"title":"Faust I","author":"Johann Wolfgang von Goethe","year":1808,"land":"Deutschland","epoch":"Weimarer Klassik","icon":"🔥","summary":"Der alternde Gelehrte Faust verzweifelt an den Grenzen des Wissens und schließt einen Pakt mit dem Teufel Mephisto. Er verführt das Bürgermädchen Gretchen und stürzt es ins Unglück. Das Werk gilt als das zentrale Drama der deutschen Literatur.","cards":[{"r":"Inhalt","q":"Worin besteht die Wette zwischen Faust und Mephisto?","a":"Mephisto dient Faust im Diesseits und zeigt ihm Genuss und Erkenntnis. Faust verliert seine Seele, sobald er einem Augenblick sagt: 'Verweile doch, du bist so schön' – also sobald er Genügen findet."},{"r":"Inhalt","q":"Wer ist Gretchen und was geschieht mit ihr?","a":"Margarete, ein junges, frommes Bürgermädchen. Faust verführt sie; sie wird schwanger, tötet in Verzweiflung ihr Kind, landet im Kerker und wird hingerichtet – am Ende aber als 'gerettet' bezeichnet."},{"r":"Inhalt","q":"Was geschieht in der 'Walpurgisnacht'?","a":"Mephisto führt Faust zum Hexensabbat auf dem Blocksberg, ein wüstes, sinnliches Treiben, das Faust von Gretchens drohendem Schicksal ablenken soll."},{"r":"Inhalt","q":"Womit rahmt Goethe die Handlung ein?","a":"Mit 'Zueignung', 'Vorspiel auf dem Theater' und dem 'Prolog im Himmel', in dem Gott und Mephisto um Fausts Seele wetten."},{"r":"Inhalt","q":"Wie kommt Gretchens Bruder Valentin zu Tode?","a":"Faust ersticht ihn mit Mephistos Hilfe im Duell; sterbend verflucht Valentin seine Schwester öffentlich."},{"r":"Autor","q":"Über welchen Zeitraum arbeitete Goethe am 'Faust'?","a":"Über rund 60 Jahre – vom 'Urfaust' der 1770er Jahre bis zur Vollendung des zweiten Teils kurz vor seinem Tod 1831/32."},{"r":"Autor","q":"Welchen literarischen Epochen ist Goethe zuzuordnen?","a":"Dem Sturm und Drang (jung) und vor allem der Weimarer Klassik."},{"r":"Autor","q":"Nenne ein weiteres Hauptwerk Goethes.","a":"Etwa 'Die Leiden des jungen Werther', 'Wilhelm Meisters Lehrjahre' oder 'Faust II'."},{"r":"Autor","q":"Mit welchem Dichter verband Goethe eine berühmte Freundschaft?","a":"Mit Friedrich Schiller – gemeinsam begründeten sie die Weimarer Klassik."},{"r":"Autor","q":"Welche Stellung hatte Goethe in Weimar?","a":"Er war nicht nur Dichter, sondern auch Minister und Berater am Hof des Herzogs von Sachsen-Weimar."},{"r":"Interpretation","q":"Wofür steht Fausts Klage von den 'zwei Seelen' in seiner Brust?","a":"Für den inneren Zwiespalt des Menschen zwischen sinnlicher Erdverhaftung und dem Streben nach geistiger Höhe."},{"r":"Interpretation","q":"Was meint das sprichwörtliche 'faustische' Streben?","a":"Ein rastloses, grenzenloses Streben nach Wissen und Erfahrung, das nie zur Ruhe kommt und sich mit nichts zufriedengibt."},{"r":"Interpretation","q":"Was ist neu am Pakt gegenüber der alten Teufelssage?","a":"Er ist als Wette gefasst: Faust wird nicht einfach verdammt; entscheidend ist, ob er je Stillstand und Genügen findet."},{"r":"Interpretation","q":"Was versteht man unter der 'Gretchenfrage'?","a":"Gretchens Frage 'Wie hast du's mit der Religion?' – sprichwörtlich für eine heikle, auf den Kern zielende Gewissensfrage."},{"r":"Interpretation","q":"Welche Gesellschaftskritik steckt in der Gretchentragödie?","a":"Kritik an Doppelmoral und der Ächtung der 'gefallenen' Frau: Gretchen trägt allein die Folgen, während Faust weiterzieht."},{"r":"Interpretation","q":"Wie ist Mephistos Selbstbeschreibung zu deuten?","a":"Er nennt sich 'ein Teil von jener Kraft, die stets das Böse will und stets das Gute schafft' – das Negative als paradox produktiver Antrieb."},{"r":"Interpretation","q":"Wie verhält sich im Drama Buchwissen zu gelebtem Leben?","a":"Faust wendet sich von der toten Gelehrsamkeit ab und sucht unmittelbares Erleben – eine Kritik an lebensfernem Rationalismus."},{"r":"Interpretation","q":"Wie ist der 'Prolog im Himmel' zu verstehen?","a":"In Anlehnung an das Buch Hiob: Der Mensch darf irren, solange er strebt; Gott vertraut darauf, dass Faust letztlich den rechten Weg findet."},{"r":"Interpretation","q":"Welche Bedeutung hat der Osterspaziergang?","a":"Motiv von Auferstehung und Erneuerung; im Kontrast zu Fausts innerer Enge – 'Hier bin ich Mensch, hier darf ich's sein'."},{"r":"Interpretation","q":"Warum gilt Faust zugleich als Held und als Schuldiger?","a":"Sein Streben ist bewundernswert, doch an Gretchen wird er moralisch schuldig – diese Ambivalenz ist der Kern der Tragödie."},{"r":"Interpretation","q":"Warum wird Faust oft 'deutsches Nationaldrama' genannt?","a":"Weil es zentrale Themen – Streben, Schuld, Erlösung – mit der Sprachkraft der Klassik verdichtet und tief im Bildungskanon verankert ist."},{"r":"Einfluss","q":"Welche späteren Werke greifen den Faust-Stoff auf?","a":"U.a. Thomas Manns 'Doktor Faustus', Bulgakows 'Meister und Margarita' sowie zahlreiche Opern (Gounod, Boito)."},{"r":"Einfluss","q":"Welche geflügelten Worte stammen aus dem Faust?","a":"'Gretchenfrage', 'des Pudels Kern', 'Grau ist alle Theorie' und 'Die Botschaft hör' ich wohl, allein mir fehlt der Glaube'."},{"r":"Einfluss","q":"Was bedeutet 'faustisch' als kulturkritischer Begriff?","a":"Oswald Spengler nutzte es für die rastlos strebende, grenzenlos expandierende 'abendländische' Kultur."},{"r":"Einfluss","q":"Wie prägte Faust die deutsche Bildungstradition?","a":"Als Pflichtlektüre und Theaterrepertoire wurde er zum Inbegriff des literarischen Kanons."}]},{"title":"Die Leiden des jungen Werther","author":"Johann Wolfgang von Goethe","year":1774,"land":"Deutschland","epoch":"Sturm und Drang","icon":"💌","summary":"Der junge Werther verliebt sich unglücklich in die bereits verlobte Lotte. In leidenschaftlichen Briefen schildert er seine wachsende Verzweiflung, bis er sich schließlich das Leben nimmt. Der Briefroman machte Goethe europaweit berühmt.","cards":[{"r":"Inhalt","q":"In welcher Form ist der Roman geschrieben?","a":"Als Briefroman – überwiegend aus Werthers Briefen an seinen Freund Wilhelm, ergänzt durch einen 'Herausgeber'-Bericht am Ende."},{"r":"Inhalt","q":"Warum ist Werthers Liebe zu Lotte aussichtslos?","a":"Lotte ist bereits mit dem soliden Albert verlobt bzw. verheiratet, den sie nicht verlassen will."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Werther erschießt sich mit Alberts geliehenen Pistolen; er stirbt qualvoll erst Stunden später."},{"r":"Inhalt","q":"Welche Rolle spielt Werthers Beruf?","a":"Eine gescheiterte Anstellung bei einer Gesandtschaft, wo ihn Standesdünkel demütigen, verstärkt seine Entfremdung von der Gesellschaft."},{"r":"Autor","q":"Wie alt war Goethe bei der Veröffentlichung?","a":"Erst 24 – der Roman von 1774 machte ihn schlagartig europaweit berühmt."},{"r":"Autor","q":"Welche persönlichen Erlebnisse flossen ein?","a":"Goethes Verliebtheit in die verlobte Charlotte Buff und der Suizid seines Bekannten Karl Wilhelm Jerusalem."},{"r":"Autor","q":"Welcher Epoche gehört der Werther an?","a":"Dem Sturm und Drang mit seiner Betonung von Gefühl, Natur und Individualität."},{"r":"Interpretation","q":"Was verkörpert Werther als Figur?","a":"Das empfindsame Sturm-und-Drang-Ich, das das Gefühl über Vernunft und gesellschaftliche Konvention stellt."},{"r":"Interpretation","q":"Was kritisiert der Roman an der Gesellschaft?","a":"Die starren Standesschranken und die Gefühlskälte einer rationalistischen, hierarchischen Ordnung."},{"r":"Interpretation","q":"Wofür steht die Natur im Werther?","a":"Sie spiegelt Werthers Seelenzustände – von frühlingshafter Harmonie bis zur bedrohlichen, stürmischen Auflösung."},{"r":"Interpretation","q":"Wie wird Werthers Suizid gedeutet?","a":"Ambivalent: als radikale Konsequenz absoluter Gefühlshingabe, aber auch als Scheitern an der Unfähigkeit zum Kompromiss."},{"r":"Interpretation","q":"Welche Rolle spielt Homer bzw. später Ossian?","a":"Der Wechsel von der heiteren Homer-Lektüre zum düsteren Ossian markiert Werthers Absturz in Schwermut."},{"r":"Interpretation","q":"Warum wirkte der Roman so stark auf die Zeitgenossen?","a":"Er traf das neue Lebensgefühl der Empfindsamkeit und gab dem individuellen Leiden erstmals radikalen Ausdruck."},{"r":"Einfluss","q":"Was war der 'Werther-Effekt'?","a":"Eine Welle von Nachahmungssuiziden; der Begriff bezeichnet bis heute mediale Nachahmungseffekte bei Suiziden."},{"r":"Einfluss","q":"Welche Modeerscheinung löste der Roman aus?","a":"Das 'Werther-Kostüm' (blauer Frack, gelbe Weste) und ein regelrechtes 'Werther-Fieber' in ganz Europa."},{"r":"Einfluss","q":"Welche Bedeutung hat der Roman literaturgeschichtlich?","a":"Er begründete den Ruhm des modernen Briefromans und machte das empfindsame Individuum zum literarischen Zentrum."}]},{"title":"Die Verwandlung","author":"Franz Kafka","year":1915,"land":"Österreich-Ungarn (Prag)","epoch":"Moderne / Expressionismus","icon":"🪲","summary":"Der Handlungsreisende Gregor Samsa erwacht eines Morgens als riesiges Ungeziefer verwandelt. Von seiner Familie zunehmend verstoßen, verkümmert und stirbt er. Die Erzählung gilt als Schlüsselwerk der literarischen Moderne.","cards":[{"r":"Inhalt","q":"Wie beginnt die Erzählung?","a":"Gregor Samsa erwacht 'aus unruhigen Träumen' und findet sich in ein 'ungeheures Ungeziefer' verwandelt – ohne dass je eine Ursache genannt wird."},{"r":"Inhalt","q":"Wovon lebte die Familie vor der Verwandlung?","a":"Allein von Gregors Arbeit als Handlungsreisender, mit der er auch die Schulden der Eltern abtrug."},{"r":"Inhalt","q":"Wie reagiert die Familie im Verlauf?","a":"Zuerst mit Schock und Fürsorge (v.a. die Schwester Grete), dann mit wachsendem Ekel, Vernachlässigung und schließlich dem Wunsch, ihn loszuwerden."},{"r":"Inhalt","q":"Wie stirbt Gregor?","a":"Verletzt (ein vom Vater geworfener Apfel bleibt in seinem Rücken stecken), vereinsamt und ausgehungert stirbt er; die Familie empfindet Erleichterung."},{"r":"Inhalt","q":"Wie endet die Erzählung?","a":"Die Familie macht einen Ausflug ins Grüne und blickt hoffnungsvoll auf die aufblühende Tochter Grete – als sei eine Last abgefallen."},{"r":"Autor","q":"Woher stammte Kafka und in welcher Sprache schrieb er?","a":"Aus Prag, aus einer deutschsprachigen jüdischen Familie; er schrieb auf Deutsch."},{"r":"Autor","q":"Welchen Brotberuf übte Kafka aus?","a":"Er war Jurist bei einer Arbeiter-Unfallversicherung; das Schreiben betrieb er 'nebenbei', oft nachts."},{"r":"Autor","q":"Was verfügte Kafka über seinen Nachlass?","a":"Er bat seinen Freund Max Brod, seine Manuskripte zu verbrennen – Brod veröffentlichte sie stattdessen."},{"r":"Autor","q":"Nenne weitere Hauptwerke Kafkas.","a":"Die Romane 'Der Prozess', 'Das Schloss' und 'Der Verschollene' (Amerika)."},{"r":"Interpretation","q":"Was bedeutet das Adjektiv 'kafkaesk'?","a":"Eine bedrohlich-absurde, undurchschaubare Situation, in der der Einzelne einer unerklärlichen, übermächtigen Ordnung ausgeliefert ist."},{"r":"Interpretation","q":"Wie lässt sich die Verwandlung als Entfremdungsparabel lesen?","a":"Gregor wird auf seine Nützlichkeit als Ernährer reduziert; verliert er die Arbeitskraft, verliert er seinen Wert und seine Menschlichkeit."},{"r":"Interpretation","q":"Welche Deutung bietet die Vater-Sohn-Beziehung?","a":"Ein autobiografisch grundierter Konflikt mit der übermächtigen Vaterfigur (vgl. Kafkas 'Brief an den Vater')."},{"r":"Interpretation","q":"Warum wird die Ursache der Verwandlung nie erklärt?","a":"Das Unerklärliche wird als selbstverständlich hingenommen – gerade das erzeugt das Absurde und verhindert eine tröstliche Deutung."},{"r":"Interpretation","q":"Welche Rolle spielt Gregors Schwester Grete?","a":"Sie ist zunächst seine einzige Fürsprecherin, wird aber am Ende diejenige, die seine Beseitigung fordert – der Kipppunkt der Familie."},{"r":"Interpretation","q":"Wofür kann das 'Ungeziefer' symbolisch stehen?","a":"Für gesellschaftliche Ausgrenzung, Krankheit, das Fremde/Andere oder das verdrängte, 'ekelhafte' Selbst."},{"r":"Interpretation","q":"Wie ist der hoffnungsvolle Schluss zu deuten?","a":"Zynisch bis verstörend: Das Aufblühen der Familie beruht auf der Beseitigung Gregors – Solidarität endet an der Nützlichkeit."},{"r":"Interpretation","q":"Welche Erzählperspektive herrscht vor?","a":"Eine an Gregor gebundene personale Perspektive, die seine nüchterne Selbstwahrnehmung mit der Ungeheuerlichkeit kontrastiert."},{"r":"Einfluss","q":"Wie prägte Kafka die moderne Literatur?","a":"Er wurde zum Inbegriff der literarischen Moderne; 'kafkaesk' ging als Begriff in viele Sprachen ein."},{"r":"Einfluss","q":"Auf welche Strömungen und Autoren wirkte Kafka?","a":"Auf Existenzialismus und absurdes Theater (Camus, Sartre, Beckett) sowie auf zahllose Autoren des 20. Jahrhunderts."},{"r":"Einfluss","q":"Warum ist 'Die Verwandlung' Schullektüre-Klassiker?","a":"Als kompakte, vieldeutige Parabel eignet sie sich ideal für Interpretation und ist weltweit kanonisiert."}]},{"title":"Der Prozess","author":"Franz Kafka","year":1925,"land":"Österreich-Ungarn (Prag)","epoch":"Moderne","icon":"⚖️","summary":"Josef K. wird eines Morgens ohne Angabe eines Vergehens verhaftet und in einen undurchschaubaren Gerichtsprozess verstrickt. Er kämpft vergeblich gegen eine anonyme Bürokratie und wird am Ende hingerichtet. Der Roman erschien postum.","cards":[{"r":"Inhalt","q":"Wie beginnt der Roman?","a":"Josef K. wird an seinem 30. Geburtstag verhaftet, ohne dass ihm ein Vergehen genannt wird – er bleibt aber zunächst 'frei'."},{"r":"Inhalt","q":"Was erfährt K. über seine Schuld?","a":"Nichts Konkretes: Das Gericht bleibt unsichtbar, die Anklage ungenannt, der Prozess undurchschaubar."},{"r":"Inhalt","q":"Was besagt die 'Türhüterlegende'?","a":"Ein Mann wartet sein Leben lang vor einem Tor zum 'Gesetz', das nur für ihn bestimmt war und das der Türhüter am Ende schließt."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Zwei Männer führen K. ab und töten ihn mit einem Messer – 'wie ein Hund', empfindet er sterbend."},{"r":"Autor","q":"Wurde der Roman zu Kafkas Lebzeiten veröffentlicht?","a":"Nein, er blieb Fragment; Max Brod ordnete und veröffentlichte ihn 1925 nach Kafkas Tod."},{"r":"Autor","q":"Welchen Beruf hatte Kafka, der den Roman beeinflusste?","a":"Als Versicherungsjurist kannte er Bürokratie und Aktenwesen aus eigener Erfahrung."},{"r":"Autor","q":"In welcher Stadt spielt Kafkas Werk atmosphärisch?","a":"Im labyrinthischen, deutsch-jüdisch-tschechischen Prag seiner Zeit."},{"r":"Interpretation","q":"Wofür steht der undurchschaubare Prozess?","a":"Für die Ohnmacht des Einzelnen gegenüber einer anonymen, sinnentleerten Macht und Bürokratie."},{"r":"Interpretation","q":"Wie deutet man K.s 'Schuld'?","a":"Vieldeutig: als existenzielle Grundschuld, als diffuses Schuldgefühl der Moderne oder als gar nicht objektiv fassbar."},{"r":"Interpretation","q":"Was besagt die Türhüterlegende über 'das Gesetz'?","a":"Der Zugang zum Gesetz/Sinn bleibt versperrt, obwohl er individuell bestimmt war – eine Parabel auf unerreichbare letzte Wahrheit."},{"r":"Interpretation","q":"Welche Rolle spielt die Bürokratie?","a":"Sie erscheint als undurchdringliches, korruptes, allgegenwärtiges System ohne fassbares Zentrum."},{"r":"Interpretation","q":"Wie lässt sich der Roman existenzialistisch lesen?","a":"Als Bild einer sinnlosen Welt, in der der Mensch schuldig-verurteilt ist, ohne den Grund je zu erfahren."},{"r":"Interpretation","q":"Welche religiöse Deutung ist möglich?","a":"Als Suche nach Gnade/Gericht in einer Welt, in der Gott bzw. der Sinn abwesend oder unerreichbar geworden ist."},{"r":"Interpretation","q":"Warum verstärkt die Fragmentform die Wirkung?","a":"Die offene, unabgeschlossene Struktur spiegelt die Ausweglosigkeit und Undurchschaubarkeit des Prozesses selbst."},{"r":"Einfluss","q":"Warum ist 'Der Prozess' politisch oft zitiert worden?","a":"Als hellsichtige Vorwegnahme totalitärer Willkür und rechtsstaatlicher Aushöhlung im 20. Jahrhundert."},{"r":"Einfluss","q":"Welche Verfilmung ist berühmt?","a":"Orson Welles verfilmte 'Der Prozess' 1962."},{"r":"Einfluss","q":"Wie wirkt der Roman bis heute nach?","a":"Er prägte das Bild vom 'kafkaesken' Ausgeliefertsein an Institutionen – ein fester Bezugspunkt der Moderne."}]},{"title":"Schuld und Sühne","author":"Fjodor M. Dostojewski","year":1866,"land":"Russland","epoch":"Realismus","icon":"🪓","summary":"Der verarmte Student Raskolnikow ermordet eine Pfandleiherin, um seine Theorie vom 'außergewöhnlichen Menschen' zu beweisen. Von Schuld zerfressen, findet er erst durch Geständnis und die Liebe Sonjas einen Weg zur inneren Erlösung.","cards":[{"r":"Inhalt","q":"Welches Verbrechen begeht Raskolnikow?","a":"Er erschlägt die alte Pfandleiherin Aljona mit einem Beil und tötet zusätzlich ihre unschuldig hinzukommende Schwester Lisaweta."},{"r":"Inhalt","q":"Mit welcher Theorie rechtfertigt er die Tat?","a":"Mit der Idee, 'außergewöhnliche' Menschen dürften zum höheren Zweck moralische Grenzen und sogar das Tötungsverbot überschreiten."},{"r":"Inhalt","q":"Wer ist Sonja Marmeladowa?","a":"Ein aus Not zur Prostitution gezwungenes, tief gläubiges Mädchen, das Raskolnikow zur Umkehr und zum Geständnis bewegt."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Raskolnikow gesteht, wird nach Sibirien verbannt; im Epilog deutet sich durch Sonjas Liebe seine seelische Wiedergeburt an."},{"r":"Inhalt","q":"Welche Rolle spielt Ermittler Porfirij?","a":"Er durchschaut Raskolnikow psychologisch und treibt ihn durch subtile Gespräche zum Geständnis, ohne handfeste Beweise."},{"r":"Autor","q":"Welches biografische Erlebnis prägte Dostojewski?","a":"Eine Scheinhinrichtung und die anschließende Verbannung nach Sibirien wegen seiner Zugehörigkeit zu einem oppositionellen Zirkel."},{"r":"Autor","q":"Welche Themen kennzeichnen Dostojewskis Werk?","a":"Schuld, Glaube, Leiden, Freiheit und die Abgründe der menschlichen Psyche."},{"r":"Autor","q":"Nenne weitere Hauptwerke Dostojewskis.","a":"'Die Brüder Karamasow', 'Der Idiot' und 'Die Dämonen'."},{"r":"Autor","q":"Welche Rolle spielt der christliche Glaube bei ihm?","a":"Eine zentrale: Erlösung durch Leiden, Demut und Nächstenliebe ist ein Grundmotiv seines Denkens."},{"r":"Interpretation","q":"Was kritisiert der Roman an Raskolnikows Theorie?","a":"Den rationalistisch-nihilistischen Größenwahn: Der Versuch, sich über die Moral zu stellen, zerstört ihn seelisch."},{"r":"Interpretation","q":"Wie zeigt sich die 'Sühne' im Roman?","a":"Weniger als juristische Strafe denn als innerer Prozess von Schuldbewusstsein, Reue und schließlich Wiedergeburt."},{"r":"Interpretation","q":"Welche Bedeutung hat die Figur Sonja?","a":"Sie verkörpert christliche Demut und Liebe; ihr Leiden und Glaube weisen Raskolnikow den Weg zur Erlösung."},{"r":"Interpretation","q":"Wie deutet man Raskolnikows 'Übermenschen'-Idee im Vergleich zu Nietzsche?","a":"Sie nimmt Motive vorweg, die später mit Nietzsche verknüpft wurden – Dostojewski führt sie jedoch zur Widerlegung, als selbstzerstörerischen Irrweg."},{"r":"Interpretation","q":"Welche Rolle spielt die Großstadt Petersburg?","a":"Die stickige, elende Stadt spiegelt Raskolnikows Fieber und moralische Verengung; sie ist fast eine eigene Figur."},{"r":"Interpretation","q":"Warum gilt der Roman als psychologischer Kriminalroman?","a":"Nicht das Wer, sondern das Warum und das seelische Nachbeben der Tat stehen im Zentrum – Innensicht statt Ermittlungsplot."},{"r":"Interpretation","q":"Welche gesellschaftskritische Dimension hat der Roman?","a":"Er zeigt Armut, soziale Verzweiflung und die Verlockung radikaler Ideen im Russland des 19. Jahrhunderts."},{"r":"Einfluss","q":"Wie beeinflusste Dostojewski die moderne Literatur und Philosophie?","a":"Er gilt als Wegbereiter des Existenzialismus und der Psychologie der Tiefe; Nietzsche, Freud und Camus schätzten ihn."},{"r":"Einfluss","q":"Warum ist der Roman ein Meilenstein des psychologischen Erzählens?","a":"Er erschließt literarisch das Unbewusste, Schuldgefühl und innere Zerrissenheit – Vorbild für den modernen Roman."},{"r":"Einfluss","q":"Welche Bedeutung hat das Werk für die Debatte um Zweck und Mittel?","a":"Es ist ein klassisches Argument gegen die These, ein höherer Zweck rechtfertige jedes Mittel."}]},{"title":"Stolz und Vorurteil","author":"Jane Austen","year":1813,"land":"England","epoch":"Klassik / Regency","icon":"💍","summary":"Die kluge Elizabeth Bennet und der stolze, reiche Mr. Darcy überwinden gegenseitige Vorurteile und Standesschranken, bis sie zueinanderfinden. Austens Gesellschaftsroman verbindet feine Ironie mit scharfer Beobachtung.","cards":[{"r":"Inhalt","q":"Wer sind die zentralen Figuren?","a":"Elizabeth Bennet, zweitälteste von fünf Schwestern, und der vornehme, wohlhabende Fitzwilliam Darcy."},{"r":"Inhalt","q":"Warum steht die Ehe für die Bennets unter Druck?","a":"Das Anwesen ist an einen männlichen Erben gebunden; die fünf Töchter müssen gut heiraten, um versorgt zu sein."},{"r":"Inhalt","q":"Wie wandelt sich Elizabeths Urteil über Darcy?","a":"Vom Vorurteil (er sei hochmütig) zur Einsicht in seinen Charakter, nachdem sich Verleumdungen (durch Wickham) als falsch erweisen."},{"r":"Inhalt","q":"Welche Nebenhandlung sorgt für einen Skandal?","a":"Die jüngste Schwester Lydia brennt mit dem unehrenhaften Wickham durch; Darcy rettet heimlich die Familienehre."},{"r":"Autor","q":"In welcher Zeit lebte und schrieb Jane Austen?","a":"Im England um 1800 (Regency-Zeit); sie veröffentlichte ihre Romane zunächst anonym ('by a Lady')."},{"r":"Autor","q":"Was kennzeichnet Austens Stil?","a":"Feine Ironie, präzise Dialoge und scharfe, oft komische Beobachtung der Gesellschaft."},{"r":"Autor","q":"Nenne weitere Romane Austens.","a":"'Emma', 'Verstand und Gefühl' (Sense and Sensibility) und 'Überredung' (Persuasion)."},{"r":"Interpretation","q":"Worauf spielt der Titel 'Stolz und Vorurteil' an?","a":"Auf Darcys Stolz und Elizabeths Vorurteil – beide müssen ihre Fehlhaltungen erkennen und überwinden."},{"r":"Interpretation","q":"Welche Gesellschaftskritik übt der Roman?","a":"Er kritisiert die ökonomische Zwangslage der Frauen und die Verengung der Ehe auf Standes- und Geldfragen."},{"r":"Interpretation","q":"Wie modern ist Elizabeth als Figur?","a":"Sehr: Sie beansprucht Urteilskraft, Selbstachtung und die Wahl aus Liebe statt bloßer Versorgung."},{"r":"Interpretation","q":"Welche Funktion hat Austens Ironie?","a":"Sie entlarvt Eitelkeit, Standesdünkel und Heuchelei, ohne moralisch zu predigen."},{"r":"Interpretation","q":"Wie kontrastiert der Roman verschiedene Ehe-Modelle?","a":"Liebesehe (Elizabeth/Darcy) gegen Vernunft-/Versorgungsehe (Charlotte/Collins) und leidenschaftlichen Leichtsinn (Lydia/Wickham)."},{"r":"Interpretation","q":"Warum gilt der Roman trotz Happy End als scharfsichtig?","a":"Weil er die materiellen Zwänge hinter der romantischen Fassade nüchtern offenlegt."},{"r":"Einfluss","q":"Welchen Status hat der Roman heute?","a":"Er ist einer der meistgelesenen englischen Romane und ein Klassiker der Weltliteratur."},{"r":"Einfluss","q":"Wie wirkt Austen auf Populärkultur und Genre?","a":"Sie prägte den modernen Liebes- und Gesellschaftsroman; unzählige Verfilmungen und Adaptionen (z.B. 'Bridget Jones') berufen sich auf sie."},{"r":"Einfluss","q":"Warum gilt Austen als frühe Vorläuferin feministischer Perspektiven?","a":"Weil sie die begrenzten Handlungsspielräume von Frauen kritisch und ironisch sichtbar macht."}]},{"title":"1984","author":"George Orwell","year":1949,"land":"England","epoch":"Moderne / Dystopie","icon":"👁️","summary":"In einem totalitären Überwachungsstaat versucht Winston Smith, sich innerlich gegen die Partei und den allgegenwärtigen 'Großen Bruder' aufzulehnen. Sein Aufbegehren wird gebrochen. Der Roman prägte das Bild moderner Überwachung.","cards":[{"r":"Inhalt","q":"In welcher Welt spielt der Roman?","a":"In Ozeanien, einem totalitären Einparteienstaat unter der Führung des allgegenwärtigen 'Großen Bruders'."},{"r":"Inhalt","q":"Was ist Winstons Beruf?","a":"Er arbeitet im 'Wahrheitsministerium' und fälscht Vergangenheit – er passt alte Dokumente an die jeweils aktuelle Parteilinie an."},{"r":"Inhalt","q":"Wie äußert sich Winstons Auflehnung?","a":"Durch ein heimliches Tagebuch, die verbotene Liebe zu Julia und den Versuch, sich einem Widerstand ('Bruderschaft') anzuschließen."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Nach Folter im 'Zimmer 101' wird Winston gebrochen; er verrät Julia und 'liebt' am Ende den Großen Bruder."},{"r":"Autor","q":"Wer war George Orwell?","a":"Pseudonym von Eric Arthur Blair, britischer Autor und Journalist mit demokratisch-sozialistischer, antitotalitärer Haltung."},{"r":"Autor","q":"Welche Erfahrungen prägten Orwells Politik?","a":"U.a. der Spanische Bürgerkrieg und seine Ablehnung sowohl des Faschismus als auch des Stalinismus."},{"r":"Autor","q":"Welches weitere berühmte Werk schrieb Orwell?","a":"Die Fabel 'Farm der Tiere' (Animal Farm), eine Satire auf die Stalinsche Diktatur."},{"r":"Interpretation","q":"Was bedeutet 'Big Brother is watching you'?","a":"Das Sinnbild lückenloser Überwachung; der Staat kontrolliert Handeln und Denken bis ins Private."},{"r":"Interpretation","q":"Was ist 'Neusprech' (Newspeak)?","a":"Eine reduzierte Sprache, die abweichendes Denken unmöglich machen soll – Sprachkontrolle als Gedankenkontrolle."},{"r":"Interpretation","q":"Was meint 'Doppeldenk' (Doublethink)?","a":"Die Fähigkeit, zwei widersprüchliche Überzeugungen zugleich für wahr zu halten – etwa 'Krieg ist Frieden'."},{"r":"Interpretation","q":"Wie funktioniert die Manipulation der Vergangenheit?","a":"'Wer die Vergangenheit kontrolliert, kontrolliert die Zukunft': Geschichte wird ständig umgeschrieben, um die Partei unfehlbar erscheinen zu lassen."},{"r":"Interpretation","q":"Welche Rolle spielt die Liebe zu Julia?","a":"Sie ist ein privater Akt der Rebellion; ihre Zerstörung zeigt, dass der Staat noch die intimsten Bindungen unterwirft."},{"r":"Interpretation","q":"Wofür steht 'Zimmer 101'?","a":"Für die totale Unterwerfung: den Ort, an dem die individuelle 'schlimmste Angst' gebrochen wird."},{"r":"Interpretation","q":"Warum ist der Schluss so verstörend?","a":"Es gibt keine Rettung und keine Hoffnung: Der Widerstand wird nicht nur besiegt, sondern innerlich ausgelöscht."},{"r":"Interpretation","q":"Ist der Roman eine Kritik nur am Kommunismus?","a":"Nein: Er richtet sich gegen jede Form totalitärer Herrschaft und Massenmanipulation, links wie rechts."},{"r":"Einfluss","q":"Welche Begriffe aus '1984' sind Alltagssprache geworden?","a":"'Großer Bruder', 'Orwell'sch', 'Neusprech', 'Gedankenpolizei' und 'Doppeldenk'."},{"r":"Einfluss","q":"Warum wird '1984' in Überwachungsdebatten zitiert?","a":"Als Warnbild für staatliche und digitale Massenüberwachung und Manipulation der Wahrheit."},{"r":"Einfluss","q":"Welchen Rang hat der Roman in der Dystopie-Tradition?","a":"Er ist – neben Huxleys 'Schöne neue Welt' – der einflussreichste dystopische Roman des 20. Jahrhunderts."}]},{"title":"Der Fremde","author":"Albert Camus","year":1942,"land":"Frankreich / Algerien","epoch":"Moderne / Existenzialismus","icon":"☀️","summary":"Der teilnahmslose Meursault erschießt am sonnenüberfluteten Strand von Algier einen Mann, fast ohne Motiv. Im Prozess wird ihm vor allem seine Gefühlskälte zum Verhängnis. Der Roman ist ein Schlüsseltext der Philosophie des Absurden.","cards":[{"r":"Inhalt","q":"Womit beginnt der Roman?","a":"Mit Meursaults nüchterner Feststellung, dass seine Mutter gestorben ist – ohne erkennbare Trauer."},{"r":"Inhalt","q":"Welche Tat begeht Meursault?","a":"Am Strand erschießt er, geblendet von der Sonne und ohne klares Motiv, einen 'Araber'."},{"r":"Inhalt","q":"Was wird ihm im Prozess eigentlich vorgeworfen?","a":"Weniger der Mord selbst als seine Gefühllosigkeit – etwa dass er am Grab der Mutter nicht weinte."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Zum Tode verurteilt, weist Meursault den Priester ab und findet Frieden in der Annahme der gleichgültigen Welt."},{"r":"Autor","q":"Wer war Albert Camus?","a":"Ein französischer, in Algerien aufgewachsener Schriftsteller und Denker, Literaturnobelpreisträger 1957."},{"r":"Autor","q":"In welchem Verhältnis stand Camus zum Existenzialismus?","a":"Er wird ihm zugerechnet, distanzierte sich aber; sein eigenes Denken kreist um das 'Absurde' und die Revolte."},{"r":"Autor","q":"Welcher Essay Camus' erklärt das Konzept des Absurden?","a":"'Der Mythos des Sisyphos', in dem er den Menschen mit dem ewig Steine wälzenden Sisyphos vergleicht."},{"r":"Interpretation","q":"Was verkörpert Meursault?","a":"Den 'absurden Menschen', der der sinnleeren Welt keine falschen Bedeutungen aufzwingt und ehrlich gleichgültig bleibt."},{"r":"Interpretation","q":"Was meint Camus mit dem 'Absurden'?","a":"Den Widerspruch zwischen dem menschlichen Sinnverlangen und der stummen, gleichgültigen Welt."},{"r":"Interpretation","q":"Warum wird Meursault eigentlich verurteilt?","a":"Weil er die gesellschaftlichen Gefühls- und Trauerkonventionen verweigert – die Gesellschaft bestraft seine Ehrlichkeit/Andersartigkeit."},{"r":"Interpretation","q":"Welche Rolle spielt die Sonne bei der Tat?","a":"Die überwältigende Hitze und das grelle Licht rücken die Tat ins Sinnlich-Absurde und entziehen ihr ein klares Motiv."},{"r":"Interpretation","q":"Wie ist Meursaults Schluss-Haltung zu deuten?","a":"Als Aufbegehren durch Annahme: Er umarmt die 'zärtliche Gleichgültigkeit der Welt' und findet darin Freiheit."},{"r":"Interpretation","q":"Warum lehnt Meursault den Priester ab?","a":"Weil er keine jenseitige Vertröstung annimmt; er besteht auf der Wahrheit des diesseitigen, sinnlosen Lebens."},{"r":"Interpretation","q":"Welche postkoloniale Kritik trifft den Roman?","a":"Dass das Opfer, der 'Araber', namenlos und stumm bleibt – ein blinder Fleck der kolonialen Perspektive (später von Daoud aufgegriffen)."},{"r":"Einfluss","q":"Welchen Rang hat 'Der Fremde' in der Literatur des 20. Jh.?","a":"Er gilt als einer der einflussreichsten und meistgelesenen französischen Romane der Moderne."},{"r":"Einfluss","q":"Wie wirkte Camus' Denken des Absurden nach?","a":"Es prägte Existenzialismus, absurdes Theater und die Nachkriegsphilosophie; 'Der Mythos des Sisyphos' wurde zum Schlüsseltext."},{"r":"Einfluss","q":"Welcher Roman antwortet aus arabischer Perspektive auf 'Der Fremde'?","a":"Kamel Daouds 'Der Fall Meursault', der dem getöteten 'Araber' einen Namen und eine Stimme gibt."}]},{"title":"Buddenbrooks","author":"Thomas Mann","year":1901,"land":"Deutschland","epoch":"Realismus / Moderne","icon":"🏛️","summary":"Der Debütroman Thomas Manns schildert den 'Verfall einer Familie' – den langsamen wirtschaftlichen und seelischen Niedergang einer Lübecker Kaufmannsdynastie über vier Generationen. Für dieses Werk erhielt Mann später den Nobelpreis.","cards":[{"r":"Inhalt","q":"Was ist der Untertitel und das Grundthema des Romans?","a":"'Verfall einer Familie' – der allmähliche Niedergang der angesehenen Lübecker Kaufmannsfamilie Buddenbrook über vier Generationen."},{"r":"Inhalt","q":"Wer ist Thomas Buddenbrook?","a":"Das pflichtbewusste Familienoberhaupt der dritten Generation, der die Firma mit wachsender innerer Erschöpfung führt."},{"r":"Inhalt","q":"Welche Rolle spielt der kleine Hanno?","a":"Der letzte männliche Erbe, musisch-sensibel und lebensuntüchtig; sein früher Tod an Typhus besiegelt das Ende der Dynastie."},{"r":"Inhalt","q":"Wie verlaufen die Ehen von Tony Buddenbrook?","a":"Tony ordnet ihr Liebesglück den Familieninteressen unter; ihre beiden Ehen scheitern – Sinnbild für das Auseinanderfallen von Pflicht und Glück."},{"r":"Autor","q":"Wie alt war Thomas Mann bei Erscheinen und was brachte ihm das Werk ein?","a":"Er war 26; der Roman begründete seinen Ruhm und trug wesentlich zum Nobelpreis 1929 bei."},{"r":"Autor","q":"Woher stammte Thomas Mann?","a":"Aus einer Lübecker Kaufmannsfamilie – eigene Herkunft und Milieu flossen in den Roman ein."},{"r":"Autor","q":"Nenne weitere Hauptwerke Thomas Manns.","a":"'Der Zauberberg', 'Doktor Faustus', 'Der Tod in Venedig' und 'Joseph und seine Brüder'."},{"r":"Interpretation","q":"Welches Grundmotiv verbindet Manns Werk?","a":"Der Gegensatz von 'Bürger' und 'Künstler' – zwischen bürgerlicher Lebenstüchtigkeit und geistig-sensibler Lebensuntauglichkeit."},{"r":"Interpretation","q":"Wie hängt der Verfall mit wachsender Sensibilität zusammen?","a":"Je feiner, künstlerischer und reflektierter die Nachkommen werden, desto weniger taugen sie fürs harte Geschäftsleben – Verfeinerung als Verfall."},{"r":"Interpretation","q":"Welche Rolle spielt Schopenhauer im Roman?","a":"Thomas Buddenbrooks Lektüre Schopenhauers gibt ihm kurz Trost angesichts des Todes – ein Reflex von Manns eigener Prägung durch dessen Pessimismus."},{"r":"Interpretation","q":"Warum gilt der Roman als Gesellschaftschronik?","a":"Er zeichnet minutiös das Bürgertum des 19. Jahrhunderts, seine Werte, Rituale und seinen ökonomischen Wandel nach."},{"r":"Interpretation","q":"Welche Bedeutung hat die Musik (Wagner) für Hanno?","a":"Sie steht für die verführerische, aber lebensfeindliche Kunstwelt, die ihn der Realität entfremdet."},{"r":"Interpretation","q":"Wie ist der Titel 'Verfall einer Familie' ironisch zu lesen?","a":"Der 'Verfall' ist zugleich eine Verfeinerung; was ökonomisch Niedergang ist, ist kulturell Zuwachs an Bewusstsein."},{"r":"Einfluss","q":"Welche Bedeutung hat der Roman für die deutsche Literatur?","a":"Er gilt als erster großer deutscher Gesellschaftsroman von Weltrang und Klassiker der Moderne."},{"r":"Einfluss","q":"Wie prägte das Werk das Bild der 'Künstler-Bürger'-Problematik?","a":"Es wurde zum Referenzpunkt für das Spannungsfeld von bürgerlicher Existenz und künstlerischer Berufung."},{"r":"Einfluss","q":"Wie wirkt der Roman bis heute nach?","a":"Als vielverfilmter Schulklassiker und Inbegriff der Familien- und Verfallssaga."}]},{"title":"Der Zauberberg","author":"Thomas Mann","year":1924,"land":"Deutschland","epoch":"Moderne","icon":"🏔️","summary":"Der junge Hans Castorp besucht seinen Vetter in einem Davoser Lungensanatorium und bleibt sieben Jahre. In der abgeschiedenen 'Höhenwelt' wird er in geistige Debatten und existenzielle Erfahrungen verstrickt. Ein Schlüsselroman der Moderne.","cards":[{"r":"Inhalt","q":"Warum bleibt Hans Castorp so lange im Sanatorium?","a":"Aus einem dreiwöchigen Besuch werden sieben Jahre; die Zeit im 'Zauberberg' entrückt ihn dem 'Flachland' und seinem bürgerlichen Leben."},{"r":"Inhalt","q":"Wo spielt der Roman?","a":"In einem Lungensanatorium in Davos, hoch in den Schweizer Alpen, kurz vor dem Ersten Weltkrieg."},{"r":"Inhalt","q":"Wer sind Settembrini und Naphta?","a":"Zwei geistige Antipoden, die um Castorps Seele ringen: der aufklärerische Humanist Settembrini und der radikale, autoritäre Naphta."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Der Ausbruch des Ersten Weltkriegs 'erlöst' Castorp vom Berg; er zieht ins Flachland und in den Krieg – sein Schicksal bleibt offen."},{"r":"Autor","q":"In welche Schaffensphase Manns fällt der Roman?","a":"In seine mittlere Phase; er arbeitete rund zwölf Jahre daran, unterbrochen vom Ersten Weltkrieg."},{"r":"Autor","q":"Als was gilt 'Der Zauberberg' in Manns Werk?","a":"Als einer seiner anspruchsvollsten Romane und als 'Zeitroman', der eine ganze Epoche spiegelt."},{"r":"Interpretation","q":"Welche Rolle spielt die 'Zeit' im Roman?","a":"Zeit wird zum Hauptthema: Auf dem Berg zerfließt sie, das gewöhnliche Zeitmaß löst sich auf – der Roman reflektiert Zeitwahrnehmung selbst."},{"r":"Interpretation","q":"Wofür steht der 'Zauberberg' symbolisch?","a":"Für eine dem Leben entrückte, todesnahe und krankheitsverliebte Sphäre – ein Gegenbild zum tätigen 'Flachland'."},{"r":"Interpretation","q":"Wie ist der Roman als 'Bildungsroman' zu lesen?","a":"Castorp durchläuft eine geistige Reifung ('Steigerung') durch Begegnung mit Krankheit, Tod, Liebe und den Ideendebatten."},{"r":"Interpretation","q":"Was verhandeln Settembrini und Naphta stellvertretend?","a":"Den Streit zwischen Aufklärung/Humanismus/Fortschritt und Reaktion/Radikalismus/Todesfaszination – die geistigen Kräfte Europas vor 1914."},{"r":"Interpretation","q":"Welche Bedeutung hat das Kapitel 'Schnee'?","a":"In einem Schneesturm hat Castorp eine visionäre Einsicht: 'Der Mensch soll um der Güte und Liebe willen dem Tod keine Herrschaft über seine Gedanken einräumen.'"},{"r":"Interpretation","q":"Wie ist die Krankheit im Roman zu deuten?","a":"Ambivalent: als Verführung und Vertiefung zugleich – Krankheit steigert das Bewusstsein, entzieht aber dem Leben."},{"r":"Einfluss","q":"Warum gilt der Roman als Schlüsselwerk der Moderne?","a":"Er verbindet realistische Erzählung mit essayistischer Ideenfülle und diagnostiziert die geistige Krise Europas vor dem Ersten Weltkrieg."},{"r":"Einfluss","q":"Wie prägte 'Der Zauberberg' den 'Zeitroman'?","a":"Als Muster eines Romans, der eine ganze Epoche und ihr Denken symbolisch verdichtet."}]},{"title":"Effi Briest","author":"Theodor Fontane","year":1895,"land":"Deutschland","epoch":"Realismus","icon":"🌾","summary":"Die junge Effi wird mit dem viel älteren Baron von Innstetten verheiratet. Aus Langeweile lässt sie sich auf eine kurze Affäre ein. Jahre später entdeckt Innstetten alte Briefe – und zerstört aus Prinzipientreue beider Leben. Ein Hauptwerk des Realismus.","cards":[{"r":"Inhalt","q":"Wie kommt Effis Ehe zustande?","a":"Mit siebzehn wird sie von ihren Eltern mit dem viel älteren Baron von Innstetten verheiratet, einem früheren Verehrer ihrer Mutter."},{"r":"Inhalt","q":"Was ist Effis 'Verfehlung'?","a":"Aus Einsamkeit und Langeweile lässt sie sich in Kessin auf eine kurze Affäre mit dem Major Crampas ein."},{"r":"Inhalt","q":"Wodurch fliegt die Affäre Jahre später auf?","a":"Innstetten findet zufällig alte Liebesbriefe von Crampas."},{"r":"Inhalt","q":"Wie reagiert Innstetten und wie endet der Roman?","a":"Obwohl er Effi noch liebt, tötet er Crampas im Duell und verstößt Effi; einsam und krank stirbt sie jung, von den Eltern spät wieder aufgenommen."},{"r":"Autor","q":"Als was gilt Theodor Fontane?","a":"Als bedeutendster deutscher Vertreter des poetischen Realismus und Meister des Gesellschaftsromans."},{"r":"Autor","q":"Nenne ein weiteres Werk Fontanes.","a":"'Frau Jenny Treibel', 'Der Stechlin' oder die 'Wanderungen durch die Mark Brandenburg'."},{"r":"Interpretation","q":"Was kritisiert der Roman an der Gesellschaft?","a":"Den starren preußischen Ehr- und Konventionskodex, der Menschlichkeit und Glück dem gesellschaftlichen Ansehen opfert."},{"r":"Interpretation","q":"Warum handelt Innstetten gegen sein eigenes Gefühl?","a":"Er unterwirft sich einem 'gesellschaftlichen Etwas', dem Ehrbegriff – nicht Rache, sondern Prinzipientreue treibt ihn; er erkennt selbst die Sinnlosigkeit."},{"r":"Interpretation","q":"Wofür steht der 'Chinese' als Spukmotiv?","a":"Für unterschwellige Angst, das Unheimliche der Ehe und Effis Isolation; ein psychologisches Symbol ihrer Beklemmung."},{"r":"Interpretation","q":"Welche Bedeutung hat der berühmte Schlusssatz des Vaters?","a":"'Das ist ein zu weites Feld' – Ausdruck der Ratlosigkeit gegenüber Schuld und Konvention; Fontanes leiser, skeptischer Ton."},{"r":"Interpretation","q":"Inwiefern ist Effi Opfer und nicht bloß Schuldige?","a":"Zu jung verheiratet, vernachlässigt und den Konventionen ausgeliefert, wird sie eher Opfer der Verhältnisse als eigenverantwortliche Ehebrecherin."},{"r":"Interpretation","q":"Wie zeigt sich Fontanes 'realistischer' Stil?","a":"Durch feine Andeutung statt drastischer Darstellung – die Affäre selbst wird ausgespart; Kritik äußert sich im Ton, nicht in der Anklage."},{"r":"Einfluss","q":"In welche Reihe europäischer Ehebruchromane gehört das Werk?","a":"Neben 'Madame Bovary' und 'Anna Karenina' – die drei großen Ehebruchromane des 19. Jahrhunderts."},{"r":"Einfluss","q":"Welchen Status hat 'Effi Briest' heute?","a":"Ein Kernwerk des deutschen Realismus und fester Bestandteil des Schulkanons, mehrfach verfilmt."}]},{"title":"Die Blechtrommel","author":"Günter Grass","year":1959,"land":"Deutschland","epoch":"Nachkriegsmoderne","icon":"🥁","summary":"Oskar Matzerath, der mit drei Jahren beschließt, nicht mehr zu wachsen, erzählt aus der Heil- und Pflegeanstalt sein Leben im Danzig der NS-Zeit und der Nachkriegszeit. Grass' groteske Erzählweise machte den Roman zu einem Meilenstein der Nachkriegsliteratur.","cards":[{"r":"Inhalt","q":"Was ist das Besondere an Oskar Matzerath?","a":"Er beschließt an seinem dritten Geburtstag, nicht mehr zu wachsen, und protestiert mit seiner Blechtrommel und einer glaszersingenden Stimme gegen die Erwachsenenwelt."},{"r":"Inhalt","q":"Aus welcher Situation heraus erzählt Oskar?","a":"Rückblickend aus einer Heil- und Pflegeanstalt, in die er nach dem Krieg eingewiesen wurde."},{"r":"Inhalt","q":"Wo und wann spielt der Roman überwiegend?","a":"Im multikulturellen Danzig zur Zeit des aufkommenden Nationalsozialismus, des Krieges und der frühen Nachkriegszeit."},{"r":"Autor","q":"Wofür wurde Günter Grass ausgezeichnet?","a":"Er erhielt 1999 den Literaturnobelpreis; 'Die Blechtrommel' ist Teil der 'Danziger Trilogie'."},{"r":"Autor","q":"Welche Rolle spielte Grass in der Bundesrepublik?","a":"Als engagierter, streitbarer Schriftsteller und politische Stimme (u.a. für die SPD); später umstritten wegen seiner spät eingestandenen Waffen-SS-Mitgliedschaft."},{"r":"Interpretation","q":"Wofür steht Oskars Weigerung zu wachsen?","a":"Für die Verweigerung gegenüber der verlogenen, kleinbürgerlichen Erwachsenenwelt, die den Nationalsozialismus ermöglichte."},{"r":"Interpretation","q":"Welche Funktion hat die groteske, magisch-realistische Erzählweise?","a":"Sie entlarvt durch Verzerrung und Satire die Verdrängung und Mitläuferschaft des deutschen Kleinbürgertums."},{"r":"Interpretation","q":"Wie geht der Roman mit der NS-Vergangenheit um?","a":"Aus der Froschperspektive des kleinen Oskar zeigt er, wie sich Faschismus im Alltag und in den 'kleinen Leuten' festsetzte."},{"r":"Interpretation","q":"Was symbolisiert die Blechtrommel?","a":"Kindlichen Protest, Erinnerung und die Kunst selbst – Oskar 'ertrommelt' sich seine Version der Geschichte."},{"r":"Interpretation","q":"Warum war der Roman bei Erscheinen ein Skandal?","a":"Wegen seiner drastischen, tabubrechenden Sexualität, Blasphemie und respektlosen Groteske."},{"r":"Interpretation","q":"Inwiefern ist Oskar ein unzuverlässiger Erzähler?","a":"Als Insasse einer Anstalt, der zwischen Ichform und Distanz wechselt und übernatürliche Fähigkeiten behauptet, bleibt seine Erzählung fragwürdig."},{"r":"Einfluss","q":"Welche Bedeutung hat der Roman für die deutsche Nachkriegsliteratur?","a":"Er gilt als ihr internationaler Durchbruch und als Schlüsselwerk der Vergangenheitsbewältigung."},{"r":"Einfluss","q":"Welche berühmte Verfilmung gibt es?","a":"Volker Schlöndorffs Verfilmung von 1979 gewann den Oscar für den besten fremdsprachigen Film und die Goldene Palme."},{"r":"Einfluss","q":"Wie wirkte Grass' Erzählstil?","a":"Sein magischer Realismus und die groteske Fabulierlust beeinflussten die europäische Erzählkunst nachhaltig."}]},{"title":"Don Quijote","author":"Miguel de Cervantes","year":1605,"land":"Spanien","epoch":"Frühe Neuzeit / Barock","icon":"🐴","summary":"Ein verarmter Landadliger verliert über der Lektüre von Ritterromanen den Verstand, nennt sich Don Quijote und zieht als fahrender Ritter aus. Mit seinem Knappen Sancho Pansa erlebt er komische Abenteuer – etwa den Kampf gegen Windmühlen. Oft gilt der Roman als erster moderner Roman.","cards":[{"r":"Inhalt","q":"Warum wird der Landadlige zum 'Ritter'?","a":"Von der Lektüre alter Ritterromane verwirrt, hält er sie für wahr und zieht selbst als fahrender Ritter 'Don Quijote' aus, um Ruhm und Gerechtigkeit zu suchen."},{"r":"Inhalt","q":"Wer ist Sancho Pansa?","a":"Sein bodenständiger, sprichwortreicher Knappe, dem er die Statthalterschaft einer Insel verspricht – das komische Gegenbild zum Idealisten."},{"r":"Inhalt","q":"Was geschieht in der berühmtesten Szene?","a":"Don Quijote hält Windmühlen für Riesen und greift sie an – der 'Kampf gegen Windmühlen' wurde sprichwörtlich."},{"r":"Inhalt","q":"Wem gilt Don Quijotes ritterliche Verehrung?","a":"Der idealisierten 'Dulcinea von Toboso' – in Wahrheit eine einfache Bauersfrau, die er nie als solche wahrnimmt."},{"r":"Autor","q":"Wann erschien der Roman und aus wie vielen Teilen besteht er?","a":"Der erste Teil 1605, der zweite 1615; Cervantes reagierte im zweiten Teil auf eine gefälschte Fortsetzung."},{"r":"Autor","q":"Was ist über Cervantes' Leben bekannt?","a":"Er war Soldat (in der Schlacht von Lepanto verwundet) und geriet in algerische Gefangenschaft – ein bewegtes, oft armes Leben."},{"r":"Interpretation","q":"Warum gilt 'Don Quijote' als erster moderner Roman?","a":"Wegen seiner vielschichtigen Figuren, der Ironie, dem Spiel mit Fiktion und Wirklichkeit und der psychologischen Tiefe."},{"r":"Interpretation","q":"Was verkörpert der Gegensatz Quijote–Sancho?","a":"Idealismus gegen Realismus, Fantasie gegen Vernunft, Geist gegen Körper – ein Grundmuster der Weltliteratur."},{"r":"Interpretation","q":"Was bedeutet 'gegen Windmühlen kämpfen'?","a":"Aussichtslos gegen eingebildete Gegner oder unüberwindliche Verhältnisse ankämpfen."},{"r":"Interpretation","q":"Wie spielt der Roman mit Fiktion und Wirklichkeit?","a":"Er parodiert die Ritterromane, thematisiert das Lesen selbst und lässt im zweiten Teil die Figuren wissen, dass über sie ein Buch existiert."},{"r":"Interpretation","q":"Ist Don Quijote nur eine komische Figur?","a":"Nein: Er ist zugleich lächerlich und tragisch-erhaben – ein Narr, dessen Idealismus rührt und beschämt."},{"r":"Interpretation","q":"Was meint der Begriff des 'Quijotismus'?","a":"Eine edelmütige, aber wirklichkeitsfremde, idealistische Haltung, die an der Realität scheitert."},{"r":"Einfluss","q":"Welchen Rang hat der Roman in der Weltliteratur?","a":"Er gilt als eines der einflussreichsten Werke überhaupt und oft als 'bestes Buch aller Zeiten' in Umfragen."},{"r":"Einfluss","q":"Wie prägte Cervantes die Gattung Roman?","a":"Er begründete den modernen, ironisch-realistischen Roman und beeinflusste Autoren von Fielding bis zum Magischen Realismus."}]},{"title":"Anna Karenina","author":"Lew Tolstoi","year":1877,"land":"Russland","epoch":"Realismus","icon":"🚂","summary":"Die verheiratete Anna Karenina verliebt sich in den Offizier Wronski und bricht für ihn mit Ehe und Gesellschaft – mit tragischem Ausgang. Parallel erzählt Tolstoi die Sinnsuche des Gutsbesitzers Lewin. Ein Gipfelwerk des realistischen Romans.","cards":[{"r":"Inhalt","q":"Womit beginnt der Roman?","a":"Mit dem berühmten Satz sinngemäß: Alle glücklichen Familien gleichen einander, jede unglückliche ist auf ihre Weise unglücklich."},{"r":"Inhalt","q":"Was ist Annas Konflikt?","a":"Sie verlässt für ihre Liebe zu Wronski ihren Mann und Sohn und wird dafür von der Gesellschaft geächtet."},{"r":"Inhalt","q":"Wie endet Annas Geschichte?","a":"Zunehmend isoliert, eifersüchtig und verzweifelt, wirft sie sich vor einen Zug."},{"r":"Inhalt","q":"Wer ist Lewin und welche Rolle spielt er?","a":"Ein grüblerischer Gutsbesitzer, dessen Suche nach Sinn, Glauben und einem einfachen, ehrlichen Leben den Gegenpol zu Annas Tragödie bildet."},{"r":"Autor","q":"Was kennzeichnet Tolstois Spätwerk und Denken?","a":"Eine tiefe moralisch-religiöse Wende, Kritik an der Oberschicht und die Suche nach einem einfachen, gewaltfreien Leben."},{"r":"Autor","q":"Nenne Tolstois anderes großes Hauptwerk.","a":"'Krieg und Frieden'."},{"r":"Interpretation","q":"Wie verurteilt oder versteht der Roman Anna?","a":"Ambivalent: Tolstoi zeigt Mitgefühl für ihre Leidenschaft, aber auch die zerstörerische Kraft einer Liebe gegen alle sozialen und moralischen Bindungen."},{"r":"Interpretation","q":"Was kontrastiert die Lewin-Handlung mit der Anna-Handlung?","a":"Lewins mühsames, aber sinnstiftendes Leben auf dem Land steht gegen Annas leidenschaftlichen, aber selbstzerstörerischen Weg in der Gesellschaft."},{"r":"Interpretation","q":"Welche Gesellschaftskritik übt der Roman?","a":"Er entlarvt die Heuchelei der Petersburger Oberschicht, die den Ehebruch des Mannes duldet, die Frau aber vernichtet."},{"r":"Interpretation","q":"Welche Bedeutung hat das Motiv der Eisenbahn?","a":"Sie rahmt Annas Schicksal (erste Begegnung, ein Todesfall am Bahnhof, ihr Ende) und symbolisiert die unaufhaltsame, moderne Zerstörungskraft."},{"r":"Interpretation","q":"Wofür steht Lewins Sinnsuche?","a":"Für Tolstois eigene existenzielle und religiöse Ringen um ein authentisches, sittliches Leben."},{"r":"Einfluss","q":"Welchen Rang hat 'Anna Karenina' in der Weltliteratur?","a":"Er gilt vielen Schriftstellern als einer der größten Romane überhaupt."},{"r":"Einfluss","q":"In welche Reihe von Romanen gehört er thematisch?","a":"Zu den großen Ehebruchromanen des 19. Jahrhunderts, neben 'Madame Bovary' und 'Effi Briest'."}]},{"title":"Madame Bovary","author":"Gustave Flaubert","year":1857,"land":"Frankreich","epoch":"Realismus","icon":"💐","summary":"Die Arztgattin Emma Bovary flüchtet aus der Enge ihres Provinzlebens in Affären und Luxus, überschuldet sich und nimmt sich schließlich das Leben. Flauberts stilistisch perfekter Roman gilt als Gründungswerk des modernen Realismus.","cards":[{"r":"Inhalt","q":"Wer ist Emma Bovary und woran leidet sie?","a":"Die Frau des biederen Landarztes Charles Bovary; sie langweilt sich in der Provinz und sehnt sich nach der romantischen Leidenschaft aus ihren Romanen."},{"r":"Inhalt","q":"Wie versucht Emma, ihrem Leben zu entkommen?","a":"Durch Affären (u.a. mit Rodolphe und Léon) und durch Luxuskäufe, die sie tief verschulden."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Von Schulden und Enttäuschung erdrückt, vergiftet sich Emma mit Arsen; Charles zerbricht daran."},{"r":"Autor","q":"Wofür ist Flauberts Arbeitsweise berühmt?","a":"Für seinen fanatischen Stilperfektionismus – die Suche nach dem 'mot juste', dem einzig richtigen Wort."},{"r":"Autor","q":"Was geschah nach der Veröffentlichung?","a":"Flaubert wurde 1857 wegen 'Verletzung der öffentlichen Moral' angeklagt, aber freigesprochen – der Prozess machte den Roman berühmt."},{"r":"Interpretation","q":"Was bedeutet der Begriff 'Bovarysmus'?","a":"Die chronische Unzufriedenheit und Realitätsflucht, bei der man das eigene Leben an romantisch-illusionären Idealen misst."},{"r":"Interpretation","q":"Wie kritisiert Flaubert die Romantik?","a":"Er zeigt, wie Emmas an Kitschromanen geschulte Sehnsüchte sie blind machen und ins Verderben führen."},{"r":"Interpretation","q":"Was ist an Flauberts Erzählhaltung neu?","a":"Seine kühle, unbeteiligte Ironie und die 'unpersönliche' Erzählweise – der Autor urteilt nicht offen, sondern lässt die Fakten sprechen."},{"r":"Interpretation","q":"Welche Gesellschaftskritik enthält der Roman?","a":"Eine bittere Abrechnung mit der geistigen Enge, Langeweile und Heuchelei des Provinzbürgertums."},{"r":"Interpretation","q":"Welche Rolle spielt die 'erlebte Rede'?","a":"Flaubert perfektioniert sie: Emmas Gedanken verschmelzen mit der Erzählstimme, sodass Nähe und ironische Distanz zugleich entstehen."},{"r":"Interpretation","q":"Warum gilt Emma zugleich als Opfer und Mitschuldige?","a":"Sie ist Opfer beengender Verhältnisse und illusionärer Ideale, aber auch mitverantwortlich durch ihre Selbsttäuschung und Verschwendung."},{"r":"Einfluss","q":"Warum gilt 'Madame Bovary' als Gründungswerk des modernen Realismus?","a":"Wegen seiner objektiven Erzählweise, psychologischen Präzision und stilistischen Vollkommenheit."},{"r":"Einfluss","q":"Wie wirkte Flaubert auf spätere Autoren?","a":"Sein Stilideal und die 'unsichtbare' Erzählhaltung prägten den modernen Roman von Zola bis zur literarischen Moderne."}]},{"title":"Homo faber","author":"Max Frisch","year":1957,"land":"Schweiz","epoch":"Moderne","icon":"✈️","summary":"Der technikgläubige Ingenieur Walter Faber erklärt sich die Welt rein rational und leugnet Fügung und Gefühl. Auf einer Reise verliebt er sich unwissentlich in seine eigene Tochter – eine tragische Verkettung, die seinen Rationalismus zerbricht.","cards":[{"r":"Inhalt","q":"Wer ist Walter Faber?","a":"Ein Schweizer Ingenieur der UNESCO, der die Welt technisch-rational deutet und Zufall, Schicksal und Gefühl für unwissenschaftlich hält."},{"r":"Inhalt","q":"Worin besteht die tragische Verstrickung?","a":"Faber verliebt sich auf einer Reise in die junge Sabeth – ohne zu wissen, dass sie seine Tochter aus einer früheren Beziehung ist."},{"r":"Inhalt","q":"Wie kommt Sabeth zu Tode?","a":"Nach einem Schlangenbiss stürzt sie und stirbt an einer im Krankenhaus übersehenen Kopfverletzung – eine Kette von Zufällen."},{"r":"Inhalt","q":"In welcher Form ist der Roman geschrieben?","a":"Als 'Bericht' Fabers – ein Versuch rationaler Selbstrechtfertigung, der zunehmend brüchig wird."},{"r":"Autor","q":"Als was gilt Max Frisch?","a":"Als einer der bedeutendsten deutschsprachigen Autoren der Nachkriegszeit, neben Dürrenmatt der wichtigste Schweizer Schriftsteller."},{"r":"Autor","q":"Nenne weitere Werke Max Frischs.","a":"Die Romane 'Stiller' und 'Mein Name sei Gantenbein' sowie das Drama 'Andorra'."},{"r":"Interpretation","q":"Was bedeutet der Titel 'Homo faber'?","a":"'Der schaffende/technische Mensch' – der Mensch, der die Welt durch Machen und Berechnen beherrschen will."},{"r":"Interpretation","q":"Was ist die zentrale Kritik des Romans?","a":"Die Kritik am einseitigen technisch-rationalen Weltbild, das Gefühl, Schicksal, Natur und Tod verdrängt – und gerade dadurch scheitert."},{"r":"Interpretation","q":"Wie widerlegt die Handlung Fabers Weltbild?","a":"Ausgerechnet die von ihm geleugnete 'Fügung' (die Inzest-Tragödie) holt ihn ein – der Zufall triumphiert über die Berechnung."},{"r":"Interpretation","q":"Welche Bedeutung hat das Motiv des Sehens/der Blindheit?","a":"Faber trägt oft eine Kamera und 'sieht' doch nicht die Wahrheit seines Lebens; erst am Ende beginnt er, wirklich wahrzunehmen."},{"r":"Interpretation","q":"Welche mythologische Schicht trägt der Roman?","a":"Anklänge an den antiken Ödipus-Mythos (unwissentlicher Inzest, unentrinnbares Schicksal) unterlegen die moderne Handlung."},{"r":"Interpretation","q":"Wie verändert sich Faber am Ende?","a":"Angesichts von Schuld, Krankheit und Tod öffnet er sich dem Leben, der Wahrnehmung und der Vergänglichkeit – eine späte Wandlung."},{"r":"Einfluss","q":"Welchen Status hat 'Homo faber' im Deutschunterricht?","a":"Ein vielgelesener Schulklassiker, oft als Musterfall für die Kritik am technischen Fortschrittsglauben."},{"r":"Einfluss","q":"Welches Grundthema der Moderne verhandelt der Roman?","a":"Das gespannte Verhältnis von Technik/Rationalität und den verdrängten Mächten von Gefühl, Natur und Schicksal."}]},{"title":"Krieg und Frieden","author":"Lew Tolstoi","year":1869,"land":"Russland","epoch":"Realismus","icon":"🎖️","summary":"Tolstois monumentales Epos verfolgt mehrere Adelsfamilien durch die russische Gesellschaft während der Napoleonischen Kriege (1805–1812). Zwischen Schlachtfeld und Salon verbindet es privates Schicksal mit Geschichtsphilosophie und gilt als einer der größten Romane der Weltliteratur.","cards":[{"r":"Inhalt","q":"Welche historische Epoche bildet den Rahmen?","a":"Die Napoleonischen Kriege, insbesondere Napoleons Russlandfeldzug 1812 mit der Schlacht von Borodino und dem Brand von Moskau."},{"r":"Inhalt","q":"Wer sind die zentralen Figuren?","a":"Vor allem der grüblerische Pierre Besuchow, der Fürst Andrei Bolkonski und die lebensvolle Natascha Rostowa."},{"r":"Inhalt","q":"Welche Entwicklung nimmt Pierre Besuchow?","a":"Vom orientierungslosen, reichen Erben über die Freimaurerei und die Kriegserfahrung bis zu innerer Reife und einfachem Lebensglück."},{"r":"Inhalt","q":"Was widerfährt Fürst Andrei?","a":"Er sucht Ruhm im Krieg, wird desillusioniert, findet kurz Liebe zu Natascha und stirbt schließlich an einer Kriegsverwundung."},{"r":"Inhalt","q":"Welche Rolle spielt Natascha Rostowa?","a":"Sie verkörpert unmittelbare Lebensfreude; ihre Reifung von der schwärmerischen Jugend zur Frau und Mutter durchzieht den Roman."},{"r":"Inhalt","q":"Wie stellt Tolstoi Napoleon dar?","a":"Nicht als genialen Lenker, sondern als eitlen Menschen, der die Ereignisse keineswegs steuert – entgegen dem Mythos vom großen Mann."},{"r":"Autor","q":"Was kennzeichnet Tolstois Erzählweise in diesem Werk?","a":"Die Verbindung von breitem Gesellschaftspanorama, psychologischer Feinzeichnung und eingeschobenen geschichtsphilosophischen Essays."},{"r":"Autor","q":"Wie stand Tolstoi zur 'großen Männer'-Geschichtsschreibung?","a":"Er lehnte sie ab: Geschichte werde nicht von Feldherren gemacht, sondern von unzähligen kleinen Handlungen der Vielen."},{"r":"Autor","q":"Nenne Tolstois anderes Hauptwerk.","a":"'Anna Karenina'."},{"r":"Interpretation","q":"Was ist Tolstois geschichtsphilosophische Kernthese?","a":"Dass Geschichte nicht von einzelnen 'großen Männern', sondern von der Summe zahlloser individueller Handlungen und Notwendigkeiten bestimmt wird."},{"r":"Interpretation","q":"Wie verhalten sich 'Krieg' und 'Frieden' im Roman zueinander?","a":"Sie durchdringen einander: Auch im Frieden herrscht Kampf, und im Krieg zeigen sich Menschlichkeit und Alltag; der Titel meint beide Sphären des Lebens."},{"r":"Interpretation","q":"Wofür steht Pierres Weg?","a":"Für die Suche nach dem Sinn des Lebens, die erst in Demut, Nächstenliebe und einfacher Existenz zur Ruhe kommt."},{"r":"Interpretation","q":"Welche Bedeutung hat die Schlacht von Borodino?","a":"Als Wendepunkt zeigt sie das Chaos und die Undurchschaubarkeit des Krieges, in dem kein Feldherr wirklich 'befiehlt'."},{"r":"Interpretation","q":"Wie ist Fürst Andreis Todeserfahrung zu deuten?","a":"Als Loslösung vom Ehrgeiz und Erkenntnis einer allumfassenden Liebe jenseits des irdischen Strebens."},{"r":"Interpretation","q":"Welche Kritik übt der Roman an der Adelsgesellschaft?","a":"Er kontrastiert die eitle, französisch parlierende Salonwelt mit echter, 'russischer' Volksverbundenheit und Natürlichkeit."},{"r":"Interpretation","q":"Warum gilt der Roman als 'Epos der Moderne'?","a":"Weil er individuelles Schicksal und Weltgeschichte, Fiktion und Geschichtsdenken zu einem umfassenden Bild des Lebens verbindet."},{"r":"Interpretation","q":"Welche Rolle spielt der Zufall bzw. die Notwendigkeit?","a":"Tolstoi betont, wie wenig die Handelnden ihre Lage überschauen – Geschichte erscheint als Geflecht von Notwendigkeiten hinter dem Rücken der Akteure."},{"r":"Einfluss","q":"Welchen Rang hat 'Krieg und Frieden' in der Weltliteratur?","a":"Es gilt als eines der größten und einflussreichsten Werke der Romankunst überhaupt."},{"r":"Einfluss","q":"Wie beeinflusste Tolstois Geschichtsdenken andere?","a":"Seine Kritik am 'großen Mann' und seine Betonung der Vielen wirkten auf Geschichtsphilosophie und Literatur nach."},{"r":"Einfluss","q":"Wie prägte der Roman die Gattung des Epos?","a":"Als Muster des vielsträngigen Gesellschafts- und Kriegsromans, oft verfilmt und adaptiert."}]},{"title":"Der große Gatsby","author":"F. Scott Fitzgerald","year":1925,"land":"USA","epoch":"Moderne","icon":"🥂","summary":"Im Jazz-Zeitalter der 1920er verehrt der geheimnisvolle Selfmade-Millionär Jay Gatsby von seiner Prunkvilla aus die verheiratete Daisy. Sein Traum von der Wiederholung der Vergangenheit endet tragisch. Der Roman gilt als große Parabel auf den 'amerikanischen Traum'.","cards":[{"r":"Inhalt","q":"Wer erzählt die Geschichte?","a":"Nick Carraway, Gatsbys Nachbar, der als teilnehmender Beobachter von dessen Aufstieg und Fall berichtet."},{"r":"Inhalt","q":"Was ist Gatsbys großer Wunsch?","a":"Die verheiratete Daisy Buchanan zurückzugewinnen und die Vergangenheit gleichsam zu wiederholen."},{"r":"Inhalt","q":"Womit beeindruckt Gatsby seine Umgebung?","a":"Mit rauschenden Festen in seiner Prunkvilla und zur Schau gestelltem Reichtum – dessen zweifelhafte Herkunft im Dunkeln bleibt."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Gatsby wird erschossen – für einen tödlichen Autounfall, den Daisy verursachte; kaum jemand kommt zu seiner Beerdigung."},{"r":"Autor","q":"Wofür steht Fitzgerald literarisch?","a":"Als Chronist des 'Jazz Age' und der 'Roaring Twenties', deren Glanz und Leere er einfing."},{"r":"Autor","q":"Wie war der Erfolg des Romans zu Fitzgeralds Lebzeiten?","a":"Mäßig; erst nach seinem Tod wurde 'Der große Gatsby' zum Klassiker der amerikanischen Literatur."},{"r":"Interpretation","q":"Wie kritisiert der Roman den 'amerikanischen Traum'?","a":"Er zeigt, dass Gatsbys Aufstieg und Reichtum ihn dem erträumten Glück nicht näherbringen – der Traum ist hohl und käuflich, aber uneinlösbar."},{"r":"Interpretation","q":"Wofür steht das grüne Licht am Ende von Daisys Steg?","a":"Für Gatsbys unerreichbare Sehnsucht und die stets zurückweichende Verheißung der Zukunft."},{"r":"Interpretation","q":"Was symbolisiert das 'Tal der Asche'?","a":"Die moralische und soziale Verwüstung hinter dem glitzernden Reichtum – die Kehrseite des Booms."},{"r":"Interpretation","q":"Welche Gesellschaftskritik enthält der Roman?","a":"Die Kluft zwischen altem Geldadel und Neureichen sowie die Skrupellosigkeit und Leere der reichen Oberschicht."},{"r":"Interpretation","q":"Warum ist Gatsby eine tragische Figur?","a":"Weil sein idealistischer, fast romantischer Glaube an die Wiederholbarkeit der Vergangenheit ihn blind und angreifbar macht."},{"r":"Interpretation","q":"Welche Funktion hat der Erzähler Nick?","a":"Als moralische Instanz und zugleich faszinierter Mitläufer vermittelt er zwischen Bewunderung und Kritik an Gatsbys Welt."},{"r":"Interpretation","q":"Was bedeutet der berühmte Schlusssatz sinngemäß?","a":"Dass wir gegen den Strom rudern und unaufhörlich in die Vergangenheit zurückgetragen werden – die Unmöglichkeit, sie zurückzuholen."},{"r":"Einfluss","q":"Welchen Status hat der Roman heute?","a":"Er gilt als einer der bedeutendsten amerikanischen Romane des 20. Jahrhunderts und als Schullektüre-Klassiker."},{"r":"Einfluss","q":"Wie präsent ist der Stoff in der Popkultur?","a":"Vielfach verfilmt (u.a. 2013 mit Leonardo DiCaprio) und zum Sinnbild der 1920er geworden."}]},{"title":"Der Tod in Venedig","author":"Thomas Mann","year":1912,"land":"Deutschland","epoch":"Moderne","icon":"🎭","summary":"Der disziplinierte Schriftsteller Gustav von Aschenbach verfällt in Venedig einer verzehrenden Faszination für den schönen Knaben Tadzio. Während eine Cholera-Epidemie die Stadt heimsucht, kann er sich nicht losreißen und stirbt. Eine Novelle über Kunst, Schönheit und Verfall.","cards":[{"r":"Inhalt","q":"Wer ist Gustav von Aschenbach?","a":"Ein alternder, hochdisziplinierter Schriftsteller, der in Venedig Erholung sucht."},{"r":"Inhalt","q":"Was löst seine Krise aus?","a":"Die zunehmend obsessive Faszination für den schönen polnischen Knaben Tadzio."},{"r":"Inhalt","q":"Was bedroht die Stadt und wie reagiert Aschenbach?","a":"Eine Cholera-Epidemie; trotz Warnungen bleibt er, unfähig sich von Tadzio zu lösen, und stirbt am Strand."},{"r":"Autor","q":"In welche Werkgruppe Manns gehört die Novelle?","a":"Zu seinen Meisterwerken über die Künstlerproblematik und den Gegensatz von Geist und Leben."},{"r":"Interpretation","q":"Welchen Grundkonflikt verhandelt die Novelle?","a":"Den Zusammenbruch der apollinischen Disziplin durch das dionysische Rauschhafte – Ordnung gegen Trieb."},{"r":"Interpretation","q":"Wofür steht Tadzio?","a":"Für vollkommene Schönheit als Ideal – zugleich Inspiration und Verführung zum Untergang."},{"r":"Interpretation","q":"Welche Bedeutung haben die antiken Anspielungen?","a":"Platonische Schönheitsvorstellungen und die dionysisch-apollinische Spannung (Nietzsche) durchziehen die Novelle."},{"r":"Interpretation","q":"Wie hängt Venedig mit dem Thema zusammen?","a":"Die morbide, von Seuche und Verfall gezeichnete Stadt spiegelt Aschenbachs inneren Zerfall."},{"r":"Interpretation","q":"Was bedeutet Aschenbachs Verfall für das Künstlertum?","a":"Er zeigt die Gefahr, dass die Hingabe an Schönheit und Rausch die bürgerliche Selbstbeherrschung und Würde zerstört."},{"r":"Interpretation","q":"Warum ist die Schönheit hier zweideutig?","a":"Sie ist erhaben und todbringend zugleich – der Weg des Ästheten führt über die Schönheit in den Abgrund."},{"r":"Einfluss","q":"Wie wirkte die Novelle nach?","a":"Sie wurde zum Referenzwerk über Kunst und Dekadenz; Luchino Viscontis Verfilmung (1971) und Brittens Oper machten sie weltbekannt."},{"r":"Einfluss","q":"Welches Grundthema Manns verdichtet sie?","a":"Den Konflikt zwischen bürgerlicher Ordnung und der abgründigen Macht von Kunst, Trieb und Tod."}]},{"title":"Der Steppenwolf","author":"Hermann Hesse","year":1927,"land":"Deutschland","epoch":"Moderne","icon":"🐺","summary":"Harry Haller fühlt sich als zerrissener 'Steppenwolf' zwischen bürgerlicher Existenz und wilder, einsamer Natur. Ein 'Magisches Theater' konfrontiert ihn mit den vielen Seiten seiner Seele. Ein Kultroman über Identität und innere Vielfalt.","cards":[{"r":"Inhalt","q":"Wie sieht sich Harry Haller selbst?","a":"Als 'Steppenwolf' – ein Wesen, das zwischen bürgerlicher Anständigkeit und einer wilden, einsamen Wolfsnatur zerrissen ist."},{"r":"Inhalt","q":"Was ist das 'Magische Theater'?","a":"Ein surrealer, traumartiger Raum ('Nur für Verrückte'), in dem Haller den vielfältigen Möglichkeiten seiner Seele begegnet."},{"r":"Inhalt","q":"Wer hilft Haller aus seiner Verzweiflung?","a":"Die lebenskluge Hermine sowie Pablo und Maria führen ihn in Sinnlichkeit, Musik und Lebensfreude ein."},{"r":"Autor","q":"Wofür ist Hermann Hesse bekannt?","a":"Als Nobelpreisträger (1946) und Autor von Sinnsuche-Romanen wie 'Siddhartha', 'Demian' und 'Das Glasperlenspiel'."},{"r":"Interpretation","q":"Was kritisiert der Roman am 'Steppenwolf'-Selbstbild?","a":"Die Vereinfachung: Der Mensch ist nicht 'Wolf und Bürger', sondern besteht aus unzähligen Seelen – die Zweiteilung ist Illusion."},{"r":"Interpretation","q":"Welche Bedeutung hat der Humor im 'Magischen Theater'?","a":"Er lehrt Haller, sich und das Leben nicht todernst zu nehmen – Distanz und Heiterkeit als Weg aus der Verzweiflung."},{"r":"Interpretation","q":"Inwiefern ist es ein Roman über Individuation?","a":"Haller soll die Vielfalt seiner Persönlichkeit annehmen statt sie in starre Gegensätze zu pressen – eine seelische Reifung."},{"r":"Interpretation","q":"Welche Rolle spielt die Bürgerlichkeitskritik?","a":"Der Roman zeigt die Enge des Bürgertums, aber auch dessen heimliche Anziehungskraft für den Außenseiter Haller."},{"r":"Interpretation","q":"Warum wurde der Roman zum Kultbuch?","a":"Weil seine Themen – Entfremdung, Selbstsuche, Aufbruch aus der Konvention – besonders die Gegenkultur ab den 1960ern ansprachen."},{"r":"Einfluss","q":"Welche Wirkung hatte der Roman international?","a":"Er wurde v.a. in den USA der 1960er ein Kultbuch der Hippie- und Gegenkultur; eine Rockband nannte sich 'Steppenwolf'."},{"r":"Einfluss","q":"Welches Grundthema teilt er mit Hesses übrigem Werk?","a":"Die Suche nach Ganzheit und Sinn zwischen Geist und Sinnlichkeit, Individuum und Welt."}]},{"title":"Die Räuber","author":"Friedrich Schiller","year":1781,"land":"Deutschland","epoch":"Sturm und Drang","icon":"⚔️","summary":"Das intrigante Zusammenspiel der feindlichen Brüder Karl und Franz Moor treibt den idealistischen Karl in ein Räuberleben. Schillers rebellisches Erstlingsdrama wurde zum Fanal des Sturm und Drang gegen Tyrannei und starre Ordnung.","cards":[{"r":"Inhalt","q":"Wer sind die beiden Brüder Moor?","a":"Der edle, feurige Karl und der intrigante, missgünstige Franz, der Karl beim Vater verleumdet."},{"r":"Inhalt","q":"Wie wird Karl zum Räuberhauptmann?","a":"Durch Franz' Intrige verstoßen und für enterbt gehalten, schließt sich Karl aus Empörung einer Räuberbande an und wird ihr Anführer."},{"r":"Inhalt","q":"Wie endet das Drama?","a":"Nach Tod und Zerstörung erkennt Karl die Schuld seines Weges; er stellt sich freiwillig der Justiz, während Franz sich selbst richtet."},{"r":"Autor","q":"In welchem Alter und Kontext schrieb Schiller das Stück?","a":"Als junger Mann; die Uraufführung 1782 in Mannheim war ein aufsehenerregender Skandalerfolg."},{"r":"Autor","q":"Welcher Epoche gehört das Frühwerk an?","a":"Dem Sturm und Drang mit seinem Freiheitspathos und der Auflehnung gegen Autorität."},{"r":"Interpretation","q":"Wogegen richtet sich das Drama?","a":"Gegen Tyrannei, ständische Ungerechtigkeit und die Enge einer korrupten Ordnung – ein Ruf nach Freiheit."},{"r":"Interpretation","q":"Welches Dilemma verkörpert Karl Moor?","a":"Der Konflikt zwischen berechtigter Empörung und der Erkenntnis, dass Gewalt und Selbstjustiz neues Unrecht schaffen."},{"r":"Interpretation","q":"Wofür steht der Kontrast der Brüder?","a":"Für den Gegensatz von idealistischem Freiheitsdrang (Karl) und kaltem, machiavellistischem Egoismus (Franz)."},{"r":"Interpretation","q":"Was bedeutet der Wahlspruch 'In tirannos'?","a":"'Gegen die Tyrannen' – das Motto späterer Ausgaben machte das Stück zum Symbol des Aufbegehrens."},{"r":"Interpretation","q":"Warum ist Karls Ende moralisch bedeutsam?","a":"Seine freiwillige Unterwerfung unter das Gesetz zeigt, dass Freiheit nicht in Willkür, sondern in sittlicher Verantwortung liegt."},{"r":"Einfluss","q":"Welche Bedeutung hat das Stück für das deutsche Theater?","a":"Als Fanal des Sturm und Drang und Klassiker der Bühnenliteratur begründete es Schillers Ruhm."},{"r":"Einfluss","q":"Wie wirkte das Freiheitspathos nach?","a":"Es beeinflusste die Revolutionsbegeisterung und das politische Drama; Schiller wurde zum 'Dichter der Freiheit'."}]},{"title":"Im Westen nichts Neues","author":"Erich Maria Remarque","year":1929,"land":"Deutschland","epoch":"Neue Sachlichkeit","icon":"🪖","summary":"Der junge Soldat Paul Bäumer erlebt die Materialschlachten des Ersten Weltkriegs und den Verlust seiner ganzen Genera
