tion. Remarques nüchtern-erschütternder Antikriegsroman wurde zum weltweiten Bestseller – und von den Nationalsozialisten verbrannt.","cards":[{"r":"Inhalt","q":"Wer ist Paul Bäumer?","a":"Ein junger Freiwilliger, der begeistert in den Ersten Weltkrieg zieht und dessen Illusionen an der Front zerbrechen."},{"r":"Inhalt","q":"Was schildert der Roman vor allem?","a":"Den Grabenkrieg, das Massensterben, den Hunger und die seelische Verrohung der Soldaten."},{"r":"Inhalt","q":"Woher stammt der Titel?","a":"Aus einem lakonischen Heeresbericht: Am Tag von Pauls Tod hieß es an der Front 'nichts Neues'."},{"r":"Autor","q":"Was widerfuhr dem Roman im Nationalsozialismus?","a":"Er wurde als 'wehrkraftzersetzend' verboten und öffentlich verbrannt; Remarque emigrierte."},{"r":"Interpretation","q":"Was ist die zentrale Botschaft des Romans?","a":"Eine radikale Anklage gegen den Krieg und die Sinnlosigkeit des Massensterbens einer ganzen Jugend."},{"r":"Interpretation","q":"Was meint der Begriff der 'verlorenen Generation'?","a":"Die jungen Männer, die – körperlich überlebend oder nicht – seelisch vom Krieg zerstört und entwurzelt wurden."},{"r":"Interpretation","q":"Wie entlarvt der Roman die Kriegsbegeisterung?","a":"Er zeigt, wie patriotische Phrasen der Lehrer und Autoritäten an der grausamen Realität der Front zerschellen."},{"r":"Interpretation","q":"Welche Wirkung erzielt Remarques nüchterner Stil?","a":"Die sachliche, schnörkellose Sprache (Neue Sachlichkeit) macht das Grauen umso eindringlicher."},{"r":"Interpretation","q":"Welche Rolle spielt die Kameradschaft?","a":"Sie ist der einzige Halt im Grauen – und macht die Verluste umso schmerzhafter."},{"r":"Einfluss","q":"Wie erfolgreich war der Roman?","a":"Ein weltweiter Bestseller und einer der berühmtesten Antikriegsromane überhaupt."},{"r":"Einfluss","q":"Welche Verfilmungen sind bekannt?","a":"Die US-Verfilmung von 1930 (Oscar) und die deutsche Neuverfilmung von 2022 (mehrfach oscarprämiert)."}]},{"title":"Das Parfum","author":"Patrick Süskind","year":1985,"land":"Deutschland","epoch":"Gegenwart","icon":"🌸","summary":"Im Frankreich des 18. Jahrhunderts wird Jean-Baptiste Grenouille mit einem übermenschlichen Geruchssinn, aber ohne eigenen Körpergeruch geboren. Besessen von der Idee, den vollkommenen Duft zu schaffen, wird er zum Mörder. Ein moderner Welterfolg.","cards":[{"r":"Inhalt","q":"Was ist an Grenouille außergewöhnlich?","a":"Er besitzt einen genialen, übermenschlichen Geruchssinn, hat aber selbst keinen eigenen Körpergeruch."},{"r":"Inhalt","q":"Was ist Grenouilles Ziel?","a":"Den vollkommensten Duft der Welt zu schaffen – wofür er den Körperduft junger Frauen 'einfängt' und dafür mordet."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Sein Duft verführt bei der Hinrichtung die Menge zur Ekstase; am Ende lässt er sich von Außenseitern zerreißen und 'verschlingen'."},{"r":"Autor","q":"Was ist über Patrick Süskind bekannt?","a":"Ein sehr öffentlichkeitsscheuer deutscher Autor; 'Das Parfum' wurde zu einem der erfolgreichsten deutschen Nachkriegsromane weltweit."},{"r":"Interpretation","q":"Wofür steht Grenouilles fehlender Eigengeruch?","a":"Für seine Identitätslosigkeit und fehlende Menschlichkeit – er bleibt ein Fremder unter den Menschen."},{"r":"Interpretation","q":"Welche Macht symbolisiert der Duft?","a":"Die Macht über Gefühle und Massen: Wer den Geruch beherrscht, kann Liebe und Anbetung erzwingen, ohne selbst zu lieben."},{"r":"Interpretation","q":"Wie spielt der Roman mit dem 'Genie'-Motiv?","a":"Grenouille ist ein monströses Genie – schöpferische Größe und moralische Leere fallen zusammen."},{"r":"Interpretation","q":"Welche Epoche und Stimmung ruft der Roman auf?","a":"Das stinkende, sinnlich überbordende 18. Jahrhundert – zugleich detailrealistisch und märchenhaft-grotesk."},{"r":"Interpretation","q":"Was sagt der Roman über Liebe und Anerkennung?","a":"Grenouille kann Verehrung erzeugen, aber keine echte Liebe empfangen – künstliche Wirkung ersetzt keine menschliche Bindung."},{"r":"Einfluss","q":"Wie erfolgreich war 'Das Parfum'?","a":"Ein internationaler Bestseller, in über 40 Sprachen übersetzt und 2006 aufwendig verfilmt."},{"r":"Einfluss","q":"Warum ist der Roman ein moderner Klassiker?","a":"Wegen seiner originellen Idee (Erzählen über den Geruchssinn) und der Verbindung von Kriminalgeschichte, historischem Roman und Parabel."}]},{"title":"Die Odyssee","author":"Homer","year":-700,"land":"Griechenland","epoch":"Antike","icon":"⛵","summary":"Das antike Epos schildert die zehnjährige Heimkehr des listenreichen Odysseus vom Trojanischen Krieg nach Ithaka. Auf seiner Irrfahrt besteht er Abenteuer mit Zyklopen, Sirenen und Zauberinnen, während daheim seine Frau Penelope von Freiern bedrängt wird.","cards":[{"r":"Inhalt","q":"Wovon handelt die Odyssee?","a":"Von der zehnjährigen, abenteuerlichen Heimkehr des Odysseus vom Trojanischen Krieg auf seine Insel Ithaka."},{"r":"Inhalt","q":"Nenne bekannte Stationen der Irrfahrt.","a":"Der Zyklop Polyphem, die Zauberin Kirke, die Sirenen, Skylla und Charybdis sowie die Nymphe Kalypso."},{"r":"Inhalt","q":"Wie überlistet Odysseus den Zyklopen Polyphem?","a":"Er nennt sich 'Niemand', blendet den Riesen und entkommt unter dessen Schafen – so kann Polyphem keine Hilfe herbeirufen."},{"r":"Inhalt","q":"Was erwartet Odysseus zu Hause?","a":"Zahlreiche Freier bedrängen seine treue Frau Penelope; Odysseus kehrt verkleidet zurück und rächt sich an ihnen."},{"r":"Inhalt","q":"Wie hält Penelope die Freier hin?","a":"Mit der List, sie wolle erst ein Leichentuch fertigweben – das sie nachts wieder auftrennt."},{"r":"Autor","q":"Wer war Homer?","a":"Der legendäre griechische Dichter, dem 'Ilias' und 'Odyssee' zugeschrieben werden; seine historische Existenz ist ungewiss."},{"r":"Autor","q":"In welcher Form sind die Epen verfasst?","a":"In Versen (Hexametern); sie entstammen einer mündlichen Erzähltradition."},{"r":"Interpretation","q":"Wofür steht Odysseus als Held?","a":"Für den 'listenreichen', klugen Menschen, der durch Verstand und Selbstbeherrschung überlebt – nicht nur durch Kraft."},{"r":"Interpretation","q":"Was verkörpert die Heimkehr (Nostos) thematisch?","a":"Die Sehnsucht nach Heimat, Identität und Ordnung nach Krieg und Chaos."},{"r":"Interpretation","q":"Welche Bedeutung hat die Sirenen-Episode?","a":"Sie steht sprichwörtlich für die Verlockung, der man nur durch Vorsicht und List (Odysseus lässt sich fesseln) widersteht."},{"r":"Interpretation","q":"Was bedeutet die Wendung 'zwischen Skylla und Charybdis'?","a":"Die Wahl zwischen zwei Übeln, bei der man keinem gefahrlos ausweichen kann."},{"r":"Interpretation","q":"Warum gilt Odysseus als früher 'moderner' Held?","a":"Wegen seiner Individualität, seines Zweifelns und seiner Klugheit – er ist vielschichtiger als bloße Kriegerhelden."},{"r":"Einfluss","q":"Welchen Rang hat die Odyssee in der Weltliteratur?","a":"Sie ist eines der ältesten und einflussreichsten Werke des Abendlandes und Urbild der Reise- und Abenteuererzählung."},{"r":"Einfluss","q":"Nenne ein modernes Werk, das die Odyssee aufgreift.","a":"James Joyces 'Ulysses' überträgt die Struktur der Odyssee auf einen einzigen Tag in Dublin."},{"r":"Einfluss","q":"Welche Begriffe verdanken wir dem Epos?","a":"'Odyssee' als Wort für eine lange Irrfahrt sowie Redewendungen wie 'zwischen Skylla und Charybdis'."}]},{"title":"Hamlet","author":"William Shakespeare","year":1601,"land":"England","epoch":"Renaissance","icon":"💀","summary":"Der dänische Prinz Hamlet soll den Mord an seinem Vater rächen, den sein Onkel Claudius beging, um Thron und Königin zu gewinnen. Zwischen Zweifel, Wahnsinn und Grübeln zögert Hamlet – bis am Ende fast alle Hauptfiguren tot sind. Das wohl berühmteste Drama der Weltliteratur.","cards":[{"r":"Inhalt","q":"Was fordert der Geist von Hamlets Vater?","a":"Rache: Hamlets Onkel Claudius habe den König ermordet, um Krone und Königin Gertrude zu gewinnen."},{"r":"Inhalt","q":"Wie prüft Hamlet die Schuld des Claudius?","a":"Er lässt Schauspieler ein Stück aufführen, das den Mord nachstellt ('Die Mausefalle'), und beobachtet Claudius' Reaktion."},{"r":"Inhalt","q":"Wie endet das Drama?","a":"In einem vergifteten Duell sterben Hamlet, Claudius, Gertrude und Laertes – nahezu der gesamte Hof."},{"r":"Inhalt","q":"Wer ist Ophelia und was geschieht mit ihr?","a":"Hamlets Geliebte; von seinem Verhalten und dem Tod ihres Vaters zerrüttet, verfällt sie dem Wahnsinn und ertrinkt."},{"r":"Autor","q":"Als was gilt Shakespeare?","a":"Als der bedeutendste Dramatiker der englischen Sprache und eine zentrale Figur der Weltliteratur."},{"r":"Autor","q":"Nenne weitere Werke Shakespeares.","a":"'Romeo und Julia', 'Macbeth', 'König Lear' und 'Othello'."},{"r":"Interpretation","q":"Was bedeutet der Monolog 'Sein oder Nichtsein'?","a":"Hamlets Grübeln über Leben und Tod, Sinn des Leidens und die lähmende Angst vor dem Ungewissen – Inbegriff der Reflexion über die Existenz."},{"r":"Interpretation","q":"Was ist der 'Hamlet-Konflikt'?","a":"Das Zaudern des Denkenden: Hamlets Reflexion und Zweifel lähmen seine Tatkraft – Grübeln gegen Handeln."},{"r":"Interpretation","q":"Ist Hamlets Wahnsinn echt oder gespielt?","a":"Umstritten – teils Taktik ('verstellter' Wahnsinn), teils echte seelische Erschütterung; die Ambivalenz ist Teil der Figur."},{"r":"Interpretation","q":"Welche Themen macht das Stück modern?","a":"Zweifel, Selbstreflexion, die Unsicherheit über Wahrheit und Handeln – Hamlet gilt als früher 'moderner', selbstbewusster Mensch."},{"r":"Interpretation","q":"Wofür steht die Szene mit dem Schädel Yoricks?","a":"Für die Vergänglichkeit alles Lebendigen (Memento mori) – Hamlets Nachdenken über den Tod."},{"r":"Einfluss","q":"Warum gilt 'Hamlet' als so bedeutend?","a":"Als eines der meistgespielten und -gedeuteten Dramen überhaupt prägte es das Bild des reflektierenden, zerrissenen Helden."},{"r":"Einfluss","q":"Welche Wendungen stammen aus dem Stück?","a":"'Sein oder Nichtsein', 'etwas ist faul im Staate Dänemark' und 'der Rest ist Schweigen'."}]},{"title":"Die Göttliche Komödie","author":"Dante Alighieri","year":1320,"land":"Italien","epoch":"Mittelalter","icon":"🔥","summary":"Dantes Versepos schildert eine Jenseitsreise durch Hölle, Läuterungsberg und Paradies. Geführt vom Dichter Vergil und später von seiner idealisierten Beatrice, durchwandert Dante die jenseitigen Reiche. Ein Gründungswerk der italienischen Literatur.","cards":[{"r":"Inhalt","q":"In welche drei Reiche gliedert sich das Epos?","a":"In Hölle (Inferno), Läuterungsberg (Purgatorio) und Paradies (Paradiso)."},{"r":"Inhalt","q":"Wer führt Dante durch Hölle und Läuterungsberg?","a":"Der römische Dichter Vergil; durch das Paradies geleitet ihn seine idealisierte Geliebte Beatrice."},{"r":"Inhalt","q":"Was steht über dem Höllentor?","a":"Sinngemäß die berühmte Inschrift 'Lasst alle Hoffnung fahren, die ihr eintretet'."},{"r":"Autor","q":"Wer war Dante Alighieri?","a":"Ein florentinischer Dichter (1265–1321), politisch verbannt; er schrieb das Werk im Exil in italienischer Volkssprache statt auf Latein."},{"r":"Interpretation","q":"Warum ist die Wahl der Volkssprache bedeutsam?","a":"Dante schrieb auf Italienisch (Toskanisch) und begründete damit die italienische Literatursprache."},{"r":"Interpretation","q":"Wie ist die Jenseitsreise allegorisch zu verstehen?","a":"Als Weg der Seele von der Sünde (Hölle) über die Läuterung zur Gottesschau – eine Reise zu Erlösung und Erkenntnis."},{"r":"Interpretation","q":"Welche Ordnung herrscht in Dantes Hölle?","a":"Ein streng gestuftes System: Die Sünden werden nach Schwere geordnet und mit sinnbildlich passenden Strafen (contrapasso) vergolten."},{"r":"Interpretation","q":"Welche Bedeutung hat Beatrice?","a":"Sie verkörpert göttliche Gnade und die zum Heil führende, geistige Liebe."},{"r":"Interpretation","q":"Warum verbindet das Werk Theologie und Poesie?","a":"Es fasst das mittelalterliche Welt- und Gottesbild dichterisch zusammen und verknüpft antikes und christliches Denken."},{"r":"Einfluss","q":"Welchen Rang hat die Göttliche Komödie?","a":"Sie gilt als Gründungswerk der italienischen Literatur und als einer der Gipfel der Weltdichtung."},{"r":"Einfluss","q":"Wie prägte Dante die Kultur?","a":"Sein Höllenbild beeinflusste Kunst und Literatur über Jahrhunderte; Dante gilt als 'Vater' der italienischen Sprache."}]},{"title":"Frankenstein","author":"Mary Shelley","year":1818,"land":"England","epoch":"Romantik","icon":"⚡","summary":"Der Wissenschaftler Victor Frankenstein erschafft aus toter Materie ein lebendes Wesen, verstößt es aber entsetzt. Das einsame, verzweifelte Geschöpf wird zum Rächer. Mary Shelleys Roman gilt als Urwerk der Science-Fiction und moderne Prometheus-Sage.","cards":[{"r":"Inhalt","q":"Was gelingt Victor Frankenstein?","a":"Er erschafft aus toter Materie ein lebendiges, menschenähnliches Wesen – flieht aber entsetzt vor seiner Schöpfung."},{"r":"Inhalt","q":"Wie entwickelt sich das 'Monster'?","a":"Zunächst sanft und lernbegierig, wird es durch Zurückweisung und Einsamkeit verbittert und rächt sich an seinem Schöpfer."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"In einer Verfolgungsjagd bis in die Arktis; Victor stirbt, und das Geschöpf zieht sich in die Einsamkeit zurück, um zu sterben."},{"r":"Autor","q":"Wie entstand der Roman?","a":"Aus einem Schauergeschichten-Wettbewerb am Genfersee; die erst 18-jährige Mary Shelley schrieb ihn 1816/18."},{"r":"Interpretation","q":"Was bedeutet der Untertitel 'Der moderne Prometheus'?","a":"Wie Prometheus das Feuer stahl, maßt sich Frankenstein göttliche Schöpfermacht an – und wird dafür bestraft."},{"r":"Interpretation","q":"Welche Kritik am Fortschritt enthält der Roman?","a":"Eine Warnung vor Wissenschaft ohne Verantwortung: Der Schöpfer haftet für sein Geschöpf, das er verstößt."},{"r":"Interpretation","q":"Wer ist das eigentliche 'Monster'?","a":"Vieldeutig – oft der verantwortungslose Schöpfer Victor, nicht das anfangs unschuldige, durch Ablehnung verrohte Geschöpf."},{"r":"Interpretation","q":"Welche Themen der Romantik greift das Werk auf?","a":"Das Erhabene der Natur, das einsame Genie, die Grenzüberschreitung und die Nachtseite der Aufklärung."},{"r":"Einfluss","q":"Warum gilt 'Frankenstein' als Urwerk der Science-Fiction?","a":"Weil es erstmals künstliches Leben durch Wissenschaft (statt Magie) erschaffen lässt und dessen Folgen durchdenkt."},{"r":"Einfluss","q":"Wie präsent ist der Stoff heute?","a":"'Frankenstein' wurde zum kulturellen Mythos; unzählige Filme und die Debatte um wissenschaftliche Verantwortung berufen sich darauf."}]},{"title":"Der Vorleser","author":"Bernhard Schlink","year":1995,"land":"Deutschland","epoch":"Gegenwart","icon":"📖","summary":"Der 15-jährige Michael beginnt eine Affäre mit der älteren Hanna, die plötzlich verschwindet. Jahre später sieht er sie als Angeklagte in einem NS-Kriegsverbrecherprozess wieder – und erkennt ihr verborgenes Geheimnis. Ein vielgelesener Roman über Schuld und die zweite Generation.","cards":[{"r":"Inhalt","q":"Wie beginnt die Beziehung von Michael und Hanna?","a":"Der 15-jährige Michael beginnt eine Affäre mit der deutlich älteren Straßenbahnschaffnerin Hanna, der er oft vorliest."},{"r":"Inhalt","q":"Wo begegnet Michael Hanna Jahre später wieder?","a":"Als Jurastudent im Gerichtssaal – Hanna ist Angeklagte in einem Prozess wegen NS-Kriegsverbrechen als KZ-Aufseherin."},{"r":"Inhalt","q":"Welches Geheimnis verbirgt Hanna?","a":"Sie ist Analphabetin – und nimmt lieber eine schwerere Strafe in Kauf, als dies vor Gericht zuzugeben."},{"r":"Autor","q":"Wer ist Bernhard Schlink?","a":"Ein deutscher Jurist und Schriftsteller; 'Der Vorleser' wurde international erfolgreich und verfilmt."},{"r":"Interpretation","q":"Wofür steht Hannas Analphabetismus symbolisch?","a":"Für Scham, aber auch – vieldeutig und umstritten – für ein 'Nicht-verstehen-Können' und die Sprachlosigkeit gegenüber der Schuld."},{"r":"Interpretation","q":"Welches Grundthema verhandelt der Roman?","a":"Die Frage nach Schuld und Verstrickung und das Verhältnis der 'zweiten Generation' zur NS-Vergangenheit ihrer Eltern."},{"r":"Interpretation","q":"Warum ist Michaels Haltung ambivalent?","a":"Er liebt und verurteilt Hanna zugleich – stellvertretend für die Zerrissenheit der Nachgeborenen zwischen Verstehen und Verwerfen."},{"r":"Interpretation","q":"Welche Kritik wurde am Roman geäußert?","a":"Der Vorwurf, Hannas Analphabetismus 'entschuldige' oder relativiere die Täterschaft und lade zu unangemessenem Mitleid ein."},{"r":"Einfluss","q":"Wie erfolgreich war der Roman?","a":"Ein internationaler Bestseller, in viele Sprachen übersetzt und 2008 mit Kate Winslet (Oscar) verfilmt."},{"r":"Einfluss","q":"Warum ist er häufige Schullektüre?","a":"Weil er Schuld, Erinnerung und Vergangenheitsbewältigung an einer eindringlichen, diskutierbaren Geschichte verhandelt."}]},{"title":"Ulysses","author":"James Joyce","year":1922,"land":"Irland","epoch":"Moderne","icon":"🧠","summary":"Joyces revolutionärer Roman schildert einen einzigen Tag – den 16. Juni 1904 – im Leben des Anzeigenwerbers Leopold Bloom in Dublin. In kühnem Bewusstseinsstrom und wechselnden Stilen spiegelt er Homers 'Odyssee'. Ein Schlüsselwerk der literarischen Moderne.","cards":[{"r":"Inhalt","q":"Was ist die Zeitspanne des Romans?","a":"Ein einziger Tag: der 16. Juni 1904 in Dublin, heute als 'Bloomsday' gefeiert."},{"r":"Inhalt","q":"Wer ist die Hauptfigur?","a":"Der jüdische Anzeigenwerber Leopold Bloom, dessen Tagesgang parallel zu Stephen Dedalus verläuft."},{"r":"Inhalt","q":"Auf welches antike Werk bezieht sich der Roman?","a":"Auf Homers 'Odyssee': Bloom entspricht Odysseus, Stephen dem Telemachos, Molly der Penelope."},{"r":"Inhalt","q":"Womit endet der Roman berühmt?","a":"Mit Molly Blooms langem, interpunktionslosem inneren Monolog, der in einem bejahenden 'yes' mündet."},{"r":"Autor","q":"Wer war James Joyce?","a":"Ein irischer Schriftsteller, einer der wichtigsten Erneuerer des Romans; er lebte lange im europäischen Exil."},{"r":"Autor","q":"Welches weitere Werk Joyces ist bekannt?","a":"Der Erzählband 'Dubliner' und der noch experimentellere Roman 'Finnegans Wake'."},{"r":"Interpretation","q":"Welche Erzähltechnik machte Ulysses berühmt?","a":"Den 'stream of consciousness' (Bewusstseinsstrom), der Gedanken ungefiltert und assoziativ wiedergibt."},{"r":"Interpretation","q":"Warum wechselt der Roman ständig den Stil?","a":"Jedes Kapitel hat eine eigene Form/Technik – der Roman führt die Möglichkeiten des Erzählens selbst vor."},{"r":"Interpretation","q":"Was bedeutet die Parallele zur Odyssee?","a":"Sie erhebt den banalen Alltag eines 'kleinen Mannes' ins Mythische – Heldentum im Gewöhnlichen."},{"r":"Interpretation","q":"Warum gilt Ulysses als schwierig?","a":"Wegen Anspielungsfülle, Stilbrüchen, Sprachspielen und der Verweigerung linearer Handlung."},{"r":"Interpretation","q":"Was macht Leopold Bloom als Figur besonders?","a":"Seine Menschlichkeit, Toleranz und Alltäglichkeit – ein unheroischer, mitfühlender moderner 'Held'."},{"r":"Einfluss","q":"Welchen Rang hat Ulysses?","a":"Er gilt als einer der bedeutendsten und einflussreichsten Romane des 20. Jahrhunderts."},{"r":"Einfluss","q":"Wie wirkte Joyce auf die moderne Literatur?","a":"Sein Bewusstseinsstrom und die formale Kühnheit prägten die gesamte literarische Moderne."},{"r":"Einfluss","q":"Was ist der 'Bloomsday'?","a":"Der 16. Juni, an dem weltweit Joyce-Fans den Roman feiern und Schauplätze in Dublin nachgehen."}]},{"title":"Hundert Jahre Einsamkeit","author":"Gabriel García Márquez","year":1967,"land":"Kolumbien","epoch":"Moderne","icon":"🦋","summary":"Der Roman erzählt über sieben Generationen die Geschichte der Familie Buendía und des von ihr gegründeten Dorfes Macondo. Mit magischem Realismus verwebt García Márquez Wunderbares und Alltägliches. Ein Hauptwerk der lateinamerikanischen Literatur.","cards":[{"r":"Inhalt","q":"Welche Familie und welchen Ort schildert der Roman?","a":"Die Familie Buendía und das von ihr gegründete, mythische Dorf Macondo."},{"r":"Inhalt","q":"Über welchen Zeitraum erstreckt sich die Handlung?","a":"Über sieben Generationen bzw. rund hundert Jahre Aufstieg und Niedergang der Buendías."},{"r":"Inhalt","q":"Wie endet die Familiensaga?","a":"Mit dem Untergang von Macondo und dem letzten Buendía, wie es eine alte Prophezeiung vorhersagte."},{"r":"Autor","q":"Wofür wurde García Márquez ausgezeichnet?","a":"Er erhielt 1982 den Literaturnobelpreis; der Roman machte ihn weltberühmt."},{"r":"Autor","q":"Aus welchem Land und welcher Strömung stammt er?","a":"Aus Kolumbien; er ist die Leitfigur des lateinamerikanischen 'magischen Realismus'."},{"r":"Interpretation","q":"Was bedeutet 'magischer Realismus'?","a":"Wunderbares und Übernatürliches werden völlig selbstverständlich in die realistische Erzählung eingebettet."},{"r":"Interpretation","q":"Wofür steht Macondo?","a":"Als mythisches Sinnbild für Lateinamerika – seine Geschichte von Gründung, Blüte, Ausbeutung und Verfall."},{"r":"Interpretation","q":"Welche Rolle spielt die Wiederholung von Namen und Schicksalen?","a":"Sie deutet zyklische Zeit und die Unentrinnbarkeit familiärer Muster an – Geschichte als Kreislauf."},{"r":"Interpretation","q":"Welche politische Dimension hat der Roman?","a":"Er verarbeitet Kolonialismus, Bürgerkriege und das Massaker an Bananenarbeitern – kritische Geschichte Lateinamerikas."},{"r":"Interpretation","q":"Was symbolisiert die titelgebende 'Einsamkeit'?","a":"Die Unfähigkeit der Buendías zu echter Liebe und Verbindung – eine über Generationen vererbte Isolation."},{"r":"Einfluss","q":"Welche Bedeutung hat der Roman weltweit?","a":"Er ist eines der meistgelesenen Werke der Weltliteratur und machte den magischen Realismus global bekannt."},{"r":"Einfluss","q":"Wen beeinflusste García Márquez?","a":"Zahllose Autoren des magischen Realismus und der Weltliteratur; er prägte das Bild lateinamerikanischer Erzählkunst."}]},{"title":"Die Pest","author":"Albert Camus","year":1947,"land":"Frankreich / Algerien","epoch":"Moderne","icon":"🐀","summary":"In der algerischen Stadt Oran bricht die Pest aus; die Stadt wird abgeriegelt. Der Arzt Rieux und andere kämpfen gegen die Seuche und das Leid. Camus' Roman ist zugleich realistische Chronik und Parabel über Solidarität, Absurdität und Widerstand gegen das Böse.","cards":[{"r":"Inhalt","q":"Was geschieht in der Stadt Oran?","a":"Die Pest bricht aus, die Stadt wird abgeriegelt, und die Bewohner sind Leid, Trennung und Tod ausgeliefert."},{"r":"Inhalt","q":"Wer ist Dr. Rieux?","a":"Der Arzt, der unermüdlich und ohne Pathos gegen die Seuche kämpft; er erweist sich als der Chronist des Geschehens."},{"r":"Inhalt","q":"Wie reagieren die Menschen auf die Seuche?","a":"Unterschiedlich – von Flucht und Egoismus bis zu solidarischem Einsatz in freiwilligen Sanitätstrupps."},{"r":"Autor","q":"In welchen Kontext gehört der Roman bei Camus?","a":"In sein Denken der Revolte: dem Absurden nicht mit Resignation, sondern mit tätigem Widerstand zu begegnen."},{"r":"Interpretation","q":"Wofür steht die Pest als Allegorie?","a":"Für das Böse allgemein – oft gedeutet als Faschismus/NS-Besatzung, aber auch als jede unverschuldete Katastrophe."},{"r":"Interpretation","q":"Was ist die zentrale ethische Botschaft?","a":"Angesichts sinnlosen Leids zählt konkrete Solidarität und Menschlichkeit – 'anständig' seine Pflicht tun."},{"r":"Interpretation","q":"Wie unterscheidet sich Rieux' Haltung von Resignation?","a":"Er handelt ohne Hoffnung auf Sinn, aber aus Anstand – Revolte als tätiges Nein zum Leid."},{"r":"Interpretation","q":"Warnung des Schlusses?","a":"Der Pestbazillus verschwinde nie ganz – das Böse kann jederzeit wiederkehren; Wachsamkeit bleibt nötig."},{"r":"Interpretation","q":"Warum wurde der Roman in Pandemiezeiten neu gelesen?","a":"Weil er Quarantäne, kollektive Angst und Solidarität eindringlich und zeitlos schildert."},{"r":"Einfluss","q":"Welchen Rang hat 'Die Pest'?","a":"Ein Hauptwerk Camus' und ein Klassiker über Solidarität und den Umgang mit Katastrophen."},{"r":"Einfluss","q":"Wie wirkte der Roman jüngst nach?","a":"Während der COVID-19-Pandemie wurde er weltweit zum Bestseller und vielzitierten Bezugspunkt."}]},{"title":"Der Fänger im Roggen","author":"J. D. Salinger","year":1951,"land":"USA","epoch":"Moderne","icon":"🧢","summary":"Der 16-jährige Holden Caulfield streift nach seinem Schulverweis durch New York und erzählt in jugendlichem Slang von seiner Wut auf die 'verlogene' Erwachsenenwelt. Salingers Roman wurde zur Kultstimme jugendlicher Entfremdung.","cards":[{"r":"Inhalt","q":"Wer ist Holden Caulfield?","a":"Ein rebellischer 16-Jähriger, der von der Schule verwiesen wurde und ziellos durch New York streift."},{"r":"Inhalt","q":"Aus welcher Perspektive wird erzählt?","a":"In der Ich-Form, in jugendlichem, umgangssprachlichem Ton – rückblickend aus einer Art Klinik."},{"r":"Inhalt","q":"Was bedeutet das Bild vom 'Fänger im Roggen'?","a":"Holdens Wunsch, Kinder am Rand eines Roggenfelds vor dem Absturz zu bewahren – ihre Unschuld zu retten."},{"r":"Autor","q":"Was ist über J. D. Salinger bekannt?","a":"Er wurde durch den Roman berühmt, lebte danach aber extrem zurückgezogen und mied die Öffentlichkeit."},{"r":"Interpretation","q":"Was kritisiert Holden immer wieder?","a":"Die 'Verlogenheit' (phoniness) der Erwachsenenwelt – Heuchelei und Oberflächlichkeit."},{"r":"Interpretation","q":"Wofür steht Holdens Rebellion psychologisch?","a":"Für die schmerzhafte Adoleszenz, Trauer (um seinen toten Bruder) und die Angst vor dem Erwachsenwerden."},{"r":"Interpretation","q":"Warum wurde der Roman oft zensiert?","a":"Wegen Vulgärsprache und rebellischer Haltung galt er lange als anstößig – und wurde vielfach von Schulen verbannt."},{"r":"Interpretation","q":"Welche Sehnsucht steckt hinter Holdens Wut?","a":"Der Wunsch nach Echtheit, Schutz der Unschuld und Bewahrung des Kindlichen in einer korrumpierten Welt."},{"r":"Einfluss","q":"Welchen Kultstatus hat der Roman?","a":"Er wurde zur prägenden Stimme jugendlicher Entfremdung und ein Klassiker der US-Nachkriegsliteratur."},{"r":"Einfluss","q":"Wie wirkte Holden Caulfield kulturell?","a":"Als Prototyp des rebellischen, desillusionierten Teenagers in Literatur, Film und Popkultur."}]},{"title":"Kabale und Liebe","author":"Friedrich Schiller","year":1784,"land":"Deutschland","epoch":"Sturm und Drang","icon":"🥀","summary":"Die Liebe zwischen dem adligen Ferdinand und der bürgerlichen Musikertochter Luise scheitert an höfischer Intrige und Standesschranken. Schillers 'bürgerliches Trauerspiel' klagt die Willkür des Adels und die Enge der Ständeordnung an.","cards":[{"r":"Inhalt","q":"Wer sind Ferdinand und Luise?","a":"Ferdinand von Walter, Sohn des Präsidenten, und Luise Miller, Tochter eines bürgerlichen Musikers – ein Paar über Standesgrenzen hinweg."},{"r":"Inhalt","q":"Worin besteht die 'Kabale' (Intrige)?","a":"Ferdinands Vater und Sekretär Wurm erzwingen von Luise einen falschen Liebesbrief, um das Paar zu trennen."},{"r":"Inhalt","q":"Wie endet das Trauerspiel?","a":"Der eifersüchtig getäuschte Ferdinand vergiftet Luise und sich selbst; sterbend erfährt er die Wahrheit."},{"r":"Autor","q":"Zu welcher Gattung zählt das Stück?","a":"Zum 'bürgerlichen Trauerspiel' – Tragödie mit bürgerlichen statt hochadligen Hauptfiguren."},{"r":"Interpretation","q":"Wogegen richtet sich das Drama?","a":"Gegen den Machtmissbrauch und die Willkür des Adels sowie die starren Standesschranken der Ständegesellschaft."},{"r":"Interpretation","q":"Was verkörpert Luise Miller?","a":"Bürgerliche Tugend, Aufrichtigkeit und die Ohnmacht des Bürgertums gegenüber höfischer Macht."},{"r":"Interpretation","q":"Welche Rolle spielt der Standesunterschied?","a":"Er macht die Liebe von vornherein tragisch: Nicht Gefühle, sondern die gesellschaftliche Ordnung entscheiden über das Schicksal."},{"r":"Interpretation","q":"Wie zeigt sich Schillers Freiheitsidee?","a":"In der Anklage der Unterdrückung und im Pochen auf die Würde des Einzelnen gegen die Verhältnisse."},{"r":"Einfluss","q":"Welchen Platz hat das Stück im Kanon?","a":"Ein Klassiker des deutschen Dramas und der Sturm-und-Drang-Zeit, häufige Schul- und Theaterlektüre."},{"r":"Einfluss","q":"Wie prägte es das bürgerliche Trauerspiel?","a":"Als Musterbeispiel etablierte es die sozialkritische Tragödie über Standeskonflikte auf der deutschen Bühne."}]},{"title":"Die Brüder Karamasow","author":"Fjodor Dostojewski","year":1880,"land":"Russland","epoch":"Realismus","icon":"🩸","summary":"In einer russischen Kleinstadt zerbricht die Familie Karamasow am Streit um Geld, um die Frau Gruschenka und um den Glauben. Als der lüsterne Vater Fjodor Pawlowitsch ermordet wird, fällt der Verdacht auf den leidenschaftlichen Sohn Dmitri – während der wahre Täter ein anderer ist. Dostojewskis letzter Roman verwebt Kriminalfall, Familiendrama und die großen Fragen nach Gott, Freiheit und Schuld.","cards":[{"r":"Inhalt","q":"Um welche Familie geht es und was ist der Grundkonflikt?","a":"Um die Karamasows: den geizigen, lüsternen Vater Fjodor Pawlowitsch und seine Söhne Dmitri, Iwan und Aljoscha sowie den unehelichen Diener Smerdjakow. Streit um Erbe, um Gruschenka und um Glaubensfragen führt zum Vatermord."},{"r":"Inhalt","q":"Wofür stehen die drei ehelichen Brüder?","a":"Dmitri (Mitja) für Leidenschaft und Sinnlichkeit, Iwan für Intellekt und Zweifel, Aljoscha für Glaube und Mitgefühl (er ist Novize im Kloster). Zusammen verkörpern sie Seiten des Menschen."},{"r":"Inhalt","q":"Wie kommt es zum Mord und wer wird verurteilt?","a":"Der Vater wird erschlagen; Dmitri hatte offen mit ihm um Gruschenka und Geld gestritten und wird verurteilt – obwohl er unschuldig ist."},{"r":"Inhalt","q":"Welche Rolle spielt Smerdjakow?","a":"Der uneheliche Sohn und Diener ist der wahre Mörder. Angeregt durch Iwans Gedanken, dass ohne Gott 'alles erlaubt' sei, tötet er den Vater und nimmt sich später das Leben, sodass Dmitri nicht entlastet wird."},{"r":"Inhalt","q":"Wer sind Gruschenka und Katerina?","a":"Zwei Frauen im Zentrum der Intrigen: Gruschenka, um die Vater und Sohn rivalisieren, und Katerina, Dmitris stolze frühere Verlobte. Ihre Eifersucht und Aussagen treiben die Anklage voran."},{"r":"Autor","q":"Wer schrieb den Roman und wann?","a":"Fjodor Dostojewski, veröffentlicht 1879/80 als sein letzter großer Roman; er starb kurz darauf 1881."},{"r":"Autor","q":"Welche Erfahrungen prägten Dostojewski?","a":"Eine Scheinhinrichtung, Jahre im sibirischen Straflager, Epilepsie und Spielsucht prägten seine Sicht auf Leid, Schuld und Erlösung."},{"r":"Autor","q":"War eine Fortsetzung geplant?","a":"Ja, Dostojewski plante einen zweiten Teil um den erwachsenen Aljoscha, den er wegen seines Todes nicht mehr schreiben konnte."},{"r":"Interpretation","q":"Worum geht es im Kapitel 'Der Großinquisitor'?","a":"In Iwans erdachter Parabel kehrt Christus zurück und wird vom Großinquisitor verhaftet. Dieser wirft ihm vor, die Menschen mit der Gabe der Freiheit überfordert zu haben; die Kirche habe Freiheit gegen Brot und Sicherheit eingetauscht."},{"r":"Interpretation","q":"Was bedeutet Iwans Satz, ohne Gott sei 'alles erlaubt'?","a":"Ohne eine göttliche Instanz gebe es keine letzte moralische Bindung. Der Roman führt den Gedanken ad absurdum, indem Smerdjakow ihn wörtlich nimmt und mordet."},{"r":"Interpretation","q":"Wie behandelt der Roman das Problem des Leids?","a":"Iwan rebelliert gegen eine Weltordnung, die das Leid unschuldiger Kinder zulässt, und 'gibt Gott das Billett zurück'. Dem stellt der Roman Aljoschas tätige Liebe gegenüber."},{"r":"Interpretation","q":"Welche Antwort gibt Starez Sossima?","a":"Der Mönch Sossima predigt allseitige Verantwortung – 'jeder ist an allem schuldig vor allen'. Erlösung liege in Demut, Vergebung und tätiger Liebe, nicht in Beweisen."},{"r":"Interpretation","q":"Ist Iwan mitschuldig am Mord?","a":"Moralisch ja: Seine Ideen und sein Wegsehen ermutigen Smerdjakow. Die Einsicht treibt Iwan in Fieber und Wahn, sichtbar in seinem Gespräch mit dem 'Teufel'."},{"r":"Interpretation","q":"Wofür steht Aljoscha?","a":"Für die Möglichkeit gelebten Glaubens in der modernen Welt. Am Ende sammelt er die Jungen um den verstorbenen Iljuscha zu einer Gemeinschaft der Hoffnung."},{"r":"Interpretation","q":"Welche Funktion hat der Gerichtsprozess?","a":"Er zeigt, wie Indizien, Rhetorik und Vorurteile eine 'Wahrheit' erzeugen: Der juristisch Unschuldige wird verurteilt, während die reale Schuld verborgen bleibt."},{"r":"Interpretation","q":"Wie verhält sich Glaube zu Zweifel?","a":"Dostojewski lässt die stärksten Einwände gegen Gott (Iwan) voll gelten und widerlegt sie nicht logisch, sondern existenziell – durch gelebte Liebe und Verantwortung."},{"r":"Einfluss","q":"Welchen Einfluss hatte der Roman auf die Philosophie?","a":"Existenzialisten wie Sartre und Camus knüpften an Iwans 'alles ist erlaubt' an; auch Nietzsche und Freud schätzten Dostojewskis Psychologie."},{"r":"Einfluss","q":"Welchen Rang hat das Werk?","a":"Es gilt vielen als einer der größten Romane der Weltliteratur und als Höhepunkt des russischen Realismus."},{"r":"Einfluss","q":"Wie wirkt 'Der Großinquisitor' bis heute?","a":"Das Kapitel wird als eigenständige Parabel über Freiheit, Macht und Religion bis heute breit zitiert und diskutiert."},{"r":"Einfluss","q":"Welche Autoren prägte Dostojewski?","a":"Von Kafka über Camus bis Thomas Mann; seine Verbindung von Ideendrama und Psychologie prägte den modernen Roman."}]},{"title":"Moby-Dick","author":"Herman Melville","year":1851,"land":"USA","epoch":"Romantik / Realismus","icon":"🐋","summary":"Der Matrose Ismael heuert auf dem Walfänger 'Pequod' an und gerät unter das Kommando von Kapitän Ahab, der besessen Jagd auf den weißen Wal Moby Dick macht – das Tier, das ihm einst ein Bein abriss. Melvilles Roman verbindet packende Seefahrt, enzyklopädisches Wissen über den Walfang und tiefe Fragen nach Schicksal, Rache und dem Unfassbaren in der Natur.","cards":[{"r":"Inhalt","q":"Wer erzählt und wie beginnt der Roman?","a":"Der Matrose Ismael erzählt. Er heuert in Nantucket auf dem Walfänger 'Pequod' an und freundet sich mit dem Harpunier Queequeg an."},{"r":"Inhalt","q":"Was ist Ahabs Ziel?","a":"Kapitän Ahab will den weißen Pottwal Moby Dick töten, der ihm bei einer früheren Jagd das Bein abriss. Die eigentliche Aufgabe des Schiffs – Waltran zu gewinnen – wird seiner Rache untergeordnet."},{"r":"Inhalt","q":"Wie schwört Ahab die Mannschaft ein?","a":"Er nagelt eine Golddublone an den Mast als Belohnung für den, der Moby Dick zuerst sichtet, und beschwört die Crew feierlich auf die Jagd ein."},{"r":"Inhalt","q":"Wer ist Starbuck?","a":"Der erste Steuermann, ein besonnener, frommer Mann. Er erkennt den Wahnsinn der Rachejagd, wagt aber nicht, sich offen gegen Ahab zu stellen."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Nach dreitägiger Jagd zerstört Moby Dick die 'Pequod'. Ahab wird von der Harpunenleine mitgerissen, das Schiff sinkt, nur Ismael überlebt – an Queequegs Sarg klammernd."},{"r":"Autor","q":"Wer schrieb Moby-Dick?","a":"Herman Melville, veröffentlicht 1851. Er selbst war jahrelang auf Walfang- und Handelsschiffen gefahren."},{"r":"Autor","q":"Wie wurde der Roman zu Lebzeiten aufgenommen?","a":"Er floppte kommerziell und wurde von der Kritik weithin missverstanden; Melville starb fast vergessen."},{"r":"Autor","q":"Wem ist das Werk gewidmet?","a":"Melville widmete es seinem Freund, dem Schriftsteller Nathaniel Hawthorne, mit dem er über die 'dunklen' Fragen der Literatur austauschte."},{"r":"Interpretation","q":"Wofür steht der weiße Wal?","a":"Moby Dick ist vieldeutig: Naturgewalt, Schicksal, das Böse oder das unerkennbare Absolute. Gerade seine Weiße – Leere und Fülle zugleich – macht ihn zur Projektionsfläche."},{"r":"Interpretation","q":"Was verkörpert Ahab?","a":"Den titanischen, monomanen Menschen, der die Natur zwingen will, seinem Willen und seiner Kränkung Sinn zu geben. Sein Trotz führt in die Selbstzerstörung."},{"r":"Interpretation","q":"Welche Bedeutung hat das Kapitel über die Weiße des Wals?","a":"Ismael meditiert darüber, warum gerade Weiß Schrecken auslöst: Es steht für das Bedeutungslose und Grenzenlose, dem der Mensch keinen festen Sinn abringen kann."},{"r":"Interpretation","q":"Wie mischt Melville die Gattungen?","a":"Er verbindet Abenteuerroman, Drama (mit Regieanweisungen), Predigt und enzyklopädische Sachkapitel über Wale – eine bewusst hybride, moderne Form."},{"r":"Interpretation","q":"Welche Rolle spielt die Vielfalt der Mannschaft?","a":"Die 'Pequod' vereint Menschen aller Herkünfte und Religionen – ein Bild für Amerika und die Menschheit, die gemeinsam ins Verderben gerissen werden."},{"r":"Interpretation","q":"Ist der Roman religiös zu lesen?","a":"Ja: Anspielungen auf Hiob, Jona und den König Ahab der Bibel durchziehen das Werk. Es fragt nach Gottes Schweigen angesichts von Leid und Trotz."},{"r":"Interpretation","q":"Was bedeutet Ismaels Überleben?","a":"Der Erzähler bleibt als einziger, um Zeugnis abzulegen – ähnlich dem Boten in Hiob: 'Ich allein bin entronnen, es dir zu berichten.'"},{"r":"Einfluss","q":"Welchen Rang hat Moby-Dick heute?","a":"Er gilt als einer der größten amerikanischen Romane und als Schlüsselwerk der Weltliteratur – erst im 20. Jahrhundert neu entdeckt."},{"r":"Einfluss","q":"Wie wirkt der Roman in der Kultur?","a":"Ahab und der weiße Wal wurden zu Sinnbildern für zerstörerische Besessenheit; das Werk inspirierte Verfilmungen, Musik und unzählige Anspielungen."},{"r":"Einfluss","q":"Was bedeutet der berühmte erste Satz?","a":"'Nennt mich Ismael' – der schlichte, direkte Einstieg gilt als einer der berühmtesten Romananfänge und begründet die intime Erzählerstimme."},{"r":"Einfluss","q":"Warum gilt er als 'Great American Novel'?","a":"Weil er amerikanische Themen – Aufbruch, Individualismus, Vielfalt, Hybris – in epischer Breite und moderner Form bündelt."}]},{"title":"Berlin Alexanderplatz","author":"Alfred Döblin","year":1929,"land":"Deutschland","epoch":"Neue Sachlichkeit / Moderne","icon":"🚋","summary":"Der Transportarbeiter Franz Biberkopf kommt aus dem Gefängnis und will ein anständiges Leben führen – doch das Berlin der späten 1920er Jahre, mit seinen Verlockungen, Verbrechen und seiner Großstadthärte, wirft ihn immer wieder zurück. Döblin erzählt in einer Montage aus inneren Stimmen, Zeitungsfetzen, Liedern und Bibelanspielungen den Kampf eines einfachen Mannes gegen die Stadt und gegen sich selbst.","cards":[{"r":"Inhalt","q":"Wer ist Franz Biberkopf?","a":"Ein ehemaliger Transportarbeiter, der nach vier Jahren Haft (er hatte seine Freundin Ida erschlagen) nach Berlin zurückkehrt und 'anständig' bleiben will."},{"r":"Inhalt","q":"Woran scheitert Franz zunächst?","a":"Er gerät an falsche Freunde, versucht sich als Straßenhändler und wird vom Ganoven Reinhold in die Verbrecherbande hineingezogen."},{"r":"Inhalt","q":"Was tut Reinhold Franz an?","a":"Bei einem Einbruch stößt Reinhold den fliehenden Franz aus dem Auto; Franz wird überfahren und verliert einen Arm."},{"r":"Inhalt","q":"Was geschieht mit Mieze?","a":"Mieze, Franz' Geliebte, wird von Reinhold aus Eifersucht und Berechnung im Wald ermordet. Der Verdacht fällt zunächst auf Franz."},{"r":"Inhalt","q":"Wie endet Franz' Geschichte?","a":"Franz bricht zusammen, landet in der Irrenanstalt Buch und 'stirbt' innerlich. Er ersteht als ernüchterter, wacherer Mensch und nimmt eine einfache Stelle als Hilfsportier an."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Alfred Döblin, Arzt und Schriftsteller, veröffentlicht 1929. Als Jude und Sozialist emigrierte er 1933."},{"r":"Autor","q":"Was war Döblins Beruf neben dem Schreiben?","a":"Er war Nervenarzt in Berliner Arbeitervierteln – seine Kenntnis von Milieu und Psyche prägt den Roman."},{"r":"Interpretation","q":"Was ist das Besondere an der Erzähltechnik?","a":"Döblin nutzt Montage: Er collagiert inneren Monolog, Werbeslogans, Fahrpläne, Statistiken, Schlager und Bibelzitate zu einem Panorama der Großstadt – vergleichbar mit Joyce' 'Ulysses'."},{"r":"Interpretation","q":"Ist die Stadt selbst eine Figur?","a":"Ja. Berlin, besonders der Alexanderplatz mit seiner Baustelle, wird zur eigentlichen Hauptfigur: ein lärmender, gefräßiger Organismus, der den Einzelnen formt und zermalmt."},{"r":"Interpretation","q":"Welche Bedeutung haben die Bibelanspielungen?","a":"Motive wie Hiob, der Schlachthof oder die 'Hure Babylon' deuten Franz' Leiden als moderne Passions- und Prüfungsgeschichte."},{"r":"Interpretation","q":"Was lernt Franz am Ende?","a":"Dass der Einzelne nicht allein und trotzig bestehen kann. Er gibt seinen sturen Eigensinn auf, wird wachsam und solidarischer – eine ambivalente 'Läuterung'."},{"r":"Interpretation","q":"Wie zeichnet der Roman die Weimarer Gesellschaft?","a":"Als brodelndes Milieu aus Arbeitslosen, Zuhältern, Prostituierten, Kleinkriminellen und politischen Agitatoren – schonungslos und ohne Idealisierung."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als der große deutsche Großstadtroman der Moderne und als Höhepunkt der Neuen Sachlichkeit."},{"r":"Einfluss","q":"Welche Verfilmungen sind bekannt?","a":"Rainer Werner Fassbinders 15-teilige Fernsehverfilmung (1980) machte den Stoff einem breiten Publikum bekannt; 2020 folgte eine moderne Neuverfilmung."},{"r":"Einfluss","q":"Womit wird die Erzählweise verglichen?","a":"Mit dem Simultan- und Montagestil von Joyce und Dos Passos – Döblin gilt als deutscher Pionier dieser modernen Technik."}]},{"title":"Wilhelm Tell","author":"Friedrich Schiller","year":1804,"land":"Schweiz","epoch":"Weimarer Klassik","icon":"🏹","summary":"In der Schweiz des 14. Jahrhunderts leiden die Urkantone unter der Willkür habsburgischer Vögte. Als der Landvogt Gessler den Jäger Wilhelm Tell zwingt, einen Apfel vom Kopf seines Sohnes zu schießen, wird aus dem unpolitischen Einzelgänger ein Rächer. Schillers letztes vollendetes Drama verbindet Tells Tat mit dem Rütlischwur der Eidgenossen zu einem Freiheitsdrama gegen die Tyrannei.","cards":[{"r":"Inhalt","q":"Wo und wann spielt das Drama?","a":"In den Schweizer Urkantonen (Uri, Schwyz, Unterwalden) im frühen 14. Jahrhundert, unter der Herrschaft habsburgischer Vögte."},{"r":"Inhalt","q":"Was ist der Rütlischwur?","a":"Vertreter der drei Urkantone treffen sich heimlich auf der Rütliwiese und schwören, sich gegen die Unterdrückung durch die Vögte zu verbünden – gewaltfrei, aber entschlossen."},{"r":"Inhalt","q":"Wie kommt es zur Apfelschuss-Szene?","a":"Tell grüßt den auf einer Stange aufgesteckten Hut des Vogts Gessler nicht. Zur Strafe zwingt Gessler ihn, mit der Armbrust einen Apfel vom Kopf seines Sohnes Walter zu schießen."},{"r":"Inhalt","q":"Was verbirgt Tell nach dem Schuss?","a":"Einen zweiten Pfeil. Auf Gesslers Frage gesteht er, dieser wäre für den Vogt bestimmt gewesen, hätte er sein Kind getroffen."},{"r":"Inhalt","q":"Wie tötet Tell den Vogt?","a":"Gessler lässt Tell gefangen abführen; bei einem Sturm entkommt Tell und erschießt Gessler aus dem Hinterhalt in der 'hohlen Gasse' bei Küssnacht."},{"r":"Inhalt","q":"Wie endet das Drama?","a":"Der Aufstand siegt, die Zwingburgen fallen, die Eidgenossen sind frei. Tell wird als Befreier gefeiert."},{"r":"Autor","q":"Wer schrieb Wilhelm Tell?","a":"Friedrich Schiller, 1804 uraufgeführt – sein letztes vollendetes Drama, ein Jahr vor seinem Tod."},{"r":"Autor","q":"War Schiller je in der Schweiz?","a":"Nein. Er stützte sich auf Quellen wie die Schweizer Chronik und Berichte Goethes; die Landschaft schilderte er ohne eigene Anschauung."},{"r":"Interpretation","q":"Ist das Töten Gesslers gerechtfertigt?","a":"Das Drama rechtfertigt Tells Tat als Notwehr eines bedrohten Vaters, nicht als politischen Mord. Tell handelt aus privatem Anlass, doch seine Tat wird zum Signal der Befreiung."},{"r":"Interpretation","q":"Wie verhalten sich Tells Einzeltat und der Rütlischwur?","a":"Schiller stellt zwei Wege des Widerstands nebeneinander: die gemeinschaftliche, rechtlich legitimierte Erhebung der Eidgenossen und Tells individuelle Tat – beide führen zur Freiheit."},{"r":"Interpretation","q":"Welche Rolle spielt die Figur Parricida?","a":"Der Kaisermörder Johannes Parricida sucht bei Tell Beistand. Tell weist ihn scharf ab und grenzt seine Notwehr klar vom ehrgeizigen Königsmord ab."},{"r":"Interpretation","q":"Was ist die zentrale Idee des Stücks?","a":"Der Widerstand gegen ungerechte Herrschaft und das Naturrecht auf Freiheit: 'Nein, eine Grenze hat Tyrannenmacht.'"},{"r":"Einfluss","q":"Welche Bedeutung hat Tell für die Schweiz?","a":"Wilhelm Tell wurde zum Nationalmythos und Symbol der Schweizer Freiheit und Unabhängigkeit, obwohl seine historische Existenz unbelegt ist."},{"r":"Einfluss","q":"Wie wurde das Drama international bekannt?","a":"Rossinis Oper 'Guillaume Tell' und die Verwendung als Freiheitsdrama trugen den Stoff über die Schweiz hinaus in die Welt."}]},{"title":"Nathan der Weise","author":"Gotthold Ephraim Lessing","year":1779,"land":"Jerusalem","epoch":"Aufklärung","icon":"💍","summary":"Im Jerusalem der Kreuzzugszeit begegnen sich der jüdische Kaufmann Nathan, der muslimische Sultan Saladin und ein christlicher Tempelherr. Lessings Ideendrama fragt, welche Religion die wahre sei – und antwortet mit der berühmten Ringparabel: Nicht der rechte Glaube, sondern gelebte Menschlichkeit und Toleranz entscheiden. Ein Hauptwerk der deutschen Aufklärung, in Blankvers verfasst.","cards":[{"r":"Inhalt","q":"Wo und wann spielt das Drama?","a":"In Jerusalem zur Zeit eines Waffenstillstands im Dritten Kreuzzug (Ende 12. Jahrhundert), wo Juden, Christen und Muslime zusammenleben."},{"r":"Inhalt","q":"Wer ist Nathan?","a":"Ein weiser, wohlhabender jüdischer Kaufmann, der wegen seiner Klugheit und Güte 'der Weise' genannt wird."},{"r":"Inhalt","q":"Wie beginnt die Handlung?","a":"Ein junger Tempelherr rettet Nathans Ziehtochter Recha aus einem brennenden Haus. Der Tempelherr wiederum war zuvor von Sultan Saladin begnadigt worden."},{"r":"Inhalt","q":"Welche Falle stellt Saladin Nathan?","a":"Der geldknappe Saladin fragt Nathan, welche der drei Religionen die wahre sei – in der Hoffnung, ihn in Verlegenheit zu bringen und zu einer Anleihe zu drängen."},{"r":"Inhalt","q":"Was enthüllt sich am Ende über die Familienverhältnisse?","a":"Recha und der Tempelherr sind Geschwister und zugleich Nichte und Neffe Saladins – Juden, Christen und Muslime erweisen sich als eine Familie."},{"r":"Autor","q":"Wer schrieb Nathan der Weise?","a":"Gotthold Ephraim Lessing, veröffentlicht 1779, ein zentrales Werk der deutschen Aufklärung."},{"r":"Autor","q":"Warum wählte Lessing die Dramenform?","a":"Nach einem Streit mit einem Hamburger Pastor wurde Lessing die theologische Publikation untersagt; er brachte seine Toleranzideen daraufhin auf die Bühne."},{"r":"Interpretation","q":"Worum geht es in der Ringparabel?","a":"Ein Vater hat einen Ring, der beliebt macht; da er drei Söhne gleich liebt, lässt er zwei ununterscheidbare Kopien anfertigen. Keiner kann später den echten Ring beweisen. Der Richter rät, jeder solle durch tätige Güte zeigen, dass sein Ring der wahre sei."},{"r":"Interpretation","q":"Was bedeutet die Ringparabel für die Religionen?","a":"Die drei Ringe stehen für Judentum, Christentum und Islam. Keine kann ihre Alleingültigkeit beweisen; ihr 'Wahrheitsbeweis' liegt in gelebter Nächstenliebe und Toleranz."},{"r":"Interpretation","q":"Welches Menschenbild vertritt das Stück?","a":"Ein aufklärerisches: Der Wert eines Menschen bemisst sich an Vernunft und Humanität, nicht an Konfession oder Herkunft."},{"r":"Interpretation","q":"Wofür steht die Figur Nathan?","a":"Für den weisen, duldsamen Menschen, der Leid (die Ermordung seiner Familie durch Christen) durch Vergebung überwindet und zur Menschlichkeit findet."},{"r":"Interpretation","q":"Ist das Stück religionsfeindlich?","a":"Nein. Es kritisiert Fanatismus und die Anmaßung von Alleingültigkeit, nicht den Glauben selbst; es wirbt für gegenseitigen Respekt der Religionen."},{"r":"Interpretation","q":"Welche Form hat das Drama?","a":"Ein 'dramatisches Gedicht' in fünf Aufzügen, verfasst im reimlosen Blankvers – Lessing verzichtet bewusst auf ein klassisches Trauerspiel-Ende."},{"r":"Einfluss","q":"Welche Bedeutung hat das Drama heute?","a":"Es gilt als Schlüsseltext für Toleranz und interreligiösen Dialog und ist fester Bestandteil des Schulkanons."},{"r":"Einfluss","q":"Wie erging es dem Stück in der NS-Zeit?","a":"Als Werk mit jüdischem Titelhelden und Toleranzbotschaft wurde es von den Nationalsozialisten verboten – ein Zeichen seiner bleibenden politischen Sprengkraft."}]},{"title":"Der Untertan","author":"Heinrich Mann","year":1918,"land":"Deutschland","epoch":"Kaiserreich / Satire","icon":"🎖️","summary":"Diederich Heßling wächst im wilhelminischen Kaiserreich zu einem Menschen heran, der nach oben buckelt und nach unten tritt. Heinrich Manns bissige Satire zeigt an seiner Karriere als Fabrikant und Nationalist die autoritäre Mentalität einer Gesellschaft, die Untertanengeist mit Vaterlandsliebe verwechselt – ein prophetisches Porträt der Kräfte, die in Krieg und Diktatur führen sollten.","cards":[{"r":"Inhalt","q":"Wer ist Diederich Heßling?","a":"Ein ängstlicher, autoritätshöriger Junge, der zum skrupellosen Papierfabrikanten und lautstarken Nationalisten im Kaiserreich Wilhelms II. aufsteigt."},{"r":"Inhalt","q":"Was prägt Diederichs Charakter?","a":"Ein Wechselspiel aus Unterwürfigkeit gegenüber Mächtigeren und Härte gegenüber Schwächeren. Er bewundert die Macht und will selbst Teil von ihr sein."},{"r":"Inhalt","q":"Wie geht Diederich mit Frauen und Rivalen um?","a":"Er verstößt seine Geliebte, heiratet nach Kalkül und intrigiert rücksichtslos gegen Konkurrenten und den liberalen alten Buck."},{"r":"Inhalt","q":"Worin gipfelt Diederichs Aufstieg?","a":"In der Errichtung eines Kaiser-Wilhelm-Denkmals, bei dessen Einweihung er eine nationalistische Rede hält – während ein Gewitter das triumphale Fest sprengt."},{"r":"Autor","q":"Wer schrieb den Roman und wann?","a":"Heinrich Mann, der ältere Bruder Thomas Manns; vollendet 1914, wegen des Kriegs erst 1918 als Buch veröffentlicht."},{"r":"Autor","q":"Wie stand Heinrich Mann politisch?","a":"Als überzeugter Demokrat und Kritiker des Obrigkeitsstaats; er emigrierte 1933 und blieb ein scharfer Gegner des Nationalsozialismus."},{"r":"Interpretation","q":"Was bedeutet der Titel 'Der Untertan'?","a":"Er bezeichnet den Typ des Menschen, der freiwillig gehorcht und Macht verehrt, statt als mündiger Bürger zu handeln – Untertanengeist statt Selbstbestimmung."},{"r":"Interpretation","q":"Wie funktioniert die Satire?","a":"Heinrich Mann überzeichnet Diederich ins Groteske und entlarvt so die Phrasen von Nation, Ehre und Kaisertreue als Deckmantel für Feigheit und Egoismus."},{"r":"Interpretation","q":"Was kritisiert der Roman an der Gesellschaft?","a":"Die autoritäre Struktur des Kaiserreichs, in der Militarismus, Untertanengeist und Nationalismus die liberalen und demokratischen Kräfte verdrängen."},{"r":"Interpretation","q":"Wie verhält sich Diederich zum Kaiser?","a":"Er identifiziert sich vollkommen mit Wilhelm II., ahmt dessen Gesten und Reden nach und macht dessen Machtwillen zur eigenen Lebensform."},{"r":"Interpretation","q":"Gilt der Roman als prophetisch?","a":"Ja. Viele lesen ihn als Analyse jener Mentalität, die den Ersten Weltkrieg trug und später den Nationalsozialismus mit ermöglichte."},{"r":"Einfluss","q":"Welchen Rang hat 'Der Untertan'?","a":"Er gilt als der klassische Gesellschaftsroman des Kaiserreichs und als Meisterwerk der politischen Satire in deutscher Sprache."},{"r":"Einfluss","q":"Wie wurde der Stoff weiter bekannt?","a":"Vor allem durch Wolfgang Staudtes Verfilmung von 1951, die den Roman als Warnung vor obrigkeitshörigem Denken einem großen Publikum nahebrachte."}]},{"title":"Sturmhöhe","author":"Emily Brontë","year":1847,"land":"England","epoch":"Romantik / Viktorianische Zeit","icon":"🌪️","summary":"In der rauen Moorlandschaft Yorkshires entspinnt sich zwischen dem Findelkind Heathcliff und Catherine Earnshaw eine leidenschaftliche, zerstörerische Liebe. Zurückgewiesen, kehrt Heathcliff als reicher Mann zurück und rächt sich über zwei Generationen an beiden Familien. Emily Brontës einziger Roman ist ein düsteres, formal kühnes Werk über Liebe, Hass und Besessenheit.","cards":[{"r":"Inhalt","q":"Wie wird die Geschichte erzählt?","a":"In verschachtelter Rahmenerzählung: Der Mieter Lockwood lässt sich die Vorgeschichte von der Haushälterin Nelly Dean berichten. So werden zwei Generationen rückblickend entfaltet."},{"r":"Inhalt","q":"Wer ist Heathcliff?","a":"Ein dunkler Findeljunge, den der alte Earnshaw mit nach Sturmhöhe bringt. Er wächst mit Catherine auf, wird aber nach dem Tod des Ziehvaters vom Bruder Hindley erniedrigt."},{"r":"Inhalt","q":"Warum trennen sich Heathcliff und Catherine?","a":"Catherine liebt Heathcliff, heiratet aber den wohlhabenden, sanften Edgar Linton, weil eine Ehe mit dem mittellosen Heathcliff sie 'erniedrigen' würde. Heathcliff verschwindet daraufhin."},{"r":"Inhalt","q":"Wie rächt sich Heathcliff?","a":"Er kehrt reich zurück, bringt Hindleys Besitz und die Lintons durch Intrigen und eine kalkulierte Heirat in seine Gewalt und tyrannisiert die nächste Generation."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Nach Catherines frühem Tod verzehrt sich Heathcliff nach ihr und stirbt. Die junge Cathy und Hareton finden zueinander – ein versöhnlicher Ausklang."},{"r":"Autor","q":"Wer schrieb Sturmhöhe?","a":"Emily Brontë, eine der drei schreibenden Brontë-Schwestern; es ist ihr einziger Roman, erschienen 1847 unter dem männlichen Pseudonym 'Ellis Bell'."},{"r":"Autor","q":"Wie wurde der Roman zunächst aufgenommen?","a":"Verstört und teils empört – er galt vielen als roh und 'unmoralisch'. Emily starb 1848, ohne den späteren Ruhm zu erleben."},{"r":"Interpretation","q":"Welche Art Liebe zeigt der Roman?","a":"Eine metaphysische, entgrenzte Leidenschaft jenseits von Moral und Konvention: Catherine sagt, sie sei Heathcliff. Diese Liebe ist zugleich Quelle von Zerstörung."},{"r":"Interpretation","q":"Welche Rolle spielt die Landschaft?","a":"Die stürmischen Moore spiegeln die wilden Leidenschaften; das Haus 'Wuthering Heights' (die Sturmhöhe) steht dem gezähmten 'Thrushcross Grange' gegenüber – Natur gegen Zivilisation."},{"r":"Interpretation","q":"Ist Heathcliff Held oder Bösewicht?","a":"Beides: ein romantischer, byronscher Antiheld, dessen Leiden Mitgefühl weckt, dessen Rache aber grausam und generationenübergreifend zerstörerisch ist."},{"r":"Interpretation","q":"Welche Bedeutung hat die Struktur der zwei Generationen?","a":"Die zweite Generation wiederholt und mildert die Konflikte der ersten; die Versöhnung von Cathy und Hareton bricht den Kreislauf aus Hass und Rache."},{"r":"Interpretation","q":"Gibt es übernatürliche Elemente?","a":"Ja, angedeutet: Lockwood träumt von Catherines Geist am Fenster, und am Ende glauben Bewohner, Heathcliff und Catherine gingen als Geister über die Moore."},{"r":"Einfluss","q":"Welchen Rang hat der Roman heute?","a":"Er gilt als Klassiker der englischen Literatur und als eine der intensivsten Liebes- und Rachegeschichten der Weltliteratur."},{"r":"Einfluss","q":"Wie wirkt der Stoff kulturell nach?","a":"Zahlreiche Verfilmungen, Opern und Lieder (u. a. Kate Bushs 'Wuthering Heights') greifen die Geschichte auf; Heathcliff und Catherine wurden zum Inbegriff verhängnisvoller Liebe."}]},{"title":"Große Erwartungen","author":"Charles Dickens","year":1861,"land":"England","epoch":"Viktorianische Zeit / Realismus","icon":"🎩","summary":"Der Waisenjunge Pip wächst arm bei seiner Schwester und dem gutmütigen Schmied Joe auf. Als ein unbekannter Gönner ihm ein Vermögen und die Aussicht auf ein Gentleman-Leben verschafft, wendet er sich beschämt von seiner Herkunft ab – und muss schmerzhaft lernen, woher sein Glück wirklich stammt. Dickens' Entwicklungsroman verbindet Gesellschaftskritik, Spannung und die Frage nach wahrem Wert.","cards":[{"r":"Inhalt","q":"Wer ist Pip und wie beginnt der Roman?","a":"Pip ist ein Waisenjunge in den Marschen von Kent. Am Anfang hilft er einem entflohenen Sträfling, der ihm auf dem Friedhof auflauert – eine Begegnung mit weitreichenden Folgen."},{"r":"Inhalt","q":"Wer ist Miss Havisham?","a":"Eine reiche, am Traualtar sitzengelassene Frau, die in ihrem verfallenden Haus für immer im Hochzeitskleid und bei angehaltener Uhr lebt. Sie zieht die schöne Estella zur Männerverachtung heran."},{"r":"Inhalt","q":"Welche Rolle spielt Estella?","a":"Miss Havishams Ziehtochter, in die sich Pip hoffnungslos verliebt. Sie wurde erzogen, um Männerherzen zu brechen, und bleibt Pip lange kühl und unerreichbar."},{"r":"Inhalt","q":"Woher kommt Pips Vermögen wirklich?","a":"Nicht von Miss Havisham, wie Pip glaubt, sondern vom Sträfling Magwitch, dem Pip als Kind half. Aus Dankbarkeit machte dieser ihn heimlich zum reichen Erben."},{"r":"Inhalt","q":"Wie endet Pips Weg?","a":"Magwitch stirbt, das Vermögen verfällt an den Staat. Pip verliert den Reichtum, gewinnt aber Reife und Demut, versöhnt sich mit Joe und begegnet der gewandelten Estella wieder."},{"r":"Autor","q":"Wer schrieb den Roman und wie erschien er?","a":"Charles Dickens, 1860/61 zunächst als Fortsetzungsroman in einer Wochenzeitschrift – daher die spannungsreichen Kapitelenden."},{"r":"Autor","q":"Änderte Dickens den Schluss?","a":"Ja. Auf Anraten eines Freundes ersetzte er das ursprünglich düstere Ende durch einen versöhnlicheren Schluss, der eine Zukunft für Pip und Estella andeutet."},{"r":"Interpretation","q":"Was bedeutet der Titel 'Große Erwartungen'?","a":"Er bezeichnet Pips Aussicht auf Reichtum und Aufstieg. Zugleich ironisch: Die 'großen Erwartungen' entpuppen sich als trügerisch und machen Pip zunächst zum Snob."},{"r":"Interpretation","q":"Was kritisiert der Roman an der Gesellschaft?","a":"Die Standesdünkel der viktorianischen Klassengesellschaft und die Illusion, dass Geld und Status einen besseren Menschen machen."},{"r":"Interpretation","q":"Welche Entwicklung macht Pip durch?","a":"Vom dankbaren Kind über den beschämten Emporkömmling, der sich seiner Herkunft schämt, hin zum geläuterten Mann, der wahre Werte in Loyalität und Liebe erkennt."},{"r":"Interpretation","q":"Wofür steht die Figur Joe Gargery?","a":"Für schlichte Herzensgüte und Treue. Der Schmied bleibt trotz Pips Undankbarkeit liebevoll und verkörpert das moralische Gegenbild zur Standesgier."},{"r":"Interpretation","q":"Welche Bedeutung hat Magwitch?","a":"Der verachtete Sträfling ist Pips wahrer Wohltäter. An ihm zeigt Dickens, dass Adel des Herzens nichts mit Herkunft oder Ruf zu tun hat."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er zählt zu Dickens' reifsten Werken und gilt als einer der großen englischen Entwicklungsromane (Bildungsromane)."},{"r":"Einfluss","q":"Wie wirkt das Werk nach?","a":"Figuren wie die zeitlos im Brautkleid verharrende Miss Havisham wurden zu Ikonen; der Stoff wurde vielfach verfilmt und adaptiert."}]},{"title":"Der Meister und Margarita","author":"Michail Bulgakow","year":1967,"land":"Russland","epoch":"Moderne / Satire","icon":"😼","summary":"Der Teufel besucht als eleganter Professor Woland das atheistische Moskau der Stalinzeit und stiftet mit seinem grotesken Gefolge – darunter ein riesiger, sprechender Kater – Chaos. Verwoben damit sind die Geschichte eines verfemten Schriftstellers ('der Meister') und seiner treuen Geliebten Margarita sowie ein Roman über Pontius Pilatus und Jeschua. Bulgakows Meisterwerk ist Satire, Liebesroman und philosophische Parabel zugleich.","cards":[{"r":"Inhalt","q":"Wer ist Woland und was tut er?","a":"Woland ist der Teufel, der als geheimnisvoller 'Professor der schwarzen Magie' im Moskau der 1930er Jahre auftaucht und mit seinem Gefolge die selbstgerechte, atheistische Gesellschaft aufmischt."},{"r":"Inhalt","q":"Wer gehört zu Wolands Gefolge?","a":"Unter anderem der gewaltige, sprechende und Wodka trinkende Kater Behemoth, der schrille Korowjew und der Killer Asasello – eine groteske Truppe von Dämonen."},{"r":"Inhalt","q":"Wer sind der Meister und Margarita?","a":"Der 'Meister' ist ein Schriftsteller, dessen Roman über Pilatus von der Zensur zerstört wurde und der daran zerbricht. Margarita ist seine Geliebte, die alles opfert, um ihn zu retten."},{"r":"Inhalt","q":"Was tut Margarita für den Meister?","a":"Sie schließt einen Pakt mit Woland, wird zur Hexe und führt dessen mitternächtlichen Frühlingsball der Verdammten an – zum Lohn erhält sie den Meister zurück."},{"r":"Inhalt","q":"Was ist der 'Roman im Roman'?","a":"Eingeschoben ist die Geschichte des Meisters über Pontius Pilatus, der den Wanderphilosophen Jeschua (Jesus) verurteilt und lebenslang unter Schuld und Feigheit leidet."},{"r":"Inhalt","q":"Wie endet das Werk?","a":"Woland schenkt Meister und Margarita 'Ruhe' (nicht das Licht) in einem Jenseits; Pilatus wird nach zweitausend Jahren endlich erlöst und geht mit Jeschua davon."},{"r":"Autor","q":"Wer schrieb den Roman und wann?","a":"Michail Bulgakow arbeitete von 1928 bis zu seinem Tod 1940 daran. Erst 1966/67 erschien er – stark zensiert – im Druck."},{"r":"Autor","q":"Warum konnte der Roman zu Lebzeiten nicht erscheinen?","a":"Unter Stalin waren Satire auf das Sowjetsystem und religiöse Themen unpublizierbar. Bulgakow verbrannte ein frühes Manuskript und schrieb es aus dem Gedächtnis neu."},{"r":"Interpretation","q":"Was bedeutet der Satz über das Manuskript?","a":"Wolands Wort 'Manuskripte brennen nicht' drückt aus, dass wahre Kunst und Wahrheit nicht dauerhaft vernichtet werden können – ein Trost angesichts der Zensur."},{"r":"Interpretation","q":"Welche Rolle spielt der Teufel moralisch?","a":"Ungewöhnlich: Woland straft nicht die Guten, sondern die Korrupten, Feigen und Heuchler. Das Böse deckt hier die Verlogenheit der Gesellschaft auf."},{"r":"Interpretation","q":"Was kritisiert die Satire?","a":"Die Bürokratie, Denunziation, Wohnungsnot, Korruption und den erzwungenen Atheismus der Stalinzeit – oft in grotesk-komischen Szenen."},{"r":"Interpretation","q":"Wie hängen die beiden Handlungsebenen zusammen?","a":"Moskau und das antike Jerusalem spiegeln sich: Feigheit, Verrat und die Frage nach Wahrheit und Gnade verbinden Pilatus' Schuld mit der modernen Gesellschaft."},{"r":"Interpretation","q":"Wofür steht Margarita?","a":"Für bedingungslose Liebe und Mut. Ihre Opferbereitschaft ist die eigentliche erlösende Kraft des Romans."},{"r":"Interpretation","q":"Warum erhalten die Liebenden 'Ruhe' statt 'Licht'?","a":"Der Meister hat den Glauben und die Kraft verloren; ihm wird kein Paradies ('Licht'), aber ein Frieden fernab der Welt ('Ruhe') zuteil – ein ambivalentes, mildes Ende."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als einer der bedeutendsten russischen Romane des 20. Jahrhunderts und als Kultbuch, das erst posthum seine Wirkung entfaltete."},{"r":"Einfluss","q":"Wie wirkt das Werk kulturell nach?","a":"Es inspirierte Filme, Theater, Musik (u. a. den Rolling-Stones-Song 'Sympathy for the Devil') und wurde zum Symbol künstlerischer Freiheit gegen Zensur."}]},{"title":"Der Graf von Monte Christo","author":"Alexandre Dumas","year":1844,"land":"Frankreich","epoch":"Romantik / Abenteuerroman","icon":"⚔️","summary":"Der junge Seemann Edmond Dantès wird am Tag seiner Hochzeit durch eine Intrige neidischer Rivalen unschuldig ins Verlies der Festung If geworfen. Nach vierzehn Jahren gelingt ihm die Flucht; mit dem Schatz von Monte Christo kehrt er als geheimnisvoller, unermesslich reicher Graf zurück, um sich an seinen Verrätern zu rächen. Dumas' Abenteuerroman ist eine mitreißende Geschichte über Verrat, Rache und Gerechtigkeit.","cards":[{"r":"Inhalt","q":"Wie beginnt Dantès' Unglück?","a":"Am Tag seiner Verlobung mit Mercédès wird der beliebte junge Kapitänsanwärter Edmond Dantès verhaftet – Opfer einer Intrige aus Neid und politischem Kalkül."},{"r":"Inhalt","q":"Wer steckt hinter der Intrige?","a":"Der eifersüchtige Danglars, der Nebenbuhler Fernand und der Staatsanwalt Villefort, der Dantès aus Eigennutz verschwinden lässt, um sich selbst zu schützen."},{"r":"Inhalt","q":"Was geschieht im Kerker?","a":"Im Château d'If trifft Dantès den gelehrten Abbé Faria, der ihn bildet und ihm vom verborgenen Schatz auf der Insel Monte Christo erzählt. Nach Farias Tod flieht Dantès in dessen Leichensack."},{"r":"Inhalt","q":"Wie kehrt Dantès zurück?","a":"Er hebt den Schatz und tritt als rätselhafter, sagenhaft reicher 'Graf von Monte Christo' in der Pariser Gesellschaft auf, ohne erkannt zu werden."},{"r":"Inhalt","q":"Wie vollzieht er seine Rache?","a":"Er ruiniert seine Feinde nach und nach mit ihren eigenen Verbrechen: finanzieller Ruin für Danglars, Enttarnung und Schande für Fernand, Wahnsinn und Untergang für Villefort."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Nach vollendeter Rache erkennt Dantès die Grenzen seines Racheanspruchs, verschont Unschuldige und segelt mit der jungen Haydée davon – mit der Botschaft 'warten und hoffen'."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Alexandre Dumas (der Ältere), erschienen 1844/46 zunächst als Fortsetzungsroman in einer Zeitung."},{"r":"Autor","q":"Arbeitete Dumas allein?","a":"Dumas beschäftigte Mitarbeiter (v. a. Auguste Maquet), die Stoffe und Rohfassungen lieferten; die endgültige, glänzende Ausformung stammt von Dumas."},{"r":"Interpretation","q":"Welche Idee treibt den Grafen an?","a":"Er sieht sich als Werkzeug einer göttlichen Vorsehung, das gerechte Vergeltung übt – bis er erkennt, dass Rache auch Unschuldige trifft und ihn selbst nicht erlöst."},{"r":"Interpretation","q":"Ist der Roman eine reine Rachegeschichte?","a":"Nein. Er verhandelt auch Schuld, Gnade und die Frage, ob ein Mensch das Recht hat, göttliche Gerechtigkeit selbst zu vollstrecken."},{"r":"Interpretation","q":"Wofür steht die Verwandlung des Edmond Dantès?","a":"Vom naiven, gutgläubigen Jüngling zum kühlen, allmächtigen Rächer – eine Studie darüber, wie Unrecht einen Menschen formt und zugleich innerlich versteinert."},{"r":"Interpretation","q":"Was bedeutet der Schlusssatz 'warten und hoffen'?","a":"Er fasst die Lehre zusammen: Der Mensch soll dem Schicksal vertrauen und in Geduld und Hoffnung leben, statt sich ganz der Rache zu verschreiben."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als einer der beliebtesten und meistgelesenen Abenteuerromane der Weltliteratur."},{"r":"Einfluss","q":"Wie wirkt der Stoff nach?","a":"Zahllose Verfilmungen, Adaptionen und Anspielungen greifen die Rachegeschichte auf; 'Graf von Monte Christo' wurde zum Sinnbild für den geheimnisvollen Rächer."}]},{"title":"Der Idiot","author":"Fjodor Dostojewski","year":1869,"land":"Russland","epoch":"Realismus","icon":"🕊️","summary":"Der gutmütige, an Epilepsie leidende Fürst Myschkin kehrt aus einem Schweizer Sanatorium nach Russland zurück – ein 'vollkommen schöner Mensch' von kindlicher Herzensgüte inmitten einer berechnenden, geldgierigen Gesellschaft. Zwischen der stolzen Nastassja Filippowna und der jungen Aglaja zerrieben, scheitert seine Reinheit an der Welt. Dostojewskis Roman fragt, ob echte Güte in der modernen Gesellschaft überhaupt bestehen kann.","cards":[{"r":"Inhalt","q":"Wer ist Fürst Myschkin?","a":"Ein sanfter, arglos-gütiger Adliger, der nach einer Epilepsiebehandlung in der Schweiz mittellos nach Petersburg zurückkehrt. Wegen seiner Naivität halten ihn viele für einen 'Idioten'."},{"r":"Inhalt","q":"Welche zwei Frauen bestimmen die Handlung?","a":"Die schöne, gedemütigte Nastassja Filippowna, die Myschkin aus Mitleid retten will, und die junge Aglaja Jepantschina, in die er sich verliebt. Zwischen beiden wird er zerrissen."},{"r":"Inhalt","q":"Welche Rolle spielt Rogoschin?","a":"Der leidenschaftliche Kaufmannssohn Rogoschin begehrt Nastassja besessen. Er wird Myschkins Freund und zugleich sein dunkler Gegenspieler."},{"r":"Inhalt","q":"Wie endet der Roman?","a":"Rogoschin ermordet Nastassja. Myschkin und er wachen gemeinsam bei der Toten; Myschkin verfällt endgültig dem Wahnsinn und kehrt ins Sanatorium zurück."},{"r":"Autor","q":"Wann schrieb Dostojewski den Roman?","a":"1868/69, während er hoch verschuldet im Ausland lebte. Er wollte bewusst einen 'wahrhaft schönen Menschen' darstellen."},{"r":"Autor","q":"Was verbindet Myschkin mit dem Autor?","a":"Dostojewski litt selbst an Epilepsie und verlieh Myschkins Anfällen und Momenten höchster Klarheit eigene Erfahrungen."},{"r":"Interpretation","q":"Was will Dostojewski mit Myschkin zeigen?","a":"Er versucht, einen idealen, christusähnlich guten Menschen zu schildern – und zeigt, wie diese Güte in einer egoistischen Welt Unglück stiftet und untergeht."},{"r":"Interpretation","q":"Warum wird Myschkin 'Idiot' genannt?","a":"Weil seine Aufrichtigkeit, sein Mitleid und sein Verzicht auf Berechnung der Gesellschaft als Schwäche und Torheit erscheinen. Der Titel ist bittere Ironie."},{"r":"Interpretation","q":"Welche Bedeutung hat das Mitleid?","a":"Myschkins Mitleid mit Nastassja ist edel, aber zerstörerisch: Es bindet ihn an sie, verhindert echtes Glück mit Aglaja und trägt zur Katastrophe bei."},{"r":"Interpretation","q":"Welche Rolle spielt Geld?","a":"Fast alle Figuren handeln aus Habgier und Eitelkeit. Myschkins Gleichgültigkeit gegenüber Geld hebt ihn ab und macht ihn zugleich hilflos."},{"r":"Interpretation","q":"Was bedeutet das Holbein-Bild im Roman?","a":"Ein Gemälde des toten Christus löst bei den Figuren die Frage aus, ob der Glaube angesichts von Tod und Leid bestehen kann – ein Kernmotiv des Romans."},{"r":"Interpretation","q":"Ist der Roman pessimistisch?","a":"Weitgehend ja: Die reine Güte scheitert. Doch die Sehnsucht nach einem 'schönen Menschen' bleibt als Ideal bestehen."},{"r":"Einfluss","q":"Welchen Rang hat 'Der Idiot'?","a":"Er zählt zu Dostojewskis vier großen Romanen und gilt als eindringliche Studie über Güte, Mitleid und ihre Grenzen."},{"r":"Einfluss","q":"Wie wurde die Figur Myschkin rezipiert?","a":"Als Inbegriff des 'heiligen Narren' – der Reine, dessen Güte an der Welt zerbricht – ein Typus, der Literatur und Film bis heute prägt."}]},{"title":"Väter und Söhne","author":"Iwan Turgenjew","year":1862,"land":"Russland","epoch":"Realismus","icon":"🌱","summary":"Der junge Arkadi bringt seinen Freund Basarow, einen radikalen Nihilisten und Medizinstudenten, auf das Landgut seiner Familie. Basarow verachtet Kunst, Gefühl und Tradition und will nur naturwissenschaftlich Belegbares gelten lassen. Turgenjews Roman schildert den Konflikt zwischen der älteren, romantisch geprägten Generation und den nüchternen jungen Nihilisten – und lässt Basarows Programm an der eigenen Liebe scheitern.","cards":[{"r":"Inhalt","q":"Wer ist Basarow?","a":"Ein junger Medizinstudent und selbsterklärter Nihilist, der alle überlieferten Werte, Kunst und Gefühle ablehnt und nur Naturwissenschaft und Nützliches anerkennt."},{"r":"Inhalt","q":"Worum geht der Grundkonflikt?","a":"Um den Zusammenprall der Generationen: die älteren, liberal-romantischen 'Väter' (Kirsanow) und die jungen, radikalen 'Söhne' (Basarow, Arkadi)."},{"r":"Inhalt","q":"Was widerlegt Basarows Weltbild?","a":"Er verliebt sich unglücklich in die Witwe Odinzowa. Die echte Leidenschaft, die er theoretisch geleugnet hatte, erschüttert sein nihilistisches Programm."},{"r":"Inhalt","q":"Wie stirbt Basarow?","a":"Er infiziert sich bei einer Obduktion mit Typhus und stirbt jung – nüchtern, aber innerlich vereinsamt, versöhnt mit seinen liebenden Eltern."},{"r":"Autor","q":"Wer schrieb den Roman?","a":"Iwan Turgenjew, veröffentlicht 1862; er lebte lange in Westeuropa und vermittelte zwischen russischer und europäischer Kultur."},{"r":"Autor","q":"Wie wurde der Roman aufgenommen?","a":"Er löste heftige Debatten aus: Konservative sahen Basarow als Zerrbild, Radikale fühlten sich karikiert. Der Begriff 'Nihilist' wurde durch ihn populär."},{"r":"Interpretation","q":"Was bedeutet 'Nihilismus' hier?","a":"Die Ablehnung aller Autoritäten und überlieferten Werte zugunsten von Vernunft, Naturwissenschaft und praktischem Nutzen – ein Schlagwort der russischen Jugend um 1860."},{"r":"Interpretation","q":"Woran scheitert Basarow?","a":"An der Kluft zwischen Theorie und Leben: Seine Leugnung von Gefühl und Liebe hält der eigenen Verliebtheit nicht stand."},{"r":"Interpretation","q":"Ist der Roman parteiisch?","a":"Turgenjew zeichnet beide Seiten mit Sympathie und Kritik. Er verurteilt weder die Väter noch die Söhne, sondern zeigt die Tragik des Umbruchs."},{"r":"Interpretation","q":"Wofür steht der Titel?","a":"Für den Generationenkonflikt als solchen – das Auseinanderdriften von alter Ordnung und neuer, umstürzlerischer Jugend im Russland vor den großen Reformen."},{"r":"Interpretation","q":"Welche Rolle spielt die Natur?","a":"Der Schlussakkord am Grab Basarows – die 'gleichgültige' Natur, die über allen Streit hinaus dauert – deutet Versöhnung und die Vergänglichkeit menschlicher Kämpfe an."},{"r":"Einfluss","q":"Welche Bedeutung hat der Roman?","a":"Er gilt als Klassiker des russischen Realismus und als eine der einflussreichsten Darstellungen des Generationenkonflikts der Weltliteratur."},{"r":"Einfluss","q":"Wie wirkte der Begriff 'Nihilist'?","a":"Durch den Roman wurde 'Nihilismus' zum politischen Schlagwort für die revolutionäre russische Jugend und prägte den europäischen Diskurs."}]},{"title":"Rot und Schwarz","author":"Stendhal","year":1830,"land":"Frankreich","epoch":"Realismus","icon":"🎭","summary":"Der ehrgeizige Zimmermannssohn Julien Sorel will im restaurativen Frankreich um jeden Preis aufsteigen. Klug, stolz und von Napoleon träumend, nutzt er Kirche und Gesellschaft als Sprungbrett und verstrickt sich in zwei Liebesbeziehungen, die ihn schließlich zu Fall bringen. Stendhals Roman ist eine scharfe Studie über Ehrgeiz, Heuchelei und die Standesschranken einer erstarrten Gesellschaft.","cards":[{"r":"Inhalt","q":"Wer ist Julien Sorel?","a":"Ein begabter, ehrgeiziger Sohn eines Sägewerkbesitzers, der die niedere Herkunft hasst und mit Intelligenz und Ehrgeiz in die höheren Stände aufsteigen will."},{"r":"Inhalt","q":"Welche zwei Wege stehen ihm offen?","a":"'Rot' – die militärische Karriere im Sinne Napoleons – und 'Schwarz' – die geistliche Laufbahn in der Kirche. In der Restauration wählt er zunächst den geistlichen Weg."},{"r":"Inhalt","q":"Welche Frauen prägen Juliens Aufstieg?","a":"Madame de Rênal, die Frau seines ersten Dienstherrn, und Mathilde de La Mole, die stolze Adelstochter in Paris. Beide Beziehungen befördern und gefährden seine Karriere."},{"r":"Inhalt","q":"Wie endet Julien?","a":"Als ein Brief Madame de Rênals seine Verlobung mit Mathilde zerstört, schießt Julien auf sie. Er wird zum Tode verurteilt und guillotiniert."},{"r":"Autor","q":"Wer war Stendhal?","a":"Pseudonym von Marie-Henri Beyle; der Roman erschien 1830. Stendhal gilt als Wegbereiter des psychologischen Realismus."},{"r":"Autor","q":"Was bedeutet der Untertitel 'Chronik von 1830'?","a":"Stendhal verstand den Roman als genaues Zeitbild der französischen Restaurationsgesellschaft kurz vor der Julirevolution."},{"r":"Interpretation","q":"Was bedeuten die Farben Rot und Schwarz?","a":"Gedeutet meist als Militär (Rot) gegen Kirche (Schwarz) – die beiden Aufstiegswege. Zugleich stehen sie für Leidenschaft und Tod, Ehrgeiz und Heuchelei."},{"r":"Interpretation","q":"Wofür steht Julien Sorel?","a":"Für den begabten Außenseiter, dem eine erstarrte Ständegesellschaft den ehrlichen Aufstieg verwehrt und der deshalb zur Maske und Heuchelei greift."},{"r":"Interpretation","q":"Welche Rolle spielt Napoleon?","a":"Napoleon ist Juliens heimliches Idol – das Vorbild des Emporkömmlings, der aus eigener Kraft aufstieg. In der Restauration ist dieser Weg jedoch versperrt."},{"r":"Interpretation","q":"Was kritisiert der Roman?","a":"Die Heuchelei, den Standesdünkel und die politische Enge der Restauration, in der Ehrgeiz nur über Verstellung und Intrige Erfolg hat."},{"r":"Interpretation","q":"Wie ist Juliens Ende zu verstehen?","a":"Im Prozess wirft er der Jury den Klassenhass vor. Sein Tod ist zugleich Anklage der Gesellschaft und späte innere Klärung über seine wahre Liebe zu Madame de Rênal."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als einer der großen französischen Romane des 19. Jahrhunderts und als Meilenstein des psychologischen Realismus."},{"r":"Einfluss","q":"Was ist Stendhals Erzähltechnik?","a":"Seine feine Analyse innerer Regungen und Selbsttäuschungen ('Beylismus') beeinflusste den modernen Roman nachhaltig."}]},{"title":"Robinson Crusoe","author":"Daniel Defoe","year":1719,"land":"England","epoch":"Aufklärung","icon":"🏝️","summary":"Nach einem Schiffbruch strandet der Kaufmann Robinson Crusoe allein auf einer einsamen Insel, wo er 28 Jahre überlebt: Er baut, pflanzt, zähmt und ordnet sich seine Welt neu. Später rettet er den Eingeborenen Freitag, den er zu seinem Diener macht. Defoes Roman gilt als einer der ersten der Weltliteratur und feiert Fleiß, Vernunft und den Überlebenswillen des selbstständigen Individuums.","cards":[{"r":"Inhalt","q":"Wie gerät Robinson auf die Insel?","a":"Gegen den Rat seines Vaters geht er zur See, gerät in Stürme und Sklaverei und erleidet schließlich vor einer einsamen Insel Schiffbruch, den nur er überlebt."},{"r":"Inhalt","q":"Wie überlebt er?","a":"Er rettet Werkzeuge vom Wrack, baut Behausungen, pflanzt Getreide, zähmt Ziegen, fertigt Töpfe und Kleidung – er erschafft sich Schritt für Schritt eine kleine Zivilisation."},{"r":"Inhalt","q":"Wer ist Freitag?","a":"Ein Eingeborener, den Robinson vor Kannibalen rettet. Er benennt ihn nach dem Wochentag, bringt ihm Englisch und den christlichen Glauben bei und macht ihn zu seinem treuen Gefährten und Diener."},{"r":"Inhalt","q":"Wie verlässt Robinson die Insel?","a":"Nach 28 Jahren hilft er der Mannschaft eines gemeuterten Schiffes, gewinnt so eine Überfahrt und kehrt schließlich reich nach England zurück."},{"r":"Autor","q":"Wer schrieb Robinson Crusoe?","a":"Daniel Defoe, veröffentlicht 1719. Der Roman war ein sofortiger Erfolg und gilt als einer der ersten englischen Romane."},{"r":"Autor","q":"Gab es ein reales Vorbild?","a":"Ja, teils inspiriert vom schottischen Seemann Alexander Selkirk, der jahrelang allein auf einer Pazifikinsel überlebte."},{"r":"Interpretation","q":"Wofür steht Robinson Crusoe?","a":"Für das aufklärerisch-bürgerliche Ideal des selbstständigen, fleißigen Individuums, das mit Vernunft, Arbeit und Gottvertrauen jede Lage meistert."},{"r":"Interpretation","q":"Welche Rolle spielt die Religion?","a":"In der Einsamkeit findet Robinson zu Bibel und Glauben; er deutet sein Schicksal als göttliche Prüfung und Vorsehung."},{"r":"Interpretation","q":"Wie ist das Verhältnis zu Freitag heute zu sehen?","a":"Kritisch: Es spiegelt koloniale Hierarchien – der weiße Europäer als Herr, der Eingeborene als bekehrter Diener. Der Roman gilt als Schlüsseltext auch der Kolonialismuskritik."},{"r":"Interpretation","q":"Was bedeutet 'Robinsonade'?","a":"Der Roman begründete eine ganze Gattung: Geschichten von Schiffbruch, Isolation und dem Aufbau einer Welt aus dem Nichts."},{"r":"Interpretation","q":"Welches Menschenbild vertritt das Werk?","a":"Ein optimistisches: Der Mensch kann durch Arbeit, Ordnung und Vernunft selbst unter widrigsten Umständen eine sinnvolle Existenz aufbauen."},{"r":"Einfluss","q":"Welchen Rang hat der Roman?","a":"Er gilt als Klassiker der Weltliteratur, als Prototyp des Abenteuer- und Inselromans und als Symbol des neuzeitlichen Individualismus."},{"r":"Einfluss","q":"Wie wirkt der Stoff nach?","a":"Unzählige 'Robinsonaden', Verfilmungen und Adaptionen (bis zu Filmen wie 'Cast Away') greifen das Motiv des einsamen Überlebenden auf."}]},{"title":"Die Abenteuer des Huckleberry Finn","author":"Mark Twain","year":1884,"land":"USA","epo
